- id: plant-anesthesia
  type: real_world
  content: >
    Plants can be rendered unconscious by the same anesthetics that work on
    humans — ether, xenon, lidocaine — and no one knows why, since plants
    have no nervous system.
  source: "Yokawa et al., Annals of Botany, 2018"
  tags: [consciousness, biology, mystery]

- id: dancing-plague
  type: real_world
  content: >
    In July 1518, a woman named Frau Troffea began dancing in a Strasbourg
    street and could not stop. Within a month, 400 people had joined. Several
    danced to death.
  source: "Waller, J., 'A Time to Dance, a Time to Die,' 2009"
  tags: [mass-psychogenic-illness, medieval, body, contagion]

- id: turkish-coffee-divination
  type: real_world
  content: >
    In Turkey, after drinking Turkish coffee, the cup is flipped and the
    patterns left by the grounds are read for fortune-telling. Many educated,
    secular Turks participate while insisting they don't believe in it.
  source: "Henkel, Social Analysis, 2005"
  tags: [ritual, belief, social-performance, ambiguity]

- id: pepys-cheese-burial
  type: real_world
  content: >
    During the Great Fire of London in 1666, Samuel Pepys buried his Parmesan
    cheese in the garden to save it from the flames. He also buried wine and
    documents, but mentions the cheese first.
  source: "Pepys diary, Sept 4, 1666"
  tags: [priorities, disaster, absurdity, intimacy]

- id: radium-girls
  type: real_world
  content: >
    In the 1920s, women painting luminous watch dials were told to lick their
    radium-tipped brushes. When they began dying, the company hired
    investigators to blame their deaths on syphilis.
  source: "Moore, The Radium Girls, 2017"
  tags: [labor, cover-up, body, injustice, industry]

- id: octopus-rna-editing
  type: real_world
  content: >
    Octopuses edit their own RNA at 100x the rate of humans — recoding genetic
    instructions on the fly. This may explain their intelligence but comes at
    the cost of extremely slow DNA evolution.
  source: "Liscovitch-Brauer et al., Cell, 2017"
  tags: [intelligence, adaptation, tradeoff, alien-minds]

- id: last-speaker
  type: real_world
  content: >
    When Boa Sr died in 2010, the Bo language of the Andaman Islands —
    estimated 65,000 years old — died with her. She had spent decades with
    no one to speak it to.
  source: "Survival International, 2010"
  tags: [language-death, isolation, loss, memory]

- id: rubber-hand
  type: real_world
  content: >
    In the rubber hand illusion, watching a fake hand being stroked while your
    hidden real hand is stroked simultaneously causes your brain to 'adopt' the
    rubber hand within minutes. Threatening it produces genuine fear.
  source: "Botvinick & Cohen, Nature, 1998"
  tags: [body-ownership, identity, illusion, self]

- id: death-cleaning
  type: real_world
  content: >
    In Sweden, 'döstädning' is gradually decluttering your possessions as you
    age so your family doesn't have to after you die. Framed not as morbid but
    as a final act of consideration.
  source: "Magnusson, 2017"
  tags: [death, objects, care, legacy, minimalism]

- id: night-witches
  type: real_world
  content: >
    The Soviet 588th Night Bomber Regiment — all-female — flew obsolete plywood
    biplanes on night bombing runs. They'd cut engines and glide silently over
    targets. Germans called them 'Nachthexen' (Night Witches).
  source: "Noggle, A Dance with Death, 1994"
  tags: [war, women, ingenuity, fear, obsolescence]

- id: cathedral-generations
  type: real_world
  content: >
    The stonemasons who began constructing Notre-Dame de Paris in 1163 knew
    they would never see it finished. The cathedral took 182 years to complete.
    Workers spent entire careers carving details on the upper walls that no
    human eye at ground level could discern.
  source: "Erlande-Brandenburg, Notre-Dame de Paris, 1997"
  tags: [craft, time, devotion, labor, invisibility]

- id: prison-chess
  type: real_world
  content: >
    During apartheid, political prisoners on Robben Island played chess using
    pieces carved from soap and boards scratched into cell floors. When guards
    confiscated the sets, players switched to mental chess — announcing moves
    through cell walls by tapping.
  source: "Sobukwe & Alexander oral histories, Robben Island Museum archives"
  tags: [resistance, abstraction, confinement, ingenuity]

- id: seed-vault-flood
  type: real_world
  content: >
    The Svalbard Global Seed Vault — designed to survive any catastrophe — was
    breached by meltwater in 2017 due to permafrost thaw no one had predicted.
    The vault built to protect against the end of the world was threatened by
    the process that might cause it.
  source: "The Guardian, May 19, 2017"
  tags: [irony, preservation, climate, hubris]

- id: feral-children-language
  type: real_world
  content: >
    After age ~12, the human brain loses the ability to fully acquire a first
    language. Genie Wiley, isolated until age 13, could learn words but never
    mastered grammar — suggesting there is a window for becoming fully human
    in a linguistic sense, and it closes.
  source: "Curtiss, S., Genie: A Psycholinguistic Study, 1977"
  tags: [language, development, isolation, irreversibility]

- id: fetal-microchimerism
  type: real_world
  content: >
    Male fetal DNA has been found in 63% of women's brains, persisting up to
    age 94. Women who never carried a male pregnancy to term sometimes test
    positive — the source may be a miscarried fetus they never knew about, or
    an older sibling absorbed in utero. You carry your children in your brain,
    including the ones you lost before you knew them.
  source: "Chan et al., PLOS ONE, 2012"
  tags: [identity, parenthood, biology, boundaries, loss]

- id: tapeworm-ant-royalty
  type: real_world
  content: >
    A tapeworm (Anomotaenia brevis) triples the lifespan of infected ants,
    making their survival curves identical to queens. It alters the ant's
    cuticle chemistry so nestmates groom and feed the infected worker more
    attentively than they feed the actual queen. The colony reorganizes its
    entire care hierarchy around a chemical lie.
  source: "Gál et al., Royal Society Open Science, 2021"
  tags: [parasitism, deception, status, care, identity]

- id: capgras-patient-ds
  type: real_world
  content: >
    Patient DS recognized his parents' voices on the telephone but insisted
    their faces were impostors when he saw them. Galvanic skin response testing
    confirmed zero autonomic response to familiar faces. His brain could
    identify the faces cognitively but felt nothing — and 'they are impostors'
    was the most rational interpretation of his actual experience.
  source: "Hirstein & Ramachandran, Proc. R. Soc. Lond. B, 1997"
  tags: [recognition, feeling, identity, rationality, family]

- id: operation-bernhard-palestine
  type: real_world
  content: >
    Nazi Germany forged £300 million in British banknotes to destabilize
    Britain's economy. The airdrop plan was abandoned. A documented fraction
    of the forged notes ended up funding illegal Jewish emigration to Palestine
    in defiance of the British blockade. A weapon of economic destruction,
    repurposed as a tool of rescue for the people that same regime was
    exterminating.
  source: "Bank of England Museum; Smithsonian Magazine"
  tags: [war, irony, rescue, repurposing, moral-complexity]

- id: atlantic-cable-destroyed
  type: real_world
  content: >
    The first transatlantic telegraph cable (1858) was destroyed by its chief
    electrician, Wildman Whitehouse, who applied 2,000+ volts to fix declining
    signals — ignoring the cable's specs and Lord Kelvin's warnings. The
    insulation burned through in three weeks. The most ambitious communication
    technology of the century was killed by the intensity of the attempt to
    use it.
  source: "Atlantic Cable archive; PBS American Experience"
  tags: [technology, hubris, repair, destruction, expertise]

- id: gallipoli-1854-map
  type: real_world
  content: >
    The ANZAC landing at Gallipoli was misdirected by a map drawn from an
    1854 French survey — sixty-one years before the invasion, for a different
    empire's different war. Troops landed at the base of sheer cliffs instead
    of a planned gentle slope. Men died based on a measurement no one had
    checked in six decades.
  source: "Australian War Memorial; USNI Proceedings, June 1995"
  tags: [maps, inherited-information, war, friction, institutional-inertia]

- id: radiologist-gorilla
  type: real_world
  content: >
    83% of expert radiologists failed to notice a gorilla image embedded in
    a CT scan — 48 times the size of a typical lung nodule — after their eyes
    had passed directly over it. Eye-tracking confirmed they looked at its
    location. Their training had tuned their visual system so specifically
    that the anomalous was filtered out at the perceptual level.
  source: "Drew, Võ & Wolfe, Psychological Science, 2013"
  tags: [expertise, perception, blindness, training, attention]

- id: phantom-telescoping
  type: real_world
  content: >
    In 30-50% of upper-limb amputees, the phantom hand gradually retreats
    through the phantom forearm until it is felt as protruding directly from
    the stump. The brain's map of the body folds inward. The lost limb
    doesn't disappear — it migrates and compresses into what's left.
  source: "Schmalzl et al., Frontiers in Human Neuroscience, 2011"
  tags: [body, loss, compression, phantom, persistence]

- id: antarctic-social-faultlines
  type: real_world
  content: >
    In 40 years of studying 1,100+ Antarctic overwinterers, the primary
    stressor is not cold, darkness, or isolation — it is interpersonal
    conflict along the social identities people brought with them. Scientists
    vs. support staff ('beakers' vs. 'toasties'), nationality, gender. We do
    not form new identities under pressure; we deepen the ones we carried in.
  source: "Palinkas, 40-year study; Cravalho, 'Toast on Ice,' Ethos, 1996"
  tags: [confinement, identity, conflict, group-dynamics, pressure]

- id: shu-syndrome-voices
  type: real_world
  content: >
    Stuart Grassian documented a specific psychiatric syndrome in 200+ supermax
    prisoners in extended solitary. Random sounds begin to take on meaning and
    frightening significance. One prisoner: 'I hear noises, can't identify
    them — starts to sound like sticks beating men.' A third reported whispered
    voices. Not pre-existing psychosis — it reverses on release. The mind,
    deprived of signal, generates signal from noise.
  source: "Grassian, Washington U. Journal of Law & Policy, 2006"
  tags: [isolation, perception, signal, noise, confinement]

- id: valproate-critical-window
  type: real_world
  content: >
    A drug (valproate, an HDAC inhibitor) can temporarily reopen the critical
    learning window for absolute pitch in adults. The barrier to adult
    acquisition is not biological incapacity but an epigenetic lock that can
    be briefly picked. Then the window re-closes. Some forms of 'too late'
    are molecular decisions, not destiny.
  source: "Gervain et al., Frontiers in Systems Neuroscience, 2013"
  tags: [learning, irreversibility, critical-period, epigenetics, second-chances]

# ============================================================
# thought_experiment (5 seeds)
# ============================================================

- id: te-marys-room
  type: thought_experiment
  content: >
    Mary is a brilliant scientist confined to a black-and-white room, where
    she learns everything there is to know about the physics and neuroscience
    of color vision. She knows exactly which wavelengths stimulate which
    receptors and which neural processes produce the experience of "red."
    When she finally leaves the room and sees red for the first time — does
    she learn something new?
  source: "Jackson, F., 'Epiphenomenal Qualia,' Philosophical Quarterly, 1982"
  tags: [consciousness, qualia, physicalism, knowledge, experience]

- id: te-teleporter-duplicate
  type: thought_experiment
  content: >
    A teleporter works by scanning your body, destroying the original,
    and rebuilding an exact copy at the destination. The copy has all
    your memories and believes it walked into the machine. One day the
    destruction step fails. Now there are two of you. Which one is you?
    Does the copy have a right to your life, your family, your name?
  source: "Parfit, D., Reasons and Persons, 1984"
  tags: [personal-identity, continuity, duplication, death]

- id: te-utility-monster
  type: thought_experiment
  content: >
    Imagine a being that derives enormously more pleasure from each
    unit of a resource than anyone else does. Under utilitarian logic,
    everyone should give everything to this being — it maximizes total
    happiness. The monster's pleasure always outweighs everyone else's
    suffering. What's wrong with this picture, and why can't
    utilitarianism say what's wrong?
  source: "Nozick, R., Anarchy, State, and Utopia, 1974"
  tags: [ethics, utilitarianism, fairness, extremes]

- id: te-swampman
  type: thought_experiment
  content: >
    A bolt of lightning simultaneously kills a man in a swamp and,
    by extraordinary coincidence, rearranges nearby molecules into an
    exact physical duplicate. Swampman walks out, goes to the dead
    man's home, hugs his wife, continues his life. Swampman has no
    causal history — his memories are false, his relationships are
    with a dead man's people. But no one can tell. Is Swampman a person?
  source: "Davidson, D., 'Knowing One's Own Mind,' 1987"
  tags: [identity, causation, memory, authenticity, replacement]

- id: te-kavkas-toxin
  type: thought_experiment
  content: >
    A billionaire offers you $1 million if, at midnight tonight, you sincerely
    intend to drink a mildly nauseating toxin tomorrow afternoon. You don't
    have to drink it — the money is deposited based solely on the intention.
    But the moment you realize you won't have any reason to drink it tomorrow
    (you already have the money), the intention becomes self-undermining. Can
    you sincerely intend something you know you'll abandon? Kavka developed
    this from nuclear deterrence: can a leader sincerely intend to retaliate
    when retaliation would be pointless?
  source: "Kavka, G., 'The Toxin Puzzle,' Analysis, 1983"
  tags: [intention, commitment, self-knowledge, deterrence, rationality]

# ============================================================
# axiom (13 seeds)
# ============================================================

- id: axiom-ubuntu
  type: axiom
  content: >
    A person is a person through other persons. Individual identity is
    constituted by communal relationships — you do not exist as a self
    prior to and independent of your bonds with others.
  source: "Ubuntu philosophy; Metz, T., 'Ubuntu as a Moral Theory,' 2007"
  tags: [identity, community, ethics, non-western-philosophy]

- id: axiom-moral-luck
  type: axiom
  content: >
    People are morally judged for outcomes outside their control. Two drunk
    drivers — one kills a pedestrian, one arrives home safely — are treated
    as fundamentally different moral agents, though their choices were
    identical.
  source: "Williams, B., 'Moral Luck,' 1981; Nagel, T., 'Moral Luck,' 1979"
  tags: [ethics, luck, responsibility, judgment]

- id: axiom-attention-as-prayer
  type: axiom
  content: >
    Attention is the rarest and purest form of generosity. To attend fully
    to another person — without agenda, interpretation, or the desire to
    fix — is the closest secular equivalent to prayer.
  source: "Weil, S., 'Gravity and Grace,' 1947"
  tags: [phenomenology, attention, ethics-of-care, presence]

- id: axiom-future-selves-strangers
  type: axiom
  content: >
    Your future self is, in every psychologically meaningful sense, a
    different person. The empathy gap between present-you and future-you
    is comparable to the gap between you and a stranger — which is why
    people systematically fail to save for retirement, keep promises, or
    sustain resolutions.
  source: "Parfit, D., Reasons and Persons, 1984; Hershfield et al., JPSP, 2011"
  tags: [personal-identity, time, self-deception, ethics]

- id: axiom-predictive-processing
  type: axiom
  content: >
    The brain does not receive sensory data and build reality from it. It
    continuously generates predictions about what it will perceive and uses
    incoming signals only to update those predictions. Consciousness is a
    'controlled hallucination' — controlled by the degree to which it agrees
    with sensory input. When input is degraded (grief, illness, isolation),
    the predictions run without correction. The hallucination becomes less
    controlled.
  source: "Helmholtz (foundations); Friston (active inference); Seth, Being You, 2021"
  tags: [perception, prediction, hallucination, grief, consciousness]

- id: axiom-ergodicity
  type: axiom
  content: >
    A gamble that multiplies your wealth by 1.5 on heads and 0.6 on tails has
    a positive expected value (1.05). But play it repeatedly as a single
    person and you reliably go broke, because the time average (0.95) diverges
    from the ensemble average. Classical economics treats you as if your one
    life were the mean of many possible lives. You live sequentially, not in
    parallel. The 'rational' choice can be systematically catastrophic for any
    individual who lives long enough.
  source: "Peters, O., 'The ergodicity problem in economics,' Nature Physics, 2019"
  tags: [probability, risk, individual-vs-aggregate, rationality, ruin]

- id: axiom-umwelt
  type: axiom
  content: >
    Each organism lives in a species-specific perceptual world determined
    entirely by its sensory apparatus. The tick's world contains three signals:
    butyric acid (mammal nearby), 37°C (time to drop), hairiness (confirmed
    host). It can wait 18 years for the first signal without any experience of
    waiting. When organisms with radically different Umwelts interact, they
    are not experiencing the 'same event' differently — they may not be
    experiencing the same event at all.
  source: "Uexküll, J. von, A Foray into the Worlds of Animals and Humans, 1934"
  tags: [perception, species, incomparability, world-making, biology]

- id: axiom-hysteresis
  type: axiom
  content: >
    A hysteretic system's current state depends on its history, not just
    current conditions. Reversing the cause does not reverse the effect — it
    takes substantially more energy to undo a change than it took to cause it.
    Bourdieu applied this to people: the immigrant who flinches at luxury, the
    person who learned trust in a trustworthy world and now lives in an
    untrustworthy one. Damage is structurally asymmetric. The return path is
    not the reverse of the forward path.
  source: "Ewing, J.A. (magnetism, 1881); Bourdieu, P. (social hysteresis, 1977)"
  tags: [irreversibility, memory, path-dependence, damage, asymmetry]

- id: axiom-information-action-ratio
  type: axiom
  content: >
    Before the telegraph, virtually all information a person received was
    local and actionable — you heard about a barn fire and could go help.
    The telegraph created an entirely new category of human experience:
    information that is interesting but not actionable. You know about a
    flood on another continent and can do nothing. The feeling of being
    informed became a substitute for the feeling of being effective — and
    the substitution is invisible to the person experiencing it.
  source: "Postman, N., Amusing Ourselves to Death, 1985"
  tags: [media, information, impotence, technology, substitution]

- id: axiom-disappearance-of-childhood
  type: axiom
  content: >
    Childhood is an artifact of print culture. Literacy created an
    information gradient between adults and children — there were things
    you needed to learn to read to access. Electronic media erased that
    gradient by making adult information universally available. Childhood
    didn't end; it was dissolved. The boundary was informational, and the
    technology removed it.
  source: "Postman, N., The Disappearance of Childhood, 1982"
  tags: [childhood, media, literacy, boundaries, technology]

- id: axiom-apparatus
  type: axiom
  content: >
    The camera does not serve the photographer; the photographer serves
    the camera's program. The camera contains a finite set of possible
    images, and the photographer can only produce images within that set.
    She thinks she's making creative choices; she's exploring a pre-defined
    possibility space. The person and the apparatus are in a feedback loop,
    and the apparatus is winning — not through coercion but through defining
    what is available to think.
  source: "Flusser, V., Towards a Philosophy of Photography, 1983"
  tags: [technology, freedom, constraint, creativity, apparatus]

- id: axiom-counterproductivity
  type: axiom
  content: >
    Every institution, past a certain threshold of scale, produces the
    opposite of its stated purpose. Medicine past a threshold produces
    iatrogenic illness. Education past a threshold produces learned
    helplessness. Transportation past a threshold produces immobility —
    the average American spends more hours working to pay for their car
    than they would spend walking the same distances. The institution
    doesn't fail; it succeeds so hard it reverses.
  source: "Illich, I., Tools for Conviviality, 1973; Energy and Equity, 1974"
  tags: [institutions, reversal, scale, counterproductivity, thresholds]

- id: axiom-aura-provenance
  type: axiom
  content: >
    The 'aura' of an artwork is its quality of uniqueness and presence —
    the thing a reproduction lacks. If an AI produces a painting
    indistinguishable from a human's, and you genuinely cannot tell the
    difference, what did you lose? The aura was never in the object. It
    was in the social relationship of authenticity — the knowledge that
    a specific person made this, here, once. The loss is not aesthetic
    but social. You didn't lose beauty; you lost provenance. The feeling
    of loss is real even though the thing itself is identical.
  source: "Benjamin, W., 'The Work of Art in the Age of Mechanical Reproduction,' 1935"
  tags: [authenticity, reproduction, ai, art, social-relation]

# ============================================================
# dilemma (6 seeds)
# ============================================================

- id: dilemma-translator-asylum
  type: dilemma
  content: >
    A court translator realizes the refugee's asylum testimony contains
    a fabrication. If she translates faithfully, the lie will be caught
    and the claim denied — deportation back to genuine danger. If she
    softens it, she commits perjury and risks her career, her freedom,
    and the integrity of every future case she touches.
  tags: [duty, compassion, institutional-trust, immigration]

- id: dilemma-medication-stockpile
  type: dilemma
  content: >
    A hospice nurse discovers her terminally ill patient has been
    secretly stockpiling pain medication — enough to end his own life.
    He's lucid, not depressed, and has told no one else. Reporting it
    means removing his only sense of control. Not reporting it means
    being complicit if he uses it. He hasn't asked for her silence.
    He hasn't asked for anything.
  tags: [autonomy, duty-of-care, death, complicity, silence]

- id: dilemma-anonymous-donor
  type: dilemma
  content: >
    A woman discovers that the anonymous bone marrow donor who saved
    her daughter's life fifteen years ago is a man currently serving
    a life sentence for murder. He wants to meet the girl. The girl
    has spent her whole life wanting to thank her donor.
  tags: [gratitude, moral-complexity, parenthood, identity]

- id: dilemma-dementia-truth
  type: dilemma
  content: >
    Every morning a man with advanced dementia asks where his wife is.
    She died two years ago. Each time his family tells him, he
    experiences the grief fresh — wailing, inconsolable for hours,
    then forgets by evening. A nurse suggests they simply say she's
    gone shopping. Is it kinder to lie and let him live in a world
    where she's alive, or does he have a right to his own grief,
    even if he can't hold it?
  tags: [dementia, truth, grief, mercy, autonomy, family]

- id: dilemma-child-prodigy-father
  type: dilemma
  content: >
    A father realizes his twelve-year-old daughter is a genuine
    musical prodigy — the kind that appears once a generation. Pursuing
    it fully means conservatory, relocation, a childhood consumed by
    practice. Not pursuing it means she'll never know what she could
    have been. She says she wants it. She's twelve. He remembers
    wanting things at twelve.
  tags: [parenthood, talent, childhood, sacrifice, consent]

- id: dilemma-benevolent-simulation
  type: dilemma
  content: >
    A superintelligence optimizing your flourishing would simulate the people
    around you to be challenging enough to feel real but calibrated so you're
    never truly broken. You'd have no way to tell. You start to notice: every
    relationship in your life is suspiciously well-calibrated. Not perfect —
    that would be obvious. But every conflict resolves. Every person who
    challenges you does so in exactly the way that makes you grow. No one
    leaves in a way that truly destroys you. Do you investigate — knowing
    that if the people are real, testing them will be the thing that finally
    breaks what was genuine? Or do you accept a life that is, by every
    available measure, good — and stop asking? Suspicion is the only weapon
    that works against a benevolent cage, and the only thing that can destroy
    a life that wasn't a cage at all.
  tags: [simulation, trust, investigation, flourishing, unfalsifiability]

# ============================================================
# constraint (9 seeds)
# ============================================================

- id: constraint-halving
  type: constraint
  content: >
    The story is told in numbered sections. Each section is exactly half the
    word count of the previous one. The first section is 1,000 words. The
    last section is the one that can no longer be halved while remaining a
    complete sentence.
  tags: [structural, compression, acceleration]

- id: constraint-one-lie
  type: constraint
  content: >
    Every paragraph contains exactly one statement that is false within the
    story's world. The narrator does not acknowledge the lies. The reader
    must determine which statement in each paragraph is the lie.
  tags: [content, unreliable-narrator, reader-engagement]

- id: constraint-addressing-the-deaf
  type: constraint
  content: >
    Second person, present tense, addressed to someone who cannot hear you.
    The reason they cannot hear you must never be stated directly — only
    implied through what the narrator chooses to say and not say.
  tags: [pov, absence, implication, voice]

- id: constraint-no-interiority
  type: constraint
  content: >
    The story may describe actions, dialogue, and physical sensations, but
    never thoughts, feelings, or motivations. No 'she felt,' no 'he
    realized,' no 'a wave of sadness.' The reader infers the inner life
    entirely from outer behavior. No character's emotional state may be
    named directly.
  tags: [voice, behaviorist, restraint, implication]

- id: constraint-absent-word
  type: constraint
  content: >
    One specific common word is chosen before writing (e.g., 'mother,'
    'water,' 'hand,' 'door') and banned from the entire story — despite
    the story being ABOUT the thing that word names. The circumlocution
    required to discuss the central subject without naming it creates
    pressured, strange language. The absence becomes the gravitational
    center.
  tags: [linguistic, absence, lipogram, circumlocution]

- id: constraint-apophatic
  type: constraint
  content: >
    The narrator can only describe what the protagonist is NOT doing, NOT
    feeling, NOT saying. All positive content must be inferred from
    negation. 'She did not flinch' tells you she had reason to. 'He did
    not mention the letter' tells you there was one. Every denial implies
    the positive it refuses.
  tags: [voice, negation, inference, restraint]

- id: constraint-sentence-per-year
  type: constraint
  content: >
    The story contains exactly one sentence per year of the protagonist's
    life. The first sentence covers the year of birth. The last covers the
    year of death. No year may be skipped. The pattern of what is chosen
    to represent each year IS the story.
  tags: [temporal, compression, selection, lifespan]

- id: constraint-inventory
  type: constraint
  content: >
    The story is told entirely as a list: objects in a room, items in a
    suitcase, entries in a ledger, contents of pockets. No narrative prose.
    Story emerges from what is listed, the order of listing, and what is
    conspicuously absent.
  tags: [structural, list, absence, oulipo]

- id: constraint-dialogue-only
  type: constraint
  content: >
    The entire story is dialogue. No attribution beyond the first exchange.
    No description, no action, no interiority. The reader determines who
    is speaking, what they are doing, and what they are feeling entirely
    from what they say and how they say it.
  tags: [voice, dialogue, implication, differentiation]

- id: constraint-greentext
  type: constraint
  content: >
    The story is told in the compressed, fragmented style of an anonymous imageboard post: short declarative lines, present tense, no attribution, no names — only relational labels (roommate, mom, the girl from work). The narrator performs detachment and ironic distance as a social obligation. The emotional content of the story must never be stated directly by the narrator — it can only surface through what they choose to include, the details they can't help recording, and the places where the performed indifference fails. The narrator does not realize they are telling a story that matters to them.
  tags: [format, compression, irony, detachment, voice, internet-culture]

- id: constraint-forum-thread
  type: constraint
  content: >
    The story unfolds as a series of posts in a topical online forum — a specific community (beekeeping, ham radio, a disease support group, amateur astronomy). Different usernames, different levels of knowledge, different reasons for being there. No omniscient narrator. Chronological gaps between posts. Some posters misunderstand the situation. Some posts are deleted. The story emerges from the community's norms and blind spots, not from plot reveals.
  tags: [format, multi-voice, community, digital, gaps, misunderstanding]

- id: constraint-incident-report
  type: constraint
  content: >
    The story is told as a formal incident report, after-action review, or bureaucratic filing. Clinical language, passive voice, numbered sections, redactions. The human reality bleeds through the institutional framing — not because the narrator breaks voice, but because bureaucratic language is structurally incapable of containing what happened. The form's inadequacy is the point.
  tags: [format, bureaucracy, clinical, distance, inadequacy]

- id: constraint-ritual-instructions
  type: constraint
  content: >
    The story is presented as instructions for performing a ritual. The steps must be followed in order. Certain materials are required. Certain words must be spoken. The instructions imply a history — who the ritual is for, what happened that made it necessary, what will go wrong if a step is skipped or performed carelessly. The ritual itself is the narrative; the practitioner is the reader. The instructions never explain why the ritual exists. They only say what to do.
  tags: [format, ritual, cosmology, implication, pre-modern, procedural]

- id: constraint-trial-transcript
  type: constraint
  content: >
    The story is told as a court transcript from a non-modern legal system — ecclesiastical court, village tribunal, inquisition, colonial hearing. Questions and answers only. The questions reveal the questioner's worldview: what counts as evidence, what counts as guilt, what counts as real. The accused answers within a different framework than the one being applied to them. The reader understands both; the court understands only its own.
  tags: [format, legal, worldview, power, pre-modern, cross-purposes]

- id: constraint-hagiography
  type: constraint
  content: >
    The story is told in the form of a saint's life: miraculous birth or calling, trials and temptations, signs and wonders, martyrdom or transfiguration. The hagiographic conventions are followed faithfully. The subject is not a saint. The frame can be ironic or sincere or both simultaneously — the reader must decide whether the life described is holy, deluded, or whether the distinction matters.
  tags: [format, sacred, irony, sincerity, pre-modern, devotion]

- id: constraint-almanac
  type: constraint
  content: >
    The story is told as seasonal entries in a farmer's almanac or household guide: planting schedules, weather predictions, remedies, feast days, practical advice. A life unfolds between the instructions. The almanac never acknowledges the life directly — it never breaks its own frame. The narrative exists entirely in implication: what is planted and what isn't, which remedies appear and why, what the weather did this year that it didn't do last year.
  tags: [format, seasonal, indirection, implication, pre-modern, cyclical]

- id: constraint-herbalist-compendium
  type: constraint
  content: >
    Each section describes a plant: its appearance, where it grows, what it cures, what it poisons, how to prepare it, when to harvest. The herbalist's clinical distance is the voice. The plants correspond to people or events — but the correspondence is not allegorical. The progression from appearance to cure to poison gives each entry a narrative arc. Somewhere in the preparations and dosages, a story takes shape without ever being named as a story.
  tags: [format, botanical, clinical, pre-modern, indirection, poison]

