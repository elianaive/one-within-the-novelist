- id: plant-anesthesia
  type: real_world
  content: >
    Plants can be rendered unconscious by the same anesthetics that work on
    humans — ether, xenon, lidocaine — and no one knows why, since plants
    have no nervous system.
  source: "Yokawa et al., Annals of Botany, 2018"
  tags: [consciousness, biology, mystery]

- id: dancing-plague
  type: real_world
  content: >
    In July 1518, Frau Troffea began dancing in the street outside her home in Strasbourg and could not stop. Within a month approximately 400 people had joined her; contemporary city records documented multiple deaths from exhaustion, stroke, and heart failure. The Strasbourg city council, acting on physicians' advice that this was a "hot blood" condition requiring release, built wooden stages and hired professional musicians to help the afflicted dance it out — an intervention John Waller argues may have accelerated the epidemic by giving the behavior social sanction. The ergot-poisoning hypothesis widely cited in popular accounts fails because ergotism produces gangrenous limbs and seizures, not sustained rhythmic movement. Waller's competing account — stress-induced mass psychogenic illness triggered by a preceding famine and the local religious-cult expectations around St. Vitus — remains contested because no primary source explains why specifically dancing, specifically then, specifically to death.
  source: "Waller, J., A Time to Dance, a Time to Die (2009); Strasbourg city records, July-September 1518"
  tags: [mass-psychogenic-illness, medieval, body, contested-mechanism, Strasbourg]

- id: turkish-coffee-divination
  type: real_world
  content: >
    In Turkey, after drinking Turkish coffee, the cup is flipped and the
    patterns left by the grounds are read for fortune-telling. Many educated,
    secular Turks participate while insisting they don't believe in it.
  source: "Henkel, Social Analysis, 2005"
  tags: [ritual, belief, social-performance, ambiguity]

- id: radium-girls
  type: real_world
  content: >
    At the United States Radium Corporation's Orange, New Jersey factory (1917-1928), women painting luminous watch dials were instructed to "lip-point" their brushes — moisten the tip with the tongue to produce a fine painting point — between strokes. A single dial contained approximately 0.5 microcuries of radium-226; workers ingested several micrograms daily. When Grace Fryer and four co-workers sued in 1927, the company's defense was that occupational disease was not legally recognized and that workers had freely chosen to put the brushes in their mouths. The lawsuit forced disclosure showing that Cecil Drinker, the company's own medical consultant, had published on radium's dangers in 1925 — three years before the lawsuit — in an industrial-health journal circulated to the same management who continued the lip-pointing protocol. The precedent established by Fryer v. USRC, that companies owe workers a duty to warn of occupational hazards, underlies the later creation of OSHA and the modern framework of industrial-disease compensation.
  source: "Moore, The Radium Girls (2017); Clark, Radium Girls: Women and Industrial Health Reform 1910-1935 (UNC Press, 1997); Fryer v. USRC filings (1927)"
  tags: [labor, cover-up, body, occupational-disease, legal-precedent, industry]

- id: octopus-rna-editing
  type: real_world
  content: >
    Octopuses edit their own RNA at 100x the rate of humans — recoding genetic
    instructions on the fly. This may explain their intelligence but comes at
    the cost of extremely slow DNA evolution.
  source: "Liscovitch-Brauer et al., Cell, 2017"
  tags: [intelligence, adaptation, tradeoff, alien-minds]

- id: last-speaker
  type: real_world
  content: >
    When Boa Sr died in 2010, the Bo language of the Andaman Islands —
    estimated 65,000 years old — died with her. She had spent decades with
    no one to speak it to.
  source: "Survival International, 2010"
  tags: [language-death, isolation, loss, memory]

- id: rubber-hand
  type: real_world
  content: >
    In the rubber hand illusion (Botvinick & Cohen, Nature 1998), watching a fake hand being stroked while the subject's hidden real hand is stroked simultaneously causes the brain to "adopt" the rubber hand within minutes, producing measurable physiological response — increased skin conductance, cooling of the real hand — when the fake is threatened. The unexpected finding is that susceptibility varies reliably by neurological condition: schizophrenia patients experience the illusion faster and more strongly than controls (Thakkar et al. 2011); Parkinson's patients show markedly reduced susceptibility even before motor symptoms emerge (Fiorio et al. 2014). The illusion has become a bedside probe for the body-self boundary — the speed and completeness with which a person can be convinced that a foreign object is their hand correlates with their psychiatric and neurological phenotype. The mechanism remains contested between multisensory-integration theories (the brain forms body-ownership from correlated signals) and predictive-processing accounts (the brain pre-specifies a body-model that updates under correlated evidence); no current model fully explains the clinical-correlate pattern.
  source: "Botvinick & Cohen, Nature 391:756 (1998); Thakkar, Nichols, McIntosh & Park, PLOS ONE 6:e27089 (2011); Fiorio et al., Movement Disorders 29:1091 (2014)"
  tags: [body-ownership, illusion, self, clinical-probe, schizophrenia, parkinsons]

- id: night-witches
  type: real_world
  content: >
    The Soviet 588th Night Bomber Regiment — all-female — flew obsolete plywood
    biplanes on night bombing runs. They'd cut engines and glide silently over
    targets. Germans called them 'Nachthexen' (Night Witches).
  source: "Noggle, A Dance with Death, 1994"
  tags: [war, women, ingenuity, fear, obsolescence]

- id: cathedral-generations
  type: real_world
  content: >
    The stonemasons who began constructing Notre-Dame de Paris in 1163 knew they would never see it finished; the cathedral took 182 years to complete. When the April 2019 fire destroyed the roof and spire, architects examining the surviving medieval oak beams documented growth rings corresponding to trees that had been 300-400 years old when felled in the 1160s — meaning the wood came from French primary-forest oaks that had germinated in the 700s. Those forests no longer exist: France's reforested woodlands produce younger, faster-grown timber with different structural properties. The reconstruction has had to source comparable aged oaks from private estates where inherited forests were preserved and from Louis XIV's 1670s Forêt de Bercé navy-reserve plantings, which are only now — 350 years later — reaching usable age. The cathedral was built on a timescale whose raw materials cannot be replaced within the timescale of any existing institution.
  source: "Erlande-Brandenburg, Notre-Dame de Paris (1997); Notre-Dame reconstruction engineering reports (2019-2024)"
  tags: [craft, time, material-resource, irreplaceable, forest, France]

- id: prison-chess
  type: real_world
  content: >
    During apartheid, political prisoners on Robben Island played chess using
    pieces carved from soap and boards scratched into cell floors. When guards
    confiscated the sets, players switched to mental chess — announcing moves
    through cell walls by tapping.
  source: "Sobukwe & Alexander oral histories, Robben Island Museum archives"
  tags: [resistance, abstraction, confinement, ingenuity]

- id: seed-vault-flood
  type: real_world
  content: >
    The Svalbard Global Seed Vault — designed to survive any catastrophe — was
    breached by meltwater in 2017 due to permafrost thaw no one had predicted.
    The vault built to protect against the end of the world was threatened by
    the process that might cause it.
  source: "The Guardian, May 19, 2017"
  tags: [irony, preservation, climate, hubris]

- id: feral-children-language
  type: real_world
  content: >
    Genie Wiley, isolated from language until age 13 (discovered in Los Angeles, November 1970), could acquire vocabulary normally after rescue but never mastered grammatical sequence. She produced phrases like "applesauce buy store" and "want Curtiss play piano me" but never "the applesauce at the store" or "I want Curtiss to play piano with me." Susan Curtiss, who worked with Genie for seven years, documented that her syntactic error pattern closely resembles the agrammatism of adult patients with Broca's aphasia — suggesting her developmental window for the specific neural substrate of syntax had closed while semantic and lexical systems remained plastic. The critical-period hypothesis for language is widely stated but mechanistically specific: not a general "language window" that closes, but a staggered closure of subsystems, with syntax being the earliest and most irrecoverable. Genie's case ended legally when researchers' custody disputes caused her transfer out of academic supervision; she was never taught again, and no subsequent recovered isolate has reached her age of discovery with comparable documentation.
  source: "Curtiss, S., Genie: A Psycholinguistic Study of a Modern-Day 'Wild Child' (Academic Press, 1977); Curtiss, Fromkin, Krashen, Rigler & Rigler, Language 50:528-554 (1974)"
  tags: [language, development, critical-period, syntax, isolation, irreversibility]

- id: fetal-microchimerism
  type: real_world
  content: >
    Male fetal DNA has been found in 63% of women's brains, persisting up to
    age 94. Women who never carried a male pregnancy to term sometimes test
    positive — the source may be a miscarried fetus they never knew about, or
    an older sibling absorbed in utero. You carry your children in your brain,
    including the ones you lost before you knew them.
  source: "Chan et al., PLOS ONE, 2012"
  tags: [identity, parenthood, biology, boundaries, loss]

- id: tapeworm-ant-royalty
  type: real_world
  content: >
    A tapeworm (Anomotaenia brevis) triples the lifespan of infected ants,
    making their survival curves identical to queens. It alters the ant's
    cuticle chemistry so nestmates groom and feed the infected worker more
    attentively than they feed the actual queen. The colony reorganizes its
    entire care hierarchy around a chemical lie.
  source: "Gál et al., Royal Society Open Science, 2021"
  tags: [parasitism, deception, status, care, identity]

- id: capgras-patient-ds
  type: real_world
  content: >
    Patient DS recognized his parents' voices on the telephone but insisted
    their faces were impostors when he saw them. Galvanic skin response testing
    confirmed zero autonomic response to familiar faces. His brain could
    identify the faces cognitively but felt nothing — and 'they are impostors'
    was the most rational interpretation of his actual experience.
  source: "Hirstein & Ramachandran, Proc. R. Soc. Lond. B, 1997"
  tags: [recognition, feeling, identity, rationality, family]

- id: operation-bernhard-palestine
  type: real_world
  content: >
    Nazi Germany forged £300 million in British banknotes to destabilize
    Britain's economy. The airdrop plan was abandoned. A documented fraction
    of the forged notes ended up funding illegal Jewish emigration to Palestine
    in defiance of the British blockade. A weapon of economic destruction,
    repurposed as a tool of rescue for the people that same regime was
    exterminating.
  source: "Bank of England Museum; Smithsonian Magazine"
  tags: [war, irony, rescue, repurposing, moral-complexity]

- id: atlantic-cable-destroyed
  type: real_world
  content: >
    The first transatlantic telegraph cable (1858) was destroyed by its chief
    electrician, Wildman Whitehouse, who applied 2,000+ volts to fix declining
    signals — ignoring the cable's specs and Lord Kelvin's warnings. The
    insulation burned through in three weeks. The most ambitious communication
    technology of the century was killed by the intensity of the attempt to
    use it.
  source: "Atlantic Cable archive; PBS American Experience"
  tags: [technology, hubris, repair, destruction, expertise]

- id: gallipoli-1854-map
  type: real_world
  content: >
    The ANZAC landing at Gallipoli was misdirected by a map drawn from an
    1854 French survey — sixty-one years before the invasion, for a different
    empire's different war. Troops landed at the base of sheer cliffs instead
    of a planned gentle slope. Men died based on a measurement no one had
    checked in six decades.
  source: "Australian War Memorial; USNI Proceedings, June 1995"
  tags: [maps, inherited-information, war, friction, institutional-inertia]

- id: radiologist-gorilla
  type: real_world
  content: >
    83% of expert radiologists failed to notice a gorilla image embedded in
    a CT scan — 48 times the size of a typical lung nodule — after their eyes
    had passed directly over it. Eye-tracking confirmed they looked at its
    location. Their training had tuned their visual system so specifically
    that the anomalous was filtered out at the perceptual level.
  source: "Drew, Võ & Wolfe, Psychological Science, 2013"
  tags: [expertise, perception, blindness, training, attention]

- id: phantom-telescoping
  type: real_world
  content: >
    In 30-50% of upper-limb amputees, the phantom hand gradually retreats
    through the phantom forearm until it is felt as protruding directly from
    the stump. The brain's map of the body folds inward. The lost limb
    doesn't disappear — it migrates and compresses into what's left.
  source: "Schmalzl et al., Frontiers in Human Neuroscience, 2011"
  tags: [body, loss, compression, phantom, persistence]

- id: antarctic-social-faultlines
  type: real_world
  content: >
    In 40 years of studying 1,100+ Antarctic overwinterers, the primary
    stressor is not cold, darkness, or isolation — it is interpersonal
    conflict along the social identities people brought with them. Scientists
    vs. support staff ('beakers' vs. 'toasties'), nationality, gender. We do
    not form new identities under pressure; we deepen the ones we carried in.
  source: "Palinkas, 40-year study; Cravalho, 'Toast on Ice,' Ethos, 1996"
  tags: [confinement, identity, conflict, group-dynamics, pressure]

- id: shu-syndrome-voices
  type: real_world
  content: >
    Stuart Grassian documented a specific psychiatric syndrome in 200+ supermax
    prisoners in extended solitary. Random sounds begin to take on meaning and
    frightening significance. One prisoner: 'I hear noises, can't identify
    them — starts to sound like sticks beating men.' A third reported whispered
    voices. Not pre-existing psychosis — it reverses on release. The mind,
    deprived of signal, generates signal from noise.
  source: "Grassian, Washington U. Journal of Law & Policy, 2006"
  tags: [isolation, perception, signal, noise, confinement]

- id: valproate-critical-window
  type: real_world
  content: >
    A drug (valproate, an HDAC inhibitor) can temporarily reopen the critical
    learning window for absolute pitch in adults. The barrier to adult
    acquisition is not biological incapacity but an epigenetic lock that can
    be briefly picked. Then the window re-closes. Some forms of 'too late'
    are molecular decisions, not destiny.
  source: "Gervain et al., Frontiers in Systems Neuroscience, 2013"
  tags: [learning, irreversibility, critical-period, epigenetics, second-chances]

- id: rw-entomophthora-necrophilia
  type: real_world
  content: >
    Dead female flies infected with Entomophthora muscae become sexually
    irresistible to healthy males — and the longer the fly has been dead,
    the more attractive she becomes. The fungus produces volatile
    sesquiterpenes and modifies the corpse's cuticular hydrocarbons to
    amplify sexual signaling. 73.3% of males that contact late-stage
    cadavers become infected. The chemistry of desire has been hijacked
    by something that needs the desire to function but has no use for
    the desirer.
  source: "Naundrup et al., ISME Journal, 2022"
  tags: [parasitism, desire, death, chemistry, signal-hijacking]

- id: rw-nanoarchaeum-borrowed
  type: real_world
  content: >
    Nanoarchaeum equitans has the smallest known archaeal genome —
    490,885 base pairs — and possesses no genes for energy metabolism,
    lipid synthesis, amino acid production, or cofactor biosynthesis. It
    cannot do anything life requires. It exists by borrowing everything
    from its host, down to the molecular level. It is alive in the same
    way a debt is real: only because something else is paying for it.
  source: "Waters et al., PNAS, 2003"
  tags: [parasitism, existence, dependency, minimalism, borrowed-life]

- id: rw-tmao-depth-ceiling
  type: real_world
  content: >
    Fish cannot biologically exist below approximately 8,200 meters. The
    osmolyte they use to counteract deep-sea pressure — TMAO — becomes
    isosmotic with seawater at that depth, creating a hard biochemical
    ceiling. Below this line, the deepest 25% of the ocean floor, no
    vertebrate can survive. Not because of predators or temperature —
    because of a molecular equation that simply stops working. The abyss
    has a lock, and it's chemical.
  source: "Yancey et al., PNAS, 2014"
  tags: [depth, limit, biochemistry, ocean, inaccessible]

- id: rw-kbc-void-center
  type: real_world
  content: >
    The Milky Way sits near the center of the KBC Void — a region of
    space approximately 2 billion light-years across where galaxy density
    is 20-50% below the cosmic average. We are not at a typical location
    in the universe. We are in a hole. Our measurements of cosmic
    expansion may be systematically biased by the emptiness we're sitting
    in, which means our picture of the universe's fate may be an artifact
    of our address. The science is contested — but the possibility that
    our cosmology is a local hallucination is not.
  source: "Keenan, Barger & Cowie, Astrophysical Journal, 2013"
  tags: [cosmology, void, measurement-bias, position, emptiness]

- id: rw-syncytin-viral-placenta
  type: real_world
  content: >
    The protein that fuses cells to form the human placenta — syncytin —
    is a repurposed retroviral envelope protein. A virus infected a
    mammalian ancestor, its gene was captured and domesticated, and it
    now builds the organ that connects mother to child. This happened
    independently at least ten times across mammalian lineages, always
    from different retroviruses. Mammalian reproduction is built on viral
    machinery. The most intimate biological connection we have was
    engineered by a parasite.
  source: "Dupressoir et al., Placenta, 2012; Heidmann group, multiple PNAS papers 2000-2014"
  tags: [virus, reproduction, parasitism, intimacy, convergent-evolution]

- id: rw-ozu-pillow-shots
  type: real_world
  content: >
    Yasujirō Ozu punctuated his films with "pillow shots" — a vase, an
    empty corridor, laundry on a line — inserted between scenes with no
    narrative function. They don't advance plot or symbolize anything.
    Scholars have spent decades arguing what they mean. Ozu never
    explained. Asked about the vase in Late Spring, he talked about
    duration, not meaning.
  source: "Bordwell, Ozu and the Poetics of Cinema, 1988; Schrader, Transcendental Style in Film, 1972"
  tags: [cinema, negative-space, juxtaposition, attention, ozu, kishōtenketsu]

- id: rw-nintendo-invisible-teaching
  type: real_world
  content: >
    In the most celebrated Super Mario levels, the moment where the
    player grasps a new concept occurs in a space with no enemies, no
    timer pressure, no penalty. The challenge comes after understanding,
    never during it. The designer's entire craft is arranging conditions
    so the player has the experience of insight — and believes they
    arrived at it alone. Hundreds of millions of people have been taught
    by this structure. None of them knew they were being taught.
  source: "Miyamoto design philosophy; Koizumi, GDC 2007; Game Maker's Toolkit analysis of World 1-1"
  tags: [game-design, invisible-architecture, teaching, arrangement, kishōtenketsu]

- id: rw-permian-uv-sterilization
  type: real_world
  content: >
    The eruption that drove the Permian-Triassic extinction — which
    killed 96% of marine species — destroyed the ozone layer through
    halogen outgassing from the Siberian Traps. A 2023 study found
    direct fossil evidence: ultraviolet-absorbing compounds spiked in
    plant spores precisely at the extinction boundary. The surface of
    the earth was sterilized by its own sun. The mechanism was the same
    chemistry as human CFC emissions, at geological scale.
  source: "Fielding et al., Science Advances, 2023"
  tags: [extinction, sun, chemistry, deep-time, sterilization]

- id: rw-cotard-denial-existence
  type: real_world
  content: >
    Jules Cotard described the syndrome in 1880 with the case of a patient who believed she had no brain, no nerves, no chest, no stomach, and no intestines, that her body was made of skin and bones alone, and that she therefore had no need to eat — she starved to death. PET imaging of patients with Cotard's syndrome shows bilateral posterior cortical hypometabolism; two cases reported in 2021 with anti-NMDAR encephalitis showed that the same delusion arises from a specific glutamate-receptor autoimmune attack, not only from psychiatric disease. The mechanism dispute is between a disconnection theory (the emotional response that normally confirms one's own existence is absent, and "I am dead" is the most logical inference) and a fronto-limbic disinhibition theory (the prefrontal reality-monitoring system fails to reject an implausible self-model). The fact that survives all mechanistic accounts is that patients with Cotard's delusion continue to breathe, eat when pushed, feel pain, and report extreme anxiety: their body continues to register self-preservation drives while their declared belief is that there is no self to preserve.
  source: "Ramirez-Bermudez et al., Neurocase 2021; Ozkan & Caliyurt, ANZJP 2016; original Cotard 1880"
  tags: [self, denial, consciousness, death, body, delusion]

- id: rw-akinetopsia-lm
  type: real_world
  content: >
    In 1983, Josef Zihl reported a 43-year-old woman referred to as patient LM who, following bilateral posterior occipital damage, lost the ability to perceive motion while retaining normal form, color, depth, and object recognition: she described pouring tea as watching a static arc of liquid that would suddenly "jump" to a different position — the cup would simply be full. She could not track moving faces in conversation, could not cross a street safely (she could see cars but had no sense of their approach), and could not pour liquid without overflow. The finding localized area V5/MT as a dedicated motion-processing region, separable from the rest of visual cortex. What remains contested is whether LM's motion blindness was complete or whether low-level motion sensitivity survived under certain conditions: Rizzo et al. (Brain, 1995) found residual motion detection in comparable cases. The irreducible strangeness of LM's experience is that she inhabited a world of photographs — fully lit, fully detailed, fully colored — that moved only in discrete jumps she never witnessed.
  source: "Zihl, von Cramon & Mai, 'Selective disturbance of movement vision,' Brain 106(2):313-340 (1983); Zihl & Heywood, Frontiers in Integrative Neuroscience 9:6 (2015)"
  tags: [motion, perception, V5-MT, visual-cortex, phenomenology, akinetopsia]

- id: rw-lexical-gustatory-jiw
  type: real_world
  content: >
    Subject JIW, documented in detail by Ward and Simner in 2003, experiences an automatic, involuntary taste whenever he hears or reads words: "jail" tastes of cold hard bacon; "castle" tastes of stewed apple; "Derek" tastes of earwax. The taste is not metaphorical — it is subjectively located in his mouth, with specific temperature and texture. The phoneme /mIns/ in any word triggers the taste of mince, regardless of semantic context — so the relationship is phonological, not simply semantic — but the tastes also track semantic associations (the word "blue" tastes "inky"), suggesting the synesthesia operates at multiple levels simultaneously. The contested mechanism is whether cross-cortical wiring between auditory-language and gustatory cortex was present from birth and selectively not pruned, or whether the synesthesia is mediated at the conceptual level — an associative bleed from the semantic system into the taste system, making every word a compressed sensory encyclopedia.
  source: "Ward & Simner, 'Lexical-gustatory synaesthesia,' Cognition 89(3):237-261 (2003)"
  tags: [synesthesia, language, taste, phoneme, cross-modal, JIW]

- id: rw-deja-vecu-persistent
  type: real_world
  content: >
    Moulin and colleagues documented two patients who experienced not the brief, self-correcting flash of déjà vu — the sense of having seen something before that resolves in seconds — but an unremitting, permanent conviction that every present moment had already been fully experienced: one patient stopped watching the news because "nothing was news," refused to read new books because he had "already read them all," and became progressively withdrawn as every conversation felt like a repetition. Déjà vu is proposed to involve erroneous familiarity (recognition without recollection); déjà vécu involves erroneous recollection (the person is not just "recognizing" the present but specifically "remembering" it, with content and context that feel exact). Both patients had temporal lobe epilepsy, implicating perirhinal and parahippocampal regions that generate recollective confidence signals. The signal that tells the brain "this moment has a memory attached" had become permanently switched on — not for any specific memory, but for every moment as it arrived. There was no new experience: every present moment was simultaneously its own ghost.
  source: "Moulin, Conway, Thompson, James & Jones, 'Disordered memory awareness,' Neuropsychologia 43(9):1362-1378 (2005)"
  tags: [memory, recollection, familiarity, temporal-lobe, deja-vu, epistemic]

- id: rw-fatal-familial-insomnia
  type: real_world
  content: >
    Fatal familial insomnia is caused by a single mutation at codon 178 of the prion protein gene combined with methionine homozygosity at codon 129 — a pairing found in approximately 40 families worldwide — and kills with absolute regularity in 7 to 18 months through a progression from autonomic instability to hallucinatory stupor to complete obliteration of sleep. What the EEG shows is that the brain cannot produce the spindles and slow waves that constitute sleep architecture while the person remains conscious: the thalamic nuclei specifically responsible for organizing sleep are selectively destroyed by misfolded prion protein — the brain still fires, the person remains aware, but the specific program that would allow sleep to execute cannot run. What no account has fully explained is why the D178N mutation, which also causes Creutzfeldt-Jakob disease in people who are methionine/valine heterozygous at codon 129, preferentially destroys thalamic circuitry in FFI patients rather than diffuse cortical tissue — the same prion, the same misfolding pathway, a different anatomical target determined by a single amino acid difference at a distant codon.
  source: "Gambetti et al., 'Fatal Familial Insomnia, a Prion Disease,' NEJM 326(7):444-449 (1992)"
  tags: [prion, sleep, thalamus, death, genetics, FFI]

- id: rw-rem-behavior-disorder
  type: real_world
  content: >
    In REM sleep behavior disorder, the brainstem inhibitory nuclei that normally suppress motor output during REM sleep — producing the atonia that keeps dreaming bodies still — degenerate, and patients begin acting out their dreams: punching, kicking, shouting, leaping from bed, with full recall of the dream content when woken. The syndrome was initially classified as a parasomnia of unknown cause; it is now recognized as the earliest detectable manifestation of alpha-synuclein pathology, and longitudinal follow-up studies show that more than 80% of patients with "idiopathic" RBD will develop Parkinson's disease, dementia with Lewy bodies, or multiple system atrophy within 10 to 15 years — often before any waking motor or cognitive symptom appears. The pontine tegmentum can be significantly damaged before the dopamine systems and cortical circuits that underlie Parkinson's waking symptoms begin to fail. The patient acts out a disease in their sleep that will one day act on them while awake.
  source: "Howell & Schenck, 'REM Sleep Behavior Disorder and Neurodegenerative Disease,' JAMA Neurology 72(6):707-712 (2015); Postuma et al., Nature Reviews Neurology 13:710-721 (2017)"
  tags: [REM, sleep, Parkinson, synuclein, brainstem, biomarker, prodrome]

- id: rw-greenland-shark-maturity
  type: real_world
  content: >
    The Greenland shark (Somniosus microcephalus) is the longest-lived vertebrate known: radiocarbon dating of eye-lens nuclei in 28 females — exploiting the 1960s nuclear-bomb-pulse carbon-14 as a time marker — established a maximum age of 392 ± 120 years and confirmed that females do not reach sexual maturity until at least 156 ± 22 years old. The animals grow at approximately 1 cm per year. The molecular mechanism underlying this extreme longevity is unknown; the proposed explanation — cold body temperature and low metabolic rate — fails to distinguish the species from other cold-water sharks that live ordinary lifespans. The disturbing implication is that 156 years of existence, the equivalent of a full human lifetime, is the Greenland shark's pre-reproductive juvenile phase.
  source: "Nielsen et al., 'Eye lens radiocarbon reveals centuries of longevity in the Greenland shark,' Science 353(6300):702-704 (2016)"
  tags: [longevity, temporal-alienness, development, lifespan, arctic, biology]

- id: rw-saiga-mass-death
  type: real_world
  content: >
    In May 2015, 211,000 saiga antelopes — more than 60% of the global population — died across three separate herds in Kazakhstan within a three-week window, exhibiting a 100% case fatality rate in affected groups. Pasteurella multocida type B bacteria, normally commensal in the saiga's distinctive bulbous nasal passages, were confirmed as the proximate cause: unusually high temperature and humidity triggered bacterial proliferation and transition to virulent hemorrhagic septicemia. The disturbing unresolved problem is synchrony: why all individuals across geographically separated herds died simultaneously, with no survivors, despite enormous variation in age, sex, condition, and microhabitat exposure. The mechanism by which a weather anomaly converts a nasal commensal into a 100%-lethal systemic pathogen, identically in every individual across entire populations, remains unknown.
  source: "Kock et al., Science Advances 4:eaao2314 (2018); Fereidouni et al., Emerging Infectious Diseases 25(6):1169 (2019)"
  tags: [mass-death, bacteria, synchrony, threshold, ecology, commensal-turn-lethal]

- id: rw-mantis-shrimp-barcode
  type: real_world
  content: >
    Mantis shrimp (stomatopods) possess 12-16 narrowly tuned photoreceptor classes spanning 300-720 nm — the most complex retinal architecture in the animal kingdom. Contrary to the assumption that more receptor types produce finer discrimination, behavioral wavelength-discrimination tests show stomatopods perform significantly worse than trichromats at distinguishing similar wavelengths. The 2014 Thoen et al. study demonstrated that they do not use opponent-processing at all: photoreceptors act as a temporal barcode system, scanning a target across 12 spectral channels sequentially and comparing firing patterns to an internal library, enabling rapid identification rather than fine discrimination. The functional reason for 12-16 channels when 4 would produce better discrimination is not established; the favored hypothesis is extremely rapid color recognition in aggressive, signal-dense reef environments, but this remains untested.
  source: "Thoen, How, Chiou & Marshall, 'A Different Form of Color Vision in Mantis Shrimp,' Science 343(6169):411-413 (2014)"
  tags: [perception, alien-cognition, color-vision, sensory-systems, categorization, mantis-shrimp]

- id: rw-rhizanthella-underground
  type: real_world
  content: >
    Rhizanthella gardneri is one of two known plant species that complete their entire life cycle underground — germination, growth, flowering, and seed set — without ever emerging above the soil surface. It has no leaves and cannot photosynthesize; it obtains all nutrients via a three-way mutualism: a Rhizoctonia fungus connects it to the root system of the aboveground Melaleuca uncinata shrub, which transfers carbon to the orchid through the fungal bridge. Pollination is believed to be performed by termites or other soil invertebrates — making it the only plant with suspected subterranean insect pollination — though this remains unconfirmed. As of 2025, fewer than three confirmed wild individuals are known to exist. The disturbing fact is that this plant produces flowers no vertebrate has ever seen, for pollinators that navigate underground, inside a symbiosis that operates across three kingdoms.
  source: "Bougoure et al., New Phytologist 186(4):947-956 (2010); Thorogood, Plants People Planet 1(3):153-156 (2019)"
  tags: [subterranean, symbiosis, invisibility, orchid, underground-life, pollination]

- id: rw-planarian-head-memory
  type: real_world
  content: >
    Dugesia japonica planarian flatworms were trained to navigate a textured surface for food over two weeks, establishing a conditioned preference. When heads were removed and allowed to fully regenerate over 14 days — during which all neurons encoding any synaptic memory were replaced by new cells grown from pluripotent stem cells — the animals retained the trained preference in the new brain. The proposed mechanisms are storage in the bioelectric field of the body, or in RNA distributed through non-neural tissue; no consensus explanation exists. A 2026 Harvard group failed to replicate classical conditioning in planarians using a different paradigm, but the Shomrat/Levin illumination-aversion protocol remains unretracted. The disturbing implication: memory is not stored in the neurons that encode it.
  source: "Shomrat & Levin, Journal of Experimental Biology 216(20):3799 (2013); Blackiston, Shomrat & Levin, Communicative & Integrative Biology 8(5) (2015)"
  tags: [memory, regeneration, decapitation, bioelectricity, planarian, body-without-brain]

- id: rw-muon-g2-contradiction
  type: real_world
  content: >
    The muon's anomalous magnetic moment (aμ) can be measured with 0.20 parts-per-million precision and, within the Standard Model, should be calculable to comparable precision. The Fermilab measurement disagrees with the Standard Model prediction derived from decades of electron-positron collision data (dispersive hadronic vacuum polarization) by 5.1 standard deviations — sufficient to claim new physics. However, a competing lattice QCD calculation (the BMW group) predicts a value consistent with the experimental measurement — meaning the two Standard Model theoretical approaches now disagree with each other by roughly 3σ. As of 2023, the Theory Initiative's conclusion is that the discrepancy cannot yet be interpreted as evidence for new physics, because it is unclear which theoretical framework is wrong. We have an anomaly that we cannot use.
  source: "Aguillard et al. (Muon g-2 Collaboration), Physical Review Letters 131, 161802 (2023); Muon g-2 Theory Initiative 2023 status statement"
  tags: [particle-physics, muon, Standard-Model, lattice-QCD, anomaly, self-contradicting-theory]

- id: rw-voynich-statistical-reversal
  type: real_world
  content: >
    The Voynich Manuscript's text (Beinecke MS 408, ca. 1404-1438) was long considered too statistically ordered to be meaningless: it follows Zipf's law and shows consistent word-structure patterns that linguists associate with natural language. In 2022, Gaskell and Bowern at Yale recruited 42 volunteers to write intentional gibberish and found that human-produced nonsense replicates nearly all of these properties — including Zipf's law — because writers unconsciously model what language "should" look like. A machine-learning classifier trained to distinguish meaningful text from gibberish identified most Voynich transcriptions as more closely resembling gibberish than any known language. The manuscript has two statistically distinct "languages" (Currier A and B, identified 1976), written in different hands, distributed non-randomly across its sections — an internal structure no simple hoax hypothesis explains. Neither the language hypothesis nor the gibberish hypothesis can account for everything.
  source: "Gaskell & Bowern, 'Gibberish after all?' CEUR Workshop Proceedings Vol. 3313 (2022); Bowern & Lindemann, Annual Review of Linguistics 7:285-308 (2021)"
  tags: [language, forgery, statistics, undeciphered, Yale, meaning-collapse, manuscript]

- id: rw-antikythera-missing-front
  type: real_world
  content: >
    When the Antikythera Mechanism's 82 surviving fragments were scanned with X-ray CT in 2005, researchers decoded the rear dials completely: they computed the Saros eclipse cycle, predicted lunar and solar eclipses with time-of-day information, and tracked a 19-year Metonic calendar. The front of the mechanism was different: inscriptions revealed it was meant to display the motions of all five known planets, the Sun, and the Moon in a single geocentric model combining Babylonian astronomical data with mathematical principles from Plato's Academy. But Fragment A, which holds 27 of the surviving 30 gears, contains no surviving gearing that corresponds to this planetary display — the mechanism for showing the planets in motion either occupied the lost two-thirds of the machine or used a gearing system for which no physical evidence survives. The 2021 Freeth et al. reconstruction is elegant but remains a hypothesis built on inscription evidence alone.
  source: "Freeth et al., 'A Model of the Cosmos in the ancient Greek Antikythera Mechanism,' Scientific Reports (March 2021); Freeth & Jones, ISAW Papers 4 (2012)"
  tags: [Ancient Greece, mechanism, astronomy, reconstruction, incomplete, evidence-gap]

- id: rw-theremin-thing-passive
  type: real_world
  content: >
    "The Thing" had no power source, no battery, no active electronic components, and no wires — it was entirely passive. Concealed inside a hand-carved wooden replica of the Great Seal of the United States presented to US Ambassador Averell Harriman on August 4, 1945 by a Soviet children's organization, it consisted of a capacitive membrane connected to a quarter-wavelength antenna sealed inside a resonant cavity. Soviet operatives "illuminated" it from a van parked outside by transmitting a radio signal of the correct frequency; the sound waves in Harriman's study vibrated the membrane, which modulated the reflected signal back to the van. When the illuminating signal was turned off, the device was electronically silent and essentially undetectable by the sweep methods of the era. It operated for seven years without discovery; the NSA now identifies this class of device as an RFID ancestor. Léon Theremin, the device's inventor — better known for inventing the theremin musical instrument — had been "repatriated" to the Soviet Union in 1938 under coercive circumstances and worked under NKVD supervision.
  source: "CIA, 'Compromise of the Great Seal' (May 26, 2020); CryptoMuseum 'The Thing (Great Seal Bug)'"
  tags: [Cold War, espionage, listening device, Theremin, passive, RFID, resonance, Soviet]

- id: rw-stasi-infinite-puzzle
  type: real_world
  content: >
    In November 1989, as the Berlin Wall fell, Stasi employees began shredding the files of East Germany's state surveillance apparatus; when the shredders broke under the volume, they tore 45 million documents by hand and stuffed the pieces into 16,000 sacks, intending to burn or pulp them later. Citizens stormed the Stasi's East Berlin headquarters on January 15, 1990, and the sacks were preserved — an estimated 600 million fragments recording the monitored lives of six million East Germans. In 2019, a team of ten workers was still reassembling them by hand; at that rate, the project would take between 400 and 800 years to complete. Fraunhofer Institute's E-Puzzler software — the same program used to reconstruct shattered pieces of the Terracotta Army — processed approximately 91,000 pages from 23 of the 16,000 bags by 2007, leaving 15,977 bags untouched. Workers often spend multiple years on a single bag without knowing what the document will look like when completed.
  source: "Stasi Records Archive (BStU), 'The Reconstruction of Torn Documents'; AFP/France24 (November 4, 2019)"
  tags: [East Germany, Stasi, surveillance, reconstruction, fragments, Cold War, archive, labor]

- id: rw-hyatt-walkway-phone-approval
  type: real_world
  content: >
    The Hyatt Regency Hotel walkway collapse (Kansas City, July 17, 1981; 114 killed, 216 injured) resulted from a fabricator's proposed design change approved by engineer Daniel Duncan over the telephone without performing a load analysis. The second and fourth floor walkways had been designed to hang from the atrium ceiling by a single set of continuous rods; the fabricator proposed changing this to two sets of separate rods, with the second-floor walkway hanging from the fourth-floor walkway rather than directly from the ceiling. The modification doubled the load on the fourth-floor box-beam connections, which were already at only 60 percent of what the local building code required. At 7:19 PM on a Friday, during a crowded tea dance, both walkways fell. Jack Gillum, the engineer of record, returned home to find his phone ringing; he performed the calculation that night at 3 AM and found the connection "grossly inadequate."
  source: "Marshall et al., 'Investigation of the Kansas City Hyatt Regency Walkways Collapse,' NBSIR 82-2465 (NBS, February 1982); Rechtien, Structure Magazine (March 2014)"
  tags: [engineering, structural-failure, design-change, load-calculation, accountability, "1981", walkway]

- id: rw-deodand-guilty-wheel
  type: real_world
  content: >
    Under English common law from approximately the 11th century to 1846, any chattel — a horse, a wheel, a vat, a ship's hull — that caused a human death was legally guilty and forfeited to the Crown "for pious uses" (deodand, from Latin deo dandum, "to be given to God"); the court was required to appraise its value, and the owner paid a fine equal to that value. The law made a precise mechanical distinction: if a person fell from a stationary cart and died, only the wheel that struck them was forfeited; if the cart was moving, the entire cart and its load were guilty together — a doctrine Blackstone could not fully explain, attributing it vaguely to the owner being "more usually at fault" when things were in motion. By the early nineteenth century, coroner's juries were routinely refusing to apply the doctrine — its annual yield to the Crown was approximately £700-800 — but it could not be easily abolished because it was common law. What finally destroyed it was the railways: the doctrine logically required forfeiting entire locomotives and their passenger cars in fatal accidents, and the absurdity of forfeiting a £30,000 steam engine made parliamentary reform unavoidable in 1846.
  source: "Deodands Act 1846 (9 & 10 Vict. c. 62); Blackstone's Commentaries; Freiberg & Fox, Australian Journal of Legal History 6(1) (2000)"
  tags: [English-law, deodand, forfeiture, railways, medieval, guilt, inanimate-object, "1846"]

- id: rw-25th-amendment-section4
  type: real_world
  content: >
    The Twenty-Fifth Amendment's Section 4, ratified February 10, 1967, provides the only constitutional mechanism to remove a president involuntarily without impeachment: the Vice President and a majority of "principal officers of the executive departments" must transmit a written declaration to the Speaker and President pro tempore that the president is "unable to discharge" the office. As of 2026, every other section of the amendment has been invoked at least once, but Section 4 has never been used. The term "unable" is defined nowhere in the Constitution or in any statute, leaving the operative threshold entirely to the discretion of the officials who would execute it. The structural paradox is that the Vice President who initiates the process would immediately assume power, and the Cabinet officers who must concur all serve at the pleasure of the president they would be removing.
  source: "U.S. Const. amend. XXV, §4; CRS Report R45394; LII Constitutional Annotated"
  tags: [constitutional-law, succession, structural-paradox, executive-branch, US, never-invoked]

- id: rw-fisc-exparte-court
  type: real_world
  content: >
    The Foreign Intelligence Surveillance Court, established by the Foreign Intelligence Surveillance Act of 1978, operates entirely ex parte: only the government presents; there is no opposing counsel, no adversarial argument, and all proceedings are classified. Between 1979 and 2012, the court received 33,900 surveillance requests and denied eleven — a 99.97% approval rate that is frequently cited as evidence of rubber-stamping. The court's formal defense is that it modified 24.4% of requests before granting approval in one monitored quarter, but the adversarial-process critique remains: a court that has never seen a counter-argument cannot know what arguments it is missing. The court's eleven sitting judges are appointed by the Chief Justice of the Supreme Court, with no congressional confirmation and no public application process.
  source: "Clarke, 'Is the Foreign Intelligence Surveillance Court Really a Rubber Stamp?' Stanford Law Review 66 Online 125 (2014); EPIC FISA statistics"
  tags: [surveillance-law, FISA, courts, ex-parte, classified, judicial-approval]

- id: rw-butterfly-ballot-2000
  type: real_world
  content: >
    In the 2000 U.S. presidential election, Palm Beach County, Florida used an offset two-page "butterfly ballot" that placed candidates in alternating rows across facing pages; voters who intended to select Al Gore by punching the second hole instead selected Pat Buchanan, whose name appeared at the top of the right-hand page. A peer-reviewed study in the American Political Science Review (2001) found the butterfly ballot caused more than 2,000 Democratic voters to vote accidentally for Buchanan — a figure larger than George W. Bush's certified Florida margin of 537 votes. The statistical signature was unambiguous: in Palm Beach County, Buchanan's share of election-day ballots was four times his share on absentee ballots cast on the same non-butterfly design, a discrepancy not found in any other Florida county. The ballot was designed by local elections supervisor Theresa LePore, approved in part to make text large enough for elderly voters with vision impairments — an accessibility accommodation that flipped a presidential election.
  source: "Wand et al., 'The Butterfly Did It,' American Political Science Review 95(4) (2001)"
  tags: [election-design, ballot, accessibility, Florida-2000, statistical-anomaly, butterfly-ballot]

- id: rw-bir-tawil-unclaimed
  type: real_world
  content: >
    Bir Tawil is a 2,060 km² quadrilateral on the Egypt-Sudan border that neither country claims, the result of two conflicting boundary-drawing instruments: an 1899 straight-line political boundary and an 1902 administrative boundary that deviated to accommodate tribal territory. Egypt asserts the 1899 line because it gives Egypt the more strategically valuable Halaib Triangle; Sudan asserts the 1902 line for the same reason. The direct consequence is that each country's preferred border puts Bir Tawil on the other country's side — and both countries prefer to leave it unclaimed rather than accept the version of the border that gives them Bir Tawil but costs them the triangle. As of 2024, Bir Tawil is the only inhabited or habitable territory on Earth claimed by no recognized government, a condition produced not by abandonment but by each party's active preference for a competing claim elsewhere.
  source: "1899 and 1902 Egypt-Sudan boundary instruments; De Facto Borders (defactoborders.org)"
  tags: [territorial-anomaly, unclaimed-land, border-dispute, Egypt-Sudan, terra-nullius, competing-claims]

- id: rw-reality-winner-microdots
  type: real_world
  content: >
    On June 3, 2017, Reality Winner — a 25-year-old U.S. Air Force veteran and NSA linguist with a Top Secret/SCI clearance — was arrested after printing and mailing a single classified NSA intelligence report to The Intercept, which concerned evidence of Russian military intelligence operations targeting U.S. voter registration systems in the 2016 election. The Intercept's editorial process inadvertently revealed her as the source: the outlet photographed and published the original document, and FBI examiners used the document's unique printer tracking dots — microscopic yellow steganographic marks embedded by the printer in every page — to identify the specific machine, and thus the six employees who had printed it. On August 23, 2018, Winner was sentenced to 63 months in federal prison — the longest sentence ever imposed for unauthorized disclosure of government information to the media — under a plea deal that precluded her from arguing that the disclosed information served the public interest. The document she leaked was classified for release no earlier than May 2042.
  source: "Winner plea and sentencing records (USDC Southern District of Georgia, 2018); Reuters and BBC coverage (Aug. 23, 2018)"
  tags: [whistleblower, surveillance, NSA, espionage-act, forensics, microdots, steganography]

- id: rw-fort-laramie-billion
  type: real_world
  content: >
    The Fort Laramie Treaty of 1868, between the United States and the Sioux Nation, designated the Black Hills as "unceded Indian Territory" for the exclusive use of Sioux peoples; when gold was discovered in the Black Hills in 1874, the U.S. government confiscated the territory. In 1980, the U.S. Supreme Court ruled in United States v. Sioux Nation of Indians (448 U.S. 371) that the confiscation was a taking without just compensation, constituting an act of bad faith, and awarded more than $100 million including interest. The Sioux Nation refused the award — which has since grown to over $1 billion in the U.S. Treasury — because accepting money would implicitly validate the original transfer of the land; the tribes' position is that the land itself was never for sale and the treaty remains valid and violated. The money accumulates, uncollected, in a government account; no mechanism exists in U.S. law to compel either party to resolve the standoff.
  source: "United States v. Sioux Nation of Indians, 448 U.S. 371 (1980); Fort Laramie Treaty 1868"
  tags: [treaty-violation, indigenous-rights, Fort-Laramie, Supreme-Court, reparations-refused, land-title]

