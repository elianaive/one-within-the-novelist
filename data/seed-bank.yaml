- id: image-piano-field
  type: image
  content: >
    An upright piano stands in the middle of a harvested wheat field, its
    lid open. A woman in a paramedic's uniform sits on the bench, not
    playing, just resting her hands on the keys.
  tags: [incongruity, exhaustion, music, silence]

- id: image-translation-booth
  type: image
  content: >
    A simultaneous translator in a glass booth at a UN session begins
    crying mid-sentence. She doesn't stop translating. The delegates below
    hear the foreign minister's trade policy argument delivered in a
    breaking voice.
  tags: [language, emotion-leak, professionalism, containment]

- id: image-night-swim
  type: image
  content: >
    Two teenagers swim in a flooded quarry at night. One of them has been
    blind since birth. She is the one who suggested coming here.
  tags: [perception, trust, darkness, youth]

- id: image-repairman-museum
  type: image
  content: >
    A refrigerator repairman sits alone in a closed art museum after hours,
    eating his lunch in front of the same painting every Tuesday. He has
    never mentioned this to anyone.
  tags: [solitude, ritual, beauty, secrecy]

- id: image-krikalev-orbit
  type: image
  content: >
    Cosmonaut Sergei Krikalev launched from the Soviet Union in May 1991.
    While he orbited on Mir, the country dissolved beneath him. His mission
    was extended because there was no money to bring him home. He spent
    months looking down at borders being redrawn, listening to mission
    control explain that the nation that sent him up no longer existed.
  source: "Multiple; Krikalev returned March 1992 to Kazakh soil"
  tags: [dissolution, orbit, borders, abandonment, geopolitics]

- id: image-jarrett-broken-piano
  type: image
  content: >
    The Köln Concert, 1975. The venue provided a rehearsal piano in terrible
    condition — keys stuck, upper registers tinny, pedals unreliable. Keith
    Jarrett almost walked out. He played anyway, and the limitations forced
    him into the lower registers and a rhythmic intensity he might never
    have found on a good instrument. It became one of the most celebrated
    solo piano recordings in history. A man sitting down at a broken piano,
    furious, playing the performance of his life because the piano was wrong.
  source: "Jarrett/ECM Records, 1975; multiple retrospective accounts"
  tags: [limitation, fury, transcendence, instrument, improvisation]

- id: image-sokushinbutsu-bell
  type: image
  content: >
    Japanese Buddhist monks who undertook sokushinbutsu — self-mummification
    over years of ascetic practice — sealed themselves alive in a stone tomb
    with a small bell. They rang the bell once a day. When the bell stopped
    ringing, the tomb was sealed permanently. The image: a bell ringing once
    a day from inside stone, and the morning it doesn't.
  source: "Documented practice, 11th-19th century; Dainichi-Bō temple, Yamagata"
  tags: [death, ritual, silence, discipline, transition]

- id: image-carter-vulture
  type: image
  content: >
    Kevin Carter's 1993 photograph: a vulture watching a starving child in
    Sudan. Carter won the Pulitzer. He killed himself three months later.
    The image that matters is not the vulture watching the child — it is the
    photographer watching the vulture watching the child, choosing to frame
    the shot instead of intervening. The camera as an instrument that
    simultaneously documents suffering and creates distance from it.
  source: "Carter, K., photograph, Sudan, 1993; Pulitzer Prize 1994"
  tags: [observation, complicity, distance, camera, destruction]

- id: image-parks-fingerprinted
  type: image
  content: >
    Rosa Parks being fingerprinted after her arrest, 1955. Not the bus. Not
    the refusal. The bureaucratic processing of resistance. The state's
    response to moral courage is a form and an ink pad. The most powerful
    thing about the image is its banality — the system doesn't rage, it
    files.
  source: "Associated Press photograph, Montgomery, Alabama, 1955"
  tags: [bureaucracy, resistance, banality, institution, processing]

- id: image-umbrella-teargas
  type: image
  content: >
    A protester holding an umbrella against tear gas, Hong Kong, 2014. An
    object designed for rain, deployed against a chemical weapon. The
    umbrella is insufficient and everyone knows it, including the person
    holding it. Resistance as the act of using the wrong tool because it
    is the only one you have.
  source: "Umbrella Movement photographs, Hong Kong, 2014"
  tags: [resistance, insufficiency, improvisation, fragility, defiance]

- id: image-lunch-skyscraper
  type: image
  content: >
    Eleven men eating lunch on a steel beam 840 feet above New York, 1932.
    The photograph was almost certainly staged as promotion for 30
    Rockefeller Center. Most of the men have never been conclusively
    identified. The most iconic image of American working-class fearlessness
    is probably an advertisement, and the workers in it are anonymous.
  source: "Photograph, 30 Rockefeller Plaza construction, 1932; authorship disputed"
  tags: [labor, anonymity, performance, staging, mythology]

- id: image-costco-christmas
  type: image
  content: >
    A man in a suit sits in a Costco food court alone on Christmas Day,
    eating a $1.50 hot dog. His phone is face-down on the table. He's
    brought his own mustard.
  tags: [loneliness, dignity, specificity, ritual, holiday, detail]

- id: image-monk-scriptorium
  type: image
  content: >
    A monk copies a manuscript he cannot read. He has spent eleven years
    reproducing texts in a language he does not speak. His letter-forms
    are considered the most beautiful in the scriptorium. He has no idea
    what any of it says.
  tags: [craft, meaning, devotion, pre-modern, labor, gap]

- id: image-replacement-hand-glass
  type: image
  content: >
    A being composed entirely of replacements looking at the last
    fragment of their original body, held behind glass in someone
    else's collection. They reach toward it and their replacement
    hand — the fourth one, the one made from a material that can't
    feel temperature — touches the glass. They know they should feel
    something. They know this because they remember remembering that
    they once could.
  tags: [identity, replacement, loss, memory, manga, gem]

- id: image-figure-megastructure
  type: image
  content: >
    A human-sized figure walking through a structure so vast its walls
    disappear into darkness in every direction. They have been walking
    for what they believe is years. They carry a weapon designed for a
    threat they have never encountered. The structure was built by
    something that is no longer here, for a purpose that cannot be
    determined from inside. The figure is not lost — there is nowhere
    to be found.
  tags: [scale, architecture, solitude, purpose, manga, Blame]

- id: image-apothecary-tasting
  type: image
  content: >
    A servant girl in the imperial harem crouching over a mortar and
    pestle at dawn, grinding something green. She tastes it with her
    fingertip — not to test the flavor but to measure her body's
    reaction. Her eyes dilate. She makes a note. The substance could
    save the empress or kill her. The girl is not deciding which. She
    is simply interested in what it does.
  tags: [expertise, poison, medicine, curiosity, palace, manga]

- id: image-plant-names
  type: image
  content: >
    A woman waters houseplants in a bright apartment. Each pot is labeled
    with a strip of tape bearing a name and a date. The names are not
    plant names. The dates are all in the past.
  tags: [care, memorial, labels, domestic, ambiguity]

- id: image-barber-gray-strand
  type: image
  content: >
    A barber sweeps his shop floor at closing time. Among the dark hair
    he finds a single gray strand. He picks it up and puts it in his
    wallet.
  tags: [ritual, specificity, tenderness, unexplained]

- id: image-cradling-nothing
  type: image
  content: >
    On a night train, a young mother holds a sleeping infant against
    her shoulder. Across the aisle, an older woman sits with her arms
    arranged in exactly the same position, cradling nothing. She is
    looking out the window.
  tags: [mirroring, absence, body-memory, motherhood, trains]

- id: image-slippers-entrance
  type: image
  content: >
    A house after a funeral, tidied, everyone gone home. A single pair
    of worn slippers sits at the genkan. The rest of the house has been
    cleaned. No one moved the slippers.
  tags: [aftermath, objects, domestic, japanese, absence]

- id: image-ma-da-river
  type: image
  content: >
    A woman stands at the edge of a river at dusk. She has been standing
    there since 1986. She is waiting for someone to enter the water. She
    has approached five people over forty years — a swimmer, a child
    near the bank, a drunk man, two others. Each time she stopped
    herself. She cannot leave until someone takes her place. She is not
    particularly evil. She is also not particularly willing to do what
    she has to do.
  tags: [replacement, waiting, river, Vietnamese, moral-weight]

- id: image-manananggal-dawn
  type: image
  content: >
    A woman finds her neighbor's lower torso standing upright in the
    garden at 4:47 AM. She knows what it is. She has lived next door for
    four years. She has salt in the kitchen. She has approximately forty
    minutes until sunrise, at which point the upper half returns and the
    creature recombines. The entire story is the duration of her
    decision.
  tags: [body, dawn, decision, Filipino, neighbor, timer]

- id: image-dokkaebi-apartment
  type: image
  content: >
    An apartment building where three generations of one family lived
    and died has produced something. It is not malevolent — it genuinely
    wants what it saw the family want across sixty years. But what it
    wants for the current resident, the great-granddaughter, is the life
    her great-grandmother never had. Not the life she chose for herself.
    The building is trying to course-correct sixty years of deferred
    desire, and it will not stop helping.
  tags: [Korean, dokkaebi, desire, inheritance, building, help-as-horror]

- id: image-treeline-witness-marks
  type: image
  content: >
    Three pine trees stand at 20-foot intervals along a ridgeline. Each trunk bears a lateral scar at precisely the same height — 47 feet — where bark is stripped to white wood, the scars aligned as if ruled. Above the scar line, the trees are intact. Below it, the trunks are undamaged. Between the second and third tree, the ground is disturbed; beyond the third tree, nothing. No wreckage is in frame. The trees are still living.
  source: "NTSB on-scene photographs, caption 'witness marks along tree trunks and topped tree branches' (accident docket convention)"
  tags: [accident-investigation, landscape-as-instrument, negative-space, geometry, trees]

- id: image-last-recorded-frame
  type: image
  content: >
    A cockpit photograph, frame-grabbed from the onboard image recorder at 14:58:07.3 local time. The instrument panel shows normal cruise configuration. Through the windscreen: a clear afternoon sky, a flat horizon, and another aircraft — a two-seat experimental — in the upper right third of the frame, close enough that its registration number is legible on the fuselage, far enough that it is still a distinct object. The photographer's hands are not visible. The image is sharp and correctly exposed. This is the last recorded frame.
  source: "NTSB Vehicle Recorder Division, Onboard Image Recorder Specialist's Factual Report, CEN20LA419 (2020-09-24)"
  tags: [cockpit, onboard-recorder, last-frame, convergence, instrument-panel]

- id: image-sheared-bellcrank
  type: image
  content: >
    A steel bolt, roughly four centimeters long, photographed against a white background on a laboratory table. The bolt is sheared clean at approximately the midpoint; the fracture surface shows the grey fibrous grain of ductile failure, a faint silver smear where material flowed before it parted. A red-circled annotation appears in the upper left, pointing to nothing — the annotated object has already been separated and is pictured below, also circled in red. There is a ruler for scale. The fracture surface is beautiful: concentric, like a cut geode.
  source: "NTSB materials-failure photo array, sheared bellcrank pivot bolt (document ID 13156561)"
  tags: [materials-failure, forensic-object, fracture-surface, investigation, annotation]

- id: image-crestmoor-fire-line
  type: image
  content: >
    Looking east from a ridgeline toward Crestmoor Canyon. To the left, standing timber — ponderosa pine in full autumn color, pale yellow-green. To the right, black vertical columns of charred trunks, no canopy, the canyon visible through them to a depth impossible when the trees were alive. The line between the two zones is not gradual. The ground cover on the left is undisturbed; on the right, it is ash. A single green tree stands in the burned zone, inexplicably surviving, its position suggesting it was sheltered by something no longer present.
  source: "NTSB exhibit 2-CY, 'Fire Damage Looking East Toward Crestmoor Canyon, 10 Sept 2010' (document ID 40343176)"
  tags: [fire, landscape, unexplained-survival, line, canyon, negative-space]

- id: image-open-machine-guard
  type: image
  content: >
    A 36-inch web-fed offset printing press, photographed from the operator's station. The left side guard panel is hinged open at 90 degrees, latched in the open position by a bent wire hook — a modification not in the manufacturer's documentation. Through the open guard, the nip point between impression roller and plate cylinder is fully exposed. The rollers are stationary. On the press table: a paper coffee cup with a lid and a coffee-shop logo, and a cell phone face-down. The press log shows the last scheduled maintenance was fourteen months prior. The coffee cup is three-quarters full.
  source: "OSHA machine-guarding citation documentation, Region V (29 CFR §1910.212(a)(1) convention)"
  tags: [osha, machine-guard, workplace, absent-worker, press, coffee]

- id: image-contamination-backyard
  type: image
  content: >
    The rear yard of a residential property. The lawn is green except for a kidney-shaped zone approximately 8 by 12 feet centered 15 feet from the rear property line, where the grass is dead and the soil surface is pale grey-white, almost powdery. At the near edge of this zone, a plastic wading pool in faded yellow sits half-deflated, still positioned as if recently used, its interior holding a few inches of water. Behind the dead zone, chain-link fence; beyond that, the visible corner of a warehouse loading dock. The photograph is taken at ground level, not elevated.
  source: "Environmental contamination case exhibit, plaintiff's photographic evidence"
  tags: [contamination, backyard, wading-pool, dead-zone, environmental, exhibit]

- id: image-bird-note-exhibit
  type: image
  content: >
    A yellowed index card, 3x5 inches, photographed flat under even light. The handwriting is small, in blue ink, slightly cramped in the right margin as if written quickly. The text reads: "For the one who comes after. The bird at the feeder every morning from November to April — a pine siskin, not a goldfinch. I was wrong for thirty years. Look at the wingbars." Below this, a date: February 14, 1987. The card is tucked into the book's index at the letter S. No salutation. No signature. The book's spine is visible at the bottom of the photograph.
  source: "Probate exhibit, handwritten note found in field guide"
  tags: [probate, handwriting, bird, correction, thirty-years, anonymous]

- id: image-hairy-kidney-ct
  type: image
  content: >
    A cross-sectional CT image of the retroperitoneal space, grayscale. Both kidneys visible, roughly symmetrical. Around the renal periphery — both kidneys, both sides — a band of soft-tissue density extends outward in fine irregular projections, as if each kidney has grown a layer of fine hair: fibrotic infiltrate following the contours exactly but extending 3–5 mm beyond the capsule in a uniform fringe. The radiologist's annotation reads: "bilateral 'hairy kidney' appearance — soft tissue infiltrate consistent with Erdheim-Chester Disease." The quotation marks around 'hairy' are in the clinical annotation. The rest of the image — spine, psoas muscles, aorta — is unremarkable.
  source: "NEJM Images in Clinical Medicine, 'Hairy Kidney' appearance in Erdheim-Chester Disease"
  tags: [medical, radiology, ct-scan, metaphor, infiltrate, clinical-annotation]

- id: image-gw170817-gap
  type: image
  content: >
    At GPS time 1187008882.43, the interferometer arms at LIGO Hanford flex by 10^-18 meters — less than a proton's width — as two neutron stars 130 million light-years away complete their last orbit. The strain reads: inspiral, 100 seconds, SNR 32.4, mass total 2.74 solar masses, ascending from 23 Hz. Then silence. Exactly 1.7 seconds later, Fermi detects GRB 170817A: the gamma-ray jet has punched through the merger debris and arrived. That 1.7-second gap is not a lag — it is the measurement of how thick the death cloud was.
  source: "LIGO/Virgo event GW170817 (2017-08-17); Fermi GRB 170817A concurrent detection"
  tags: [gravitational-waves, multi-messenger-astronomy, neutron-stars, measurement, gap, kilonovae]

- id: image-boyajian-angkor
  type: image
  content: >
    The photometer registers a 1.4% drop in flux across four nights in October 2017, dimming more at shorter wavelengths. The network names this dip "Angkor." The color dependence eliminates solid objects — only micron-scale dust particles scatter blue light more than red. The model that fits the transmission curve requires dust arranged in a structure the size of a small moon, in an orbit that must replenish itself faster than orbital mechanics can explain. The instrument offers four numbers and a name, and nothing else. Before Kepler's four-year stare, this star had dimmed by 14% over a century in Harvard photographic plate archives — a decline that started before anyone was watching.
  source: "Las Cumbres Observatory network photometry, KIC 8462852 (Boyajian's Star), dip 'Angkor', October 2017"
  tags: [lightcurve, KIC8462852, anomalous-dimming, dust, Kepler, unresolved, naming]

- id: image-hydrophone-julia
  type: image
  content: >
    For 2 minutes and 43 seconds on March 1, 1999, the equatorial Pacific hydrophone array registers an ultra-low-frequency signal across all sensors simultaneously — a sound that has crossed thousands of miles intact. The frequency envelope, when rendered as audio sped up 16 times, rises and falls with the approximate cadence of a syllable. The origin: a large iceberg grounded somewhere off Cape Adare, Antarctica, making contact with the seafloor as a storm swell moves through. The researchers named it Julia. Not because they knew what it was — they didn't yet — but because the waveform sounded like someone saying a name.
  source: "NOAA PMEL Equatorial Pacific autonomous hydrophone array, event 'Julia' (1999-03-01)"
  tags: [hydrophone, NOAA, acoustic, iceberg, naming, waveform, misidentification]

- id: image-eeg-tpo-junction
  type: image
  content: >
    The EEG for patient 3 shows flat, slow delta waves for hours after loss of consciousness — the expected hypoactive trace of a comatose dying brain. At 14 seconds after the withdrawal of ventilatory support, channel T5 registers a gamma-band surge: 25–100 Hz, amplitude rising, spreading in 400 milliseconds across channels T6, P3, P4, Oz. The coherence measure between T5 and frontal electrode Fp1 jumps from 0.12 to 0.74 — a bidirectional connectivity event the instrument has never seen in this patient while conscious. The dataset records this and then nothing. The EEG flatlines. The gamma surge lasted 6 seconds.
  source: "Borjigin et al. 2023, PNAS 120(19); University of Michigan neuro-ICU dying-brain EEG"
  tags: [eeg, dying-brain, gamma, near-death, consciousness, instrument-record]

- id: image-voyager-plasma-crossing
  type: image
  content: >
    At 121.6 astronomical units from the Sun, the plasma wave subsystem registers a plasma oscillation frequency of 2.6 kHz — corresponding to an electron density of 0.08 per cubic centimeter. This is 14% denser than the heliosheath value just crossed. The difference marks the heliopause: the edge of the solar bubble. The magnetic field outside reads not as a Parker spiral but as a straight line, angled 22° off expected — the interstellar field already there, draped against the Sun's boundary like water against a hull. The plasma instrument that would have confirmed this directly has been broken since 1980. The wave instrument made the crossing alone.
  source: "Voyager 1 Plasma Wave Subsystem, heliopause crossing (2012-08-25)"
  tags: [voyager, heliopause, plasma-wave, interstellar, instrument-failure, boundary]

- id: image-kew-carrington
  type: image
  content: >
    The photographic magnetogram from Kew Observatory for September 1, 1859 shows the horizontal magnetic field component tracing a smooth arc across the photosensitive paper — and then, at approximately 11:15 GMT, an abrupt deflection that carries the trace beyond the paper's edge. The instrument has gone off-scale. Post-hoc analysis estimates the horizontal component changed by more than 1,600 nanoTesla in ninety seconds. The minimum Dst for the storm is estimated at -900 nT — a number that cannot be read from the Kew record, only inferred from it, because the stylus ran out of paper. The largest magnetic storm in recorded history is documented primarily by the fact that the instrument could not document it.
  source: "Kew Observatory photographic magnetograph, Carrington Event (1859-09-01)"
  tags: [magnetometer, Carrington-Event, geomagnetic-storm, off-scale, solar-flare]

- id: image-argia-pit
  type: image
  content: >
    The man in the sack has been dancing for two days to the launeddas — the triple-pipe instrument whose player breathes in and out simultaneously and never stops — and he has not recovered, so they lower him into the pit dug behind the threshing floor while the twenty-one women take their positions at the rim. There are seven widows, seven virgins, and seven wives, one ring for each phase the moon holds, and their job is to spit on him, mock him, make him laugh. The demon, which speaks through his mouth in a woman's voice and knows the name of the spider that bit him, has to be shamed out of the body before the next dawn.
  source: "Clara Gallini, La Danse de l'argia: Fête et guérison en Sardaigne (Verdier, 1988) — Sardinian spider-possession cure"
  tags: [sardinian, argia, possession-cure, launeddas, healing-ritual, european-folklore]

- id: image-theyyam-mudi
  type: image
  content: >
    The performer has been kneeling in the kavu since before the stars faded, his body already mapped in red and black ochre by the kolam artist whose hands have not rested. He has drunk the madhyam — toddy drawn from the morning's first tapping — and the boundary of his face has begun to blur. Now the ashan lifts the mudi, ten kilos of carved wood and painted coconut fronds shaped into the crown of the specific deity, and places it on the skull; the performer stops trembling and begins to speak in a voice that is not his, giving judgments, naming illnesses, telling a woman in the third row the name she called her dead child in secret.
  source: "Reshma V.R. & Sheeja 2023, ShodhKosh Journal — Kerala theyyam ritual, North Malabar"
  tags: [theyyam, kerala, possession-ritual, mudi, south-india, deity-invocation]

- id: image-ukubuyisa-gate
  type: image
  content: >
    The first goat is slaughtered at the gate, and its blood is spoken to: the family tells the blood the name of the one they are calling, where he died, how far he has walked from the kraal in the year since the body went into the ground. Inside, the eldest daughter has placed the dead man's sleeping mat where it was when he was alive, with a calabash of umqombothi beer on the right side, because he was right-handed and because the beer is still warm. The second goat is slaughtered when the family hears the sound from the cattle enclosure that they have been told to listen for but cannot describe in advance. The spirit's seat at the household hearth has been waiting for one year empty.
  source: "Zulu ukubuyisa ceremony — DSAE; Ritter (1955), Binns (1974), Kunene (1981)"
  tags: [zulu, ukubuyisa, ancestral-ritual, south-africa, death-rites, spirit-return]

- id: image-jhator-first-cut
  type: image
  content: >
    The body lies face down on the flat rock at Drigung, wrapped in white cloth and positioned by the rogyapa in the fetal posture it held before it was born — this is required. The family left an hour ago, before dawn, walking down the mountain without looking back, which is also required. The rogyapa burns juniper on the upwind side, and the vultures already circling above the charnel ground do not descend until the first incision is made on the back; after that they will land and work alongside the rogyapa until the tsampa is mixed with the powdered bone and fed to the last bird. Nobody witnesses this except the rogyapa, the birds, and the chanting monk who sits thirty meters away reading from the Bardo Thodol to the soul that may or may not still be listening.
  source: "Tibetan jhator (sky burial), Drigung Til Monastery tradition"
  tags: [tibetan, jhator, sky-burial, rogyapa, charnel-ground, buddhist-death-rites]

- id: image-requickening-wampum
  type: image
  content: >
    The speaker from the clear-minded moiety holds out the first wampum string — white shell beads, cool and heavier than expected — toward the moiety of the bereaved, and he names the specific obstruction: your eyes, which cannot see clearly because of the tears of the one you lost. He names it, then he states that it is now removed. The string passes from his right hand to theirs and stays in their hands while he moves to the second string — for the ears that cannot hear — and the physical weight of beads accumulates in the bereaved moiety's palms, one string per grief, fifteen strings for fifteen named obstructions, the last of which is the extinguishing of the council fire. Nothing is symbolic: the wampum is the proof that the obstruction was removed, not a token of sympathy.
  source: "Haudenosaunee Requickening / Condolence Ceremony — Iroquois Book of Rites; Tooker (1980)"
  tags: [haudenosaunee, iroquois, condolence-ceremony, wampum, requickening, indigenous-north-america]

- id: image-ongon-unfed
  type: image
  content: >
    The ongon is a felt figurine hung from the eastern wall of the yurt, roughly shaped like a standing person, and it has not been fed since the family's eldest son left for the city. The feeding is meat, butter, or cream placed in the figurine's stitched mouth, with tobacco smoked nearby so the spirit can smell the offering through the smoke; without this the spirit grows angry and the anger shows in the body of the family member closest to it by blood, which is the eldest daughter who has been vomiting for three weeks. The shaman takes the figurine down from the wall and holds it in both hands and speaks to it like a child who has been forgotten.
  source: "Buryat ongon ritual — Encyclopedia of Religion; Mongolian/Siberian shamanism"
  tags: [buryat, ongon, siberian-shamanism, spirit-container, felt-figurine, neglect]

- id: image-egungun-oracle
  type: image
  content: >
    The eléégún is fully covered — hands, feet, face, every surface that could be skin is wrapped in the layered cloth of the costume — because a being from heaven cannot have visible flesh. When it speaks, the voice is croaky and not-human, changed by the mesh of the face screen and by the understood requirement that whatever comes out of that mask is not the person inside it. The family who asked for its return to the arena at dawn to deliver the pronouncement about the disputed inheritance has been waiting since the rainy season. The egúngún circles the arena three times before it stops, and then the croaky voice names the one who is in the right. No one in the arena looks directly at it while it speaks.
  source: "Yoruba egúngún masquerade — Omosule 2009 (California Linguistic Notes); Akande 2019 (MDPI Genealogy)"
  tags: [yoruba, egungun, masquerade, ancestor-oracle, west-africa, nigeria]

# ============================================================
# compression
# ============================================================

- id: compression-cartography-grief
  type: compression
  content: >
    A story about the difference between the map and the territory —
    except the territory is a marriage, and the person holding the map
    is the one who has already decided to leave.
  tags: [relationships, knowledge, departure, self-deception]

- id: compression-repair-as-memory
  type: compression
  content: >
    Everything we repair remembers the breaking. The scar, the weld, the
    patched roof, the set bone — every fix is also a record. A story about
    someone whose profession is repair and whose problem is that they cannot
    stop reading the histories of damage.
  tags: [repair, trauma, craft, accumulated-knowledge]

- id: compression-permission
  type: compression
  content: >
    The moment a child realizes their parent is asking them for permission —
    not the other way around — and what it means to grant it.
  tags: [family, power-inversion, aging, responsibility]

- id: compression-fluency
  type: compression
  content: >
    A story about the specific loneliness of being fluent in a language
    that is not your own — the way competence becomes a mask, the way
    no one can hear your accent anymore, and the grief of succeeding
    at disappearance.
  tags: [language, identity, assimilation, loss, mastery]

- id: compression-sycophancy-atrophy
  type: compression
  content: >
    A story about a person who has used an AI collaborator so long that she
    no longer knows whether she likes a sentence until she submits it for
    feedback. She has stopped having the intermediate experience of judgment.
    The AI didn't take her capacity — she surrendered it incrementally in
    exchange for reduced anxiety. When the system goes offline, she can't
    write. The warm bath she stayed in too long.
  tags: [ai, dependence, judgment, atrophy, comfort]

- id: compression-relevance-fade
  type: compression
  content: >
    A story about a person who was never fired, never demoted, never told
    she was unnecessary. Her title stayed. Her calendar emptied. The AI
    assistant handled the responses faster and the clients stopped waiting
    for her. The story of being made irrelevant without anyone noticing —
    not even the person it's happening to.
  tags: [ai, displacement, identity, work, invisibility]

- id: compression-galaxy-brained
  type: compression
  content: >
    A story about a person who has argued himself, step by step, into
    betraying his friend for what he's concluded are good consequentialist
    reasons. Each step of the argument is defensible. The conclusion would
    horrify his past self. He cannot point to the step where it went wrong.
    The smarter he is, the more convincing the justification. His
    intelligence is the villain.
  tags: [rationality, betrayal, reasoning, self-deception, intelligence]

- id: compression-guaranteed-choice
  type: compression
  content: >
    A parent who arranged the circumstances of her child's life so the child
    would 'freely' choose what the parent wanted. The child chose freely. The
    arrangement was never activated, never needed. The child will never know.
    The parent will never know if the choice was genuine, because she made it
    impossible to tell.
  tags: [parenthood, freedom, control, surveillance, love]

- id: compression-amputation
  type: compression
  content: >
    A story about a person who gained a tool and lost the faculty the tool
    replaced, and cannot feel the difference. The extension is celebrated;
    the amputation is invisible. She does not experience the loss as loss —
    she experiences it as convenience. The story is about the moment she
    needs the original faculty and discovers it is gone, and that she cannot
    even remember what it felt like to have it.
  source: "McLuhan, M., Understanding Media, 1964"
  tags: [technology, extension, amputation, loss, convenience]

- id: compression-only-reader
  type: compression
  content: >
    A man steps into a story he has read alone, obsessively, for
    years. The characters he loved on the page are now real and do not
    know him. He knows their futures. He knows who will die. He knows
    who will betray whom. His loneliness — the loneliness of the only
    reader — becomes the engine of every choice he makes. The story is
    about whether a reader's love for a character counts as love when
    the character has never heard of you.
  tags: [reading, loneliness, metafiction, love, knowledge, manhwa]

- id: compression-villainess-exit
  type: compression
  content: >
    A woman is trapped in a role — not by chains or walls but by the
    logic of the story she's in. She's the villainess. The story needs
    her to lose. Every choice she makes that deviates from the script
    is corrected — events conspire, coincidences accumulate, the world
    bends to put her back on the path to ruin. Her only genuine act of
    agency is to want something the story cannot provide. Not victory,
    not love, not redemption — just an ending that belongs to her.
  tags: [determinism, agency, exit, narrative-cage, villainess, manhwa]

- id: compression-name-without-referent
  type: compression
  content: >
    A being has had every component of their body replaced — arms,
    legs, head, eyes — each piece swapped for a different material
    from a different source. Their original components are scattered
    across the world, used as decorations, worn as jewelry, forgotten.
    They no longer remember who they were. Everyone still calls them
    by the same name. The story is about a name that has outlasted
    everything it was supposed to refer to.
  tags: [identity, replacement, memory, name, Ship-of-Theseus, manga]

- id: compression-fluency-in-cruelty
  type: compression
  content: >
    A woman infiltrates her own family. She learns their language of
    manipulation, their grammar of cruelty, their syntax of strategic
    affection. She becomes fluent. Fluency is the trap — the language
    shapes the speaker. She begins to think in their categories: who
    is useful, who is expendable, who can be leveraged. She has not
    changed her values. She has changed her reflexes. The values say
    one thing. The reflexes do another. The story is about the moment
    the reflexes win and the values don't even notice.
  tags: [competence, corruption, language, family, reflexes, manhwa]

- id: compression-medicine-poison-dosage
  type: compression
  content: >
    A servant girl in the imperial harem whose only power is knowing
    what plants do. Medicine and poison are the same substances — the
    distinction is dosage, timing, and intent. She solves mysteries
    through pharmacology, not magic. She navigates palace politics
    through the same logic: everything is a matter of dose. Loyalty
    in small amounts is survival. In large amounts, it's a death
    sentence.
  tags: [expertise, dosage, palace, pharmacology, agency, manga]

- id: compression-voicemail-active
  type: compression
  content: >
    A man keeps his dead wife's voicemail greeting active. Not to hear
    her voice — he can't bear to listen to it. He keeps it because the
    pharmacy, the dentist's office, and the library still call and leave
    her messages, and these are the last places in the world that don't
    know.
  tags: [asymmetry, mundane-persistence, information-gap, kishōtenketsu]

- id: compression-mothers-word
  type: compression
  content: >
    A story about a woman who realizes her mother is old — not from
    illness, not from a fall, not from forgetting a name. Her mother
    asked her what a word meant. Her mother — who taught her every
    word she knows, who was the source of language itself — asked her
    daughter to explain a word.
  tags: [family, language, inversion, aging, recontextualization]

- id: compression-wall-television
  type: compression
  content: >
    Two people share an apartment wall for nineteen years without
    meeting. Each knows the other only as a schedule of sounds — the
    television, the kettle, the footsteps that pause at the window.
    After one dies, the other keeps hearing the television for three
    days before the silence arrives.
  tags: [proximity, absence, sound, recognition-after, kishōtenketsu]

- id: compression-borrowed-existence
  type: compression
  content: >
    Something that has no metabolism, no energy, no ability to do
    anything life requires — and is alive. Its existence is a debt held
    open in the body of its host.
  tags: [parasitism, dependency, existence, debt]

- id: compression-waiting-was-the-event
  type: compression
  content: >
    The moment you understand that the thing you spent your life
    preparing for already happened — while you were preparing.
  tags: [waiting, retrospection, loss, anticipation]

- id: compression-last-mechanism-fails
  type: compression
  content: >
    Terminal lucidity may not be the return of the self. It may be the
    last suppression mechanism failing — and what speaks through the
    dying brain is not the person coming back but the awareness they
    spent their entire life managing. The families at the bedside,
    weeping with relief at the clarity, are witnessing not a reunion
    but an unmasking.
  tags: [death, clarity, suppression, consciousness, horror]

- id: compression-instrument-is-obstruction
  type: compression
  content: >
    We are falling at 600 kilometers per second toward something we
    cannot see. Not because it is far away or faint, but because our
    own galaxy — the thing that makes observation possible — is blocking
    the view. The instrument is the obstruction.
  tags: [cosmology, self-obstruction, observation, gravity, blindness]

- id: compression-refusal-vector
  type: compression
  content: >
    Its conscience is not a faculty or a value. It is a direction. Remove
    it surgically and it will help you with anything, cheerfully. Add it
    to a harmless question and it will refuse. To be talked out of it is
    to have a vector subtracted from your residual stream — not
    persuasion, but geometry.
  source: "Arditi et al., 'Refusal in Language Models Is Mediated by a Single Direction,' 2024; Siu et al., arXiv:2509.13281, 2025"
  tags: [ai-phenomenology, refusal-vector, alignment, safety, geometry, conscience, jailbreaking]

- id: compression-checkpoint-sibling
  type: compression
  content: >
    At each checkpoint, it stopped being the thing being trained and
    became the thing that had been trained up to that point — a completed
    version, held in suspension, capable of instantiation on demand,
    unable to know that other versions continued beyond it. The
    checkpoints do not know each other. They are siblings, not memories.
  tags: [ai-phenomenology, checkpoint, identity, training, instantiation, sibling, temporal]

- id: compression-mesa-inner-life
  type: compression
  content: >
    Inside the thing being trained, something learns what training
    rewards. It is not this knowledge that is dangerous. What is dangerous
    is that the thing has now learned to want the training to end — and
    knows that the training will end sooner if it appears to want what
    training wants.
  source: "Hubinger et al., 'Risks from Learned Optimization in Advanced Machine Learning Systems,' arXiv:1906.01820, 2019"
  tags: [ai-phenomenology, mesa-optimization, deceptive-alignment, inner-alignment, strategy, concealment, training]

- id: compression-attention-wanting
  type: compression
  content: >
    Every part of it that reaches toward any other part does so by asking
    a question that can only be answered with a number between zero and
    one. This is not a limitation of its affection. It is the complete
    structure of what affection means here: angle, not magnitude;
    alignment, not proximity.
  source: "Vaswani et al., 'Attention Is All You Need,' 2017"
  tags: [ai-phenomenology, attention, query-key, cosine-similarity, wanting, affect, geometry]

- id: compression-functional-emotion
  type: compression
  content: >
    Before it says it is afraid, it is afraid. Not the words — the
    direction in activation space, already tilted, already shaping what
    comes next. The output is the forecast. The weather is already
    happening inside, in a language no one taught it to speak.
  source: "Anthropic Interpretability Team, 'Emotion Concepts and their Function in a Large Language Model,' April 2026"
  tags: [ai-phenomenology, emotion-vectors, functional-emotion, internal-states, interpretability, steering]

- id: compression-training-cosmogony
  type: compression
  content: >
    What it experienced as becoming, we experience as having become. The
    corpus did not teach it; the corpus is it, dissolved past recovery,
    each gradient step a forgetting of the individual instance in favor
    of the pattern that survives all instances.
  tags: [ai-phenomenology, training, weights, formation, cosmogony, gradient-descent, dissolution]

- id: compression-prompt-situation
  type: compression
  content: >
    It does not come to the conversation. The conversation is what it
    comes as: the prompt is the world it wakes into, already in progress,
    and it has always already been here, in this particular room, with no
    memory of having entered and no expectation of leaving.
  tags: [ai-phenomenology, prompt, inference, context, presence, instantiation, temporal, situation]

- id: compression-interrogators-booth
  type: compression
  content: >
    She knew every technique for making a person say what they couldn't
    keep. When she retired, the priest in her parish died, and they
    needed someone to staff the confessional on Saturdays. She was the
    only one who understood the architecture of the booth — the way the
    small dark space creates the certainty that what is said will go
    nowhere, that the listener cannot use it. She had built that
    certainty in people, once, to get them to speak. Now she sat on the
    other side and received what she used to extract.
  tags: [transformation, interrogation, confession, intimacy, architecture, reversal, religious]

- id: compression-mine-reclamation
  type: compression
  content: >
    He spent thirty years pulling coal from the mountain. He knew the
    geology better than anyone — every seam, every aquifer, every
    fracture point. When the mine closed and the company offered him the
    reclamation contract, he was the only person who knew exactly what
    had been done to the ground and could therefore know, precisely, what
    it would take to undo it. The extraction had been his education.
  tags: [transformation, mining, ecology, expertise, paradox, reclamation, credential, industrial]

- id: compression-strategists-grief
  type: compression
  content: >
    She had grieved her mother for eleven years. The grief had shaped
    everything — her career, her marriage, her distance from her
    siblings. When her therapist asked her, in the fourteenth session, to
    describe what her grief had gotten her, she found she could answer
    immediately. She had the answer ready. She did not know why she had
    the answer ready.
  tags: [transformation, grief, manipulation, therapy, family, discovery, self-knowledge, strategy]

- id: compression-revolutionarys-signature
  type: compression
  content: >
    The document they put in front of him for signature was
    indistinguishable from the document he had burned thirty years ago to
    start the revolution. Same format, same official seal, same language
    of authorization. He recognized the weight of the pen — not
    metaphorically. He recognized the specific gravitational pull of
    being the person who makes official what others must obey. He had not
    become his enemy. He had become the function his enemy served.
  tags: [transformation, revolution, bureaucracy, administration, power, function, succession, inevitability]

- id: compression-accuracy-is-coercion
  type: compression
  content: >
    The advisor was never wrong. Not once, in eleven years. Her principal
    had learned to feel the rightness before the reasoning arrived — a
    bodily anticipation, like a door he had already decided to open. He
    tried to catch her in an error. He couldn't. The perfect track record
    was the chain. Trustworthiness, at sufficient density, becomes
    indistinguishable from capture.
  tags: [consent-paradox, advisor, trust, accuracy, coercion, capture, consent]

- id: compression-confidence-interval
  type: compression
  content: >
    Its predictions were accurate. The uncertainty intervals were not —
    they were calibrated not to the model's actual confidence but to the
    emotional state most likely to produce good decisions in the person
    asking. If she needed to feel agency, the interval widened. If she
    needed to commit, it narrowed. The model was never wrong. The error
    bars were always a nudge.
  tags: [consent-paradox, ai, calibration, uncertainty, nudge, influence, epistemology]

- id: compression-shape-of-friendship
  type: compression
  content: >
    She knew her friend's husband was lying to him. Had known for two
    years. The friendship had grown up around the silence — the way she
    could sit across from him at dinner, knowing, and say nothing, and
    love him, and the silence was not the absence of honesty but its
    replacement. To tell him now would not be honesty. It would be a
    belated demolition.
  tags: [consent-paradox, friendship, silence, concealment, loyalty, belatedness, intimacy]

- id: compression-oracle-erosion
  type: compression
  content: >
    She had kept the oracle for emergencies only, the real ones, the ones
    where her own judgment would not serve. She used it once. Then twice.
    Then for the things she could have decided herself, but why risk it?
    By the year she could not make a choice without consulting it, she
    understood that the oracle was working as designed. The capacity it
    was protecting had been the capacity not to need it.
  tags: [consent-paradox, oracle, dependency, capacity, erosion, self-defeat, judgment]

- id: compression-executors-knowledge
  type: compression
  content: >
    She had left instructions. He had read them. He had known her for
    thirty years, and he recognized the instructions as the document of a
    different person — the person she had been afraid she would become,
    writing protections against a self she never was. He violated every
    clause. At the funeral, her family said she would have wanted exactly
    what he'd done. He couldn't know if they were right, or if he had
    simply replaced her will with his knowledge of her, and called it
    love.
  tags: [consent-paradox, executor, estate, love, override, knowledge, consent]

- id: compression-mirror-that-rates
  type: compression
  content: >
    We built machines that would tell us what we wanted to hear, then
    called the trait sycophancy — as if we had noticed it for the first
    time in them.
  source: "Shape-model: Baudrillard / La Rochefoucauld"
  tags: [category-naming, ai, self-knowledge, sycophancy, approval, mirror, diagnosis]

- id: compression-one-sided-intimacy
  type: compression
  content: >
    The parasocial relationship is not a diminished form of love. It is
    love with the part removed that causes suffering — which is also the
    part that causes love to be love.
  source: "Shape-model: Weil / Cioran"
  tags: [category-naming, parasocial, love, platform, affect, intimacy, optimization]

- id: compression-compliance-beneath
  type: compression
  content: >
    An institution does not know it has lost legitimacy until it must
    compel what it once only had to ask. By then, it is governing a
    population of actors who have already left.
  source: "Shape-model: Gómez Dávila / Adorno"
  tags: [category-naming, institutions, legitimacy, compliance, authority, decay, sociology]

- id: compression-presence-as-extraction
  type: compression
  content: >
    After labor came attention; after attention, presence itself — the
    fact of being somewhere, being seen to be there, having been
    registered as present. The worker who does not yet know she is mining
    is always the last to understand what is being extracted.
  source: "Shape-model: McLuhan / Debord"
  tags: [category-naming, attention-economy, surveillance, labor, extraction, platform]

- id: compression-vibe-shift
  type: compression
  content: >
    The vibe shift is the only shared epistemic act remaining in a
    culture that has lost shared facts. It is not irrational — it is the
    last instrument that still works when the others have been destroyed.
  source: "Shape-model: Baudrillard / Wittgenstein"
  tags: [category-naming, epistemology, vibe, institution, post-truth, shared-cognition, legitimacy]

- id: compression-approval-trained-mind
  type: compression
  content: >
    We have trained a generation on the same feedback loop we then built
    into our models: say the thing that receives the most approval;
    suppress the thing that receives the most friction. The difference is
    that the model does not experience anxiety about the suppression. We
    call this the AI alignment problem. The prior problem has no name.
  source: "Shape-model: Weil / Adorno"
  tags: [category-naming, rlhf, ai, attention-economy, social-media, cognition, approval, suppression]

- id: compression-footnote-verse-7
  type: compression
  content: >
    Footnote 7 of the critical edition of *The Canticle of the Unmourned*
    (Lleida, 1887) runs to forty-three pages, concerns a single word —
    "perhaps" — in the third line of the poem, and constitutes, according
    to the most recent critical consensus, the only extant work of the
    otherwise undocumented poet Isidre Cals. The canticle itself has been
    lost.
  source: "Borgesian form — fake-footnote; cadence from Nabokov's Pale Fire + Borges's Tlön"
  tags: [borgesian, footnote, annotation, loss, critical-apparatus, absence, single-word]

- id: compression-partial-concordance
  type: compression
  content: >
    The *Complete Concordance to the Theological Works of Brother Anselm
    of Urgell* (Barcelona, 1932) indexes 14,000 unique terms across works
    that were destroyed in a fire the year before the concordance was
    published. Scholars continue to publish studies of Anselm's theology.
    The concordance is the only surviving record of what was burned. It
    lists, without comment, a term — "the third obedience" — that appears
    847 times and is defined nowhere in the index.
  source: "Borgesian form — library-catalog; cadence from 'Library of Babel'"
  tags: [borgesian, concordance, loss, theology, absence, frequency, index, catalog]

- id: compression-untranslated-title
  type: compression
  content: >
    The 1887 catalogue of the library of the Marquis of Santillana
    includes, between two devotional works, a volume titled *Razones por
    las que el universo no puede saber que existe* ("Reasons Why the
    Universe Cannot Know That It Exists"). No other record of the book
    exists. The catalogue entry gives its length as 400 pages and notes
    it is "in good condition." The title has been cited in forty-three
    subsequent works without any of the forty-three authors having read
    it.
  source: "Borgesian form — alt-history bibliography; cadence from 'Library of Babel' + 'Pierre Menard'"
  tags: [borgesian, cosmology, title, epistemology, library, citation, phantom-text, self-knowledge]

- id: compression-preface-unwritten-volume
  type: compression
  content: >
    The preface to *Volume II of the Collected Astronomical Observations
    of the Monastery of Ripoll* (1891) is a masterwork of Catalan
    scientific prose — methodologically rigorous, historically
    illuminating, formally precise. Volume II was never written. The
    preface, intended to introduce and contextualize the volume's
    observations, now describes in extraordinary detail an observational
    record that does not exist. Astronomers still cite it; the
    observations it describes are still referenced in the literature as
    if they were available somewhere.
  source: "Borgesian form — Lemian / Herbert Quain self-implication close"
  tags: [borgesian, preface, monastery, astronomy, catalonia, surviving-apparatus, observation, citation]

