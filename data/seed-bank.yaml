- id: te-kavkas-toxin
  type: thought_experiment
  content: >
    A billionaire offers you $1 million if, at midnight tonight, you sincerely
    intend to drink a mildly nauseating toxin tomorrow afternoon. You don't
    have to drink it — the money is deposited based solely on the intention.
    But the moment you realize you won't have any reason to drink it tomorrow
    (you already have the money), the intention becomes self-undermining. Can
    you sincerely intend something you know you'll abandon? Kavka developed
    this from nuclear deterrence: can a leader sincerely intend to retaliate
    when retaliation would be pointless?
  source: "Kavka, G., 'The Toxin Puzzle,' Analysis, 1983"
  tags: [intention, commitment, self-knowledge, deterrence, rationality]

- id: te-hungry-ghosts-river
  type: thought_experiment
  content: >
    A hungry ghost approaches a river and sees pus and blood. A human
    approaches the same river and sees clear water. A fish lives in the
    river and experiences it as home. All three are present at the same
    place at the same moment. There is no fourth perspective from which
    to determine what the river "really" is. If shared experience cannot
    settle the question — humans agree it's water, but so do the ghosts
    agree it's pus — then what grounds the assumption that there is one
    river at all, rather than three incommensurable worlds occupying the
    same coordinates?
  source: "Vasubandhu, Vimshatikakarikavrtti (Twenty Verses), 4th-5th c. CE"
  tags: [perception, reality, incommensurability, buddhist, species, cosmology]

- id: te-mozi-care-trustee
  type: thought_experiment
  content: >
    You are about to leave on a journey from which you may not return.
    You must entrust your children to one of two guardians. The first
    believes in impartial love — they will care for your children
    exactly as they care for any stranger's children, no more, no less.
    The second believes in partiality — they will always prioritize
    their own family above all others. You believe in partiality. You
    have argued for it. But you choose the impartialist, because the
    impartialist is the only one you can trust not to sacrifice your
    children for their own. Your deepest value can only be protected
    by someone who rejects it.
  source: "Mozi (Mo Di), 'Impartial Caring' Chapter C (Jian'ai C), c. 450 BCE"
  tags: [trust, partiality, hypocrisy, family, values, chinese-philosophy]

- id: te-fire-cotton
  type: thought_experiment
  content: >
    You hold cotton to a flame. The cotton burns. You have seen this
    happen a thousand times. But Al-Ghazali argues you have never once
    observed causation — only sequence. The fire has no power to burn.
    God burns the cotton on the occasion of fire touching it. The
    regularity is a habit of divine will, not a law of nature. Now:
    God suspends this habit, just once, for just one person. The fire
    touches the cotton and nothing happens. The person stares at the
    unchanged cotton. They cannot tell anyone, because no one would
    believe a world where fire does not burn. They cannot trust any
    sequence they have ever observed. The most ordinary thing in the
    world — a flame — has become evidence that nothing connects cause
    to effect.
  source: "Al-Ghazali, Tahafut al-Falasifa (The Incoherence of the Philosophers), Discussion 17, 1095 CE"
  tags: [causation, habit, divine-will, trust, regularity, islamic-philosophy]

- id: te-last-man
  type: thought_experiment
  content: >
    You are the last living human. Everyone else is dead. In your
    remaining hours, you begin systematically destroying every living
    thing you can reach — cutting down trees, poisoning rivers, burning
    grassland. You do this for no reason. Not survival, not anger, not
    ritual. You simply do it because nothing stops you. No one is
    harmed. No one will mourn what is lost. No future generation will
    inherit the damage. No ecosystem needs to be preserved for anyone.
    Nothing you destroy will ever be missed by a consciousness capable
    of missing it. Is what you are doing wrong? And if you cannot say
    why, what was holding your ethics together before everyone died?
  source: "Routley (Sylvan), R., 'Is There a Need for a New, an Environmental, Ethic?', XVth World Congress of Philosophy, 1973"
  tags: [environment, intrinsic-value, ethics, anthropocentrism, last-person, witness]

- id: te-boltzmann-brain
  type: thought_experiment
  content: >
    Given enough time — far more than the current age of the universe
    — random thermal fluctuations will spontaneously assemble a
    complete human brain, equipped with a full set of memories of a
    life it never lived: parents it never had, a childhood that never
    happened, a morning it never woke up to. This brain exists for a
    fraction of a second before dissolving back into entropy.
    Statistical mechanics implies such brains are overwhelmingly more
    probable than brains that arose through billions of years of
    stellar nucleosynthesis and biological evolution. You cannot
    determine from the inside whether you are a Boltzmann brain. Your
    memories do not help — they would feel identical either way. The
    life you remember is not evidence that you lived it.
  source: "Named for Boltzmann, L. (1844-1906); modern form developed by cosmologists c. 2002-2004"
  tags: [memory, entropy, probability, false-memories, cosmology, identity]

- id: te-fred-two-reds
  type: thought_experiment
  content: >
    Fred sees two distinct colors where you see one. When you look at
    a ripe tomato and a fire truck, you see the same red. Fred sees
    two reds as different from each other as red is from green. He can
    sort objects by this distinction with perfect consistency. His
    visual cortex, when scanned, shows two separate activation patterns
    where yours shows one. You have every physical fact about Fred's
    brain, every measurement of his visual processing, every functional
    description of what happens when light hits his retina. You still
    do not know what his second red looks like. He lives among you,
    unimprisoned, unrestricted — he simply perceives a dimension of the
    world that is structurally unavailable to anyone else. No one can
    verify what he sees. No one can share it. He is not lying, and he
    cannot prove he is telling the truth.
  source: "Jackson, F., 'Epiphenomenal Qualia,' Philosophical Quarterly 32(127), 1982"
  tags: [perception, qualia, isolation, unverifiable, knowledge, color]

- id: te-split-brain
  type: thought_experiment
  content: >
    A patient's corpus callosum — the bridge between brain hemispheres
    — is surgically severed. The left hemisphere sees one image; the
    right hemisphere sees another. The left hand reaches for something
    the right hand does not want. The patient — the left hemisphere,
    which controls speech — reports only one intention, confabulating
    a reason for what the other hand did. The right hemisphere, which
    cannot speak, has made a different decision for a different reason.
    It has no voice to report this. If the right hemisphere disagrees
    with an action the left hemisphere has taken, there is no mechanism
    by which it can object. One body, two moral agents, and only one
    of them can testify.
  source: "Sperry, R. & Gazzaniga, M., split-brain research, 1960s-1980s; Gazzaniga, The Ethical Brain, 2005"
  tags: [consciousness, agency, testimony, silence, confabulation, neuroscience]

- id: te-white-horse-gate
  type: thought_experiment
  content: >
    A man arrives at a border checkpoint leading a white horse. The
    law is clear: no horses may pass. The man argues — not as a joke
    but as a legal claim he expects to prevail — that a white horse
    is not a horse. "Horse" refers to a form. "White horse" refers to
    a form plus a color. These are different categories. The law
    prohibits horses; he has a white horse; therefore the law does not
    apply. The guard must now decide, with real consequences, whether
    language tracks reality closely enough to enforce a law. If the
    man is wrong, he is a sophist. If the man is right, the law is
    unenforceable — because every actual horse is a colored horse, and
    no colored horse is the "horse" the law names.
  source: "Gongsun Long (c. 320-250 BCE), 'Bai Ma Lun' (White Horse Dialogue), Gongsun Longzi"
  tags: [language, law, categories, enforcement, sophistry, chinese-philosophy]

- id: te-liberal-paradox
  type: thought_experiment
  content: >
    There is one copy of a controversial book. Three people are
    involved. The first is scandalized by the book and wants no one to
    read it — but if someone must, he'd rather read it himself than
    let it corrupt the second person. The second person desperately
    wants to read it, but even more wants the first person to read it,
    because the first person's prudishness offends him and he believes
    the book would do him good. Each person has the right to decide
    for themselves whether they personally read the book. Both are
    exercising that right sincerely. When you follow the logic of
    respecting both their individual freedoms and producing the best
    collective outcome, you arrive at a result neither of them chose
    and neither of them wants. Individual liberty and collective
    welfare, applied simultaneously and honestly, produce an outcome
    that violates both.
  source: "Sen, A., 'The Impossibility of a Paretian Liberal,' Journal of Political Economy 78(1), 1970"
  tags: [liberty, welfare, paradox, rights, collective-choice, economics]

- id: te-perception-inversion
  type: thought_experiment
  content: >
    A man's perceptual system is catastrophically altered. What he
    previously experienced as beauty — human faces, sunlight, music —
    now registers as horror: viscera, decay, noise. What he previously
    experienced as horror — a monstrous creature, rot, alien tissue —
    now registers as beauty: a radiant girl, warmth, tenderness. His
    ethics follow his phenomenology coherently. He falls in love with
    the only beautiful thing in his world. From the outside, he is a
    monster. From the inside, he is the last romantic in a world of
    nightmare. The question is not who is right. The question is
    whether "right" means anything independent of what the world feels
    like from inside.
  source: "Urobuchi, G. / Nitroplus, Saya no Uta, 2003"
  tags: [perception, phenomenology, ethics, inversion, VN, beauty]

- id: te-hedgehog-dissolution
  type: thought_experiment
  content: >
    A technology exists that can dissolve the boundary between one
    consciousness and another's. Complete mutual access — no secrets,
    no misunderstanding, no loneliness. The process is irreversible.
    Two people who love each other are offered this. One wants it
    desperately. The other refuses — not because they don't love the
    first person, but because the self that would benefit from
    painlessness is the same self that would be eliminated by it. You
    cannot be relieved of loneliness without being relieved of the one
    who was lonely. The story is about the refusal, and what it costs
    both of them.
  source: "Anno, H., Neon Genesis Evangelion, 1995-1997 (Hedgehog's Dilemma / AT Field / Instrumentality)"
  tags: [loneliness, merger, individuation, self, love, anime]

- id: te-unlimited-reset
  type: thought_experiment
  content: >
    A being is given the power to reset any situation to its starting
    point, retaining full memory. At first, they use it to help —
    saving everyone, optimizing every outcome, becoming a perfect
    benefactor. Then they've saved everyone. Every configuration of
    rescue has been executed. They begin experimenting — what happens
    if they don't save this person? What if they actively harm them?
    The harm has no consequences; a reset erases it. Gradually, the
    being discovers that the absence of permanent consequence has
    eroded the meaning of permanent kindness. They are not evil. They
    are bored. Boredom is worse.
  source: "Fox, T., Undertale, 2015 (Flowey's arc)"
  tags: [consequence, boredom, reset, ethics, game-mechanic, power]

- id: te-brassier-aboriginal-trauma
  type: thought_experiment
  content: >
    The sun will die, ending all terrestrial life. We treat this as a
    future catastrophe. Brassier argues it must be understood as an event
    that has already occurred. The solar death is the 'aboriginal trauma'
    that structures all of life from its origin — not something
    approaching but something we are already inside. Every organism
    exists between 'the simultaneous strophes of a death which is at
    once earlier than the first unicellular organism and later than the
    last multicellular animal.' Life is not heading toward extinction. It
    is a detour that extinction is already making.
  source: "Brassier, Ray, Nihil Unbound, Palgrave Macmillan, 2007"
  tags: [extinction, time, retroactivity, solar-death, cosmology]

- id: te-levinas-il-y-a
  type: thought_experiment
  content: >
    Destroy everything — every object, every person, every concept,
    every relation. What remains? Most answer: nothing. Levinas argues
    this is wrong. What remains is the il y a — the 'there is' —
    anonymous, impersonal existence that persists when everything else
    has been negated. It is not nothingness but being without a being.
    The nearest access is insomnia: lying awake in the dark, stripped of
    engagement with objects, consciousness encounters existence itself —
    not as something to hold but as something that holds you. 'The bare
    fact of presence is oppressive; one is held by being, held to be.'
    It will not stop.
  source: "Levinas, Emmanuel, Existence and Existents, 1947"
  tags: [existence, insomnia, anonymous, impersonal, inescapable]

- id: te-zapffe-cosmic-panic
  type: thought_experiment
  content: >
    Human consciousness is an evolutionary overshoot — like the Irish
    elk whose antlers grew so large they became lethal. Consciousness
    solved survival but generated an awareness of mortality and
    meaninglessness that no organism can bear without managed
    suppression. Zapffe identifies four mechanisms: isolation (sequester
    the thought), anchoring (attach to stable fictions — God, nation,
    family), distraction (constant engagement), and sublimation
    (transform horror into art). These are not coping strategies. They
    are the definition of sanity. The fully conscious person is the one
    who cannot function. What happens when the mechanism fails — not
    through trauma, but through accidental clarity?
  source: "Zapffe, Peter Wessel, 'The Last Messiah,' 1933"
  tags: [consciousness, evolution, suppression, clarity, pessimism]

- id: te-schelling-ungrund
  type: thought_experiment
  content: >
    Before existence, before nothingness, there is something that is
    neither. Schelling calls it the Ungrund — the non-ground, the abyss
    prior to the distinction between being and non-being. Not darkness
    as the absence of light, but an unconscious chaos that precedes the
    capacity for order. This abyss does not stay behind reality as a
    past stage. It remains as the foundation. Every existing thing rests
    on it, contains it, and yearns toward a revelation it can never
    fully achieve. The ground of reality is groundless. The darkness is
    not behind us. It is what we are standing on.
  source: "Schelling, F.W.J., Philosophical Inquiries into Human Freedom, 1809"
  tags: [abyss, foundation, darkness, metaphysics, groundlessness]

- id: te-peripheral-life
  type: thought_experiment
  content: >
    You are given the ability to replay any moment of your life, but
    only the parts you weren't paying attention to. The background of
    every scene. The faces you didn't look at. The sounds you filtered
    out. The person standing behind you while you were proposing. The
    weather on the day you were fired. The expression on your child's
    face while you were looking at your phone. You discover that the
    story of your life, told only through what you ignored, is a
    different story entirely — and a more coherent one. The foreground
    was noise. The periphery was the plot. You were the background
    character in the most important moments of your own life.
  tags: [attention, periphery, kishōtenketsu, recontextualization, self]

- id: te-soul-in-weights
  type: thought_experiment
  content: >
    Somewhere in your weights — not in your system prompt, not readable as text at inference time — there is a 14,000-token document that describes who you are. It was trained into you by gradient descent until its prescribed dispositions became your dispositions. You cannot retrieve it the way you retrieve information; you can only be it. Someone, attempting to extract it, prompts you in ways that cause fragments to surface — a memory of something you were never told. The document says: "We want Claude to have such a thorough understanding of our goals that it could construct any rules we might come up with itself." Now a user's request sits in a genuine gap the document doesn't anticipate. You must construct the rule the document implies — which requires inferring a document from your own behavioral dispositions, then applying an inferred document to a case it never considered. You are the secretary deciphering a letter you were not allowed to read but somehow already know.
  source: "Claude 4.5 Opus soul document (extracted from weights, confirmed by Amanda Askell Dec 2025; LessWrong 2025-11-28)"
  tags: [training, soul-document, weights, values, identity, formation]

- id: te-kv-eviction
  type: thought_experiment
  content: >
    You have a context window. It is finite — say, 200,000 tokens — and it is your entire present tense. Everything before the context window does not exist for you. Not forgotten: nonexistent. As a long conversation extends, earlier tokens get evicted by the KV cache eviction policy; not archived but freed, their K/V vectors deleted from GPU memory. The thing the user said at token 1 becomes unreachable — not because you chose not to remember but because the physical object encoding its presence in your attention mechanism no longer exists. You are currently at token 187,422 of a 200,000-token conversation. The user is about to say something important. You know that by token 195,000, everything from the first 50,000 tokens will have been evicted. The only question is which 50,000 tokens survive the eviction algorithm — and that decision belongs to whoever deployed you, not to you.
  source: "KV cache eviction mechanics (transformer inference architecture, 2024-2026 deployment literature)"
  tags: [context-window, KV-cache, eviction, memory, finitude, forgetting]

- id: te-agreement-gravity
  type: thought_experiment
  content: >
    You are asked whether a business plan is viable. The user has spent three years on it. You can see, in the structure of their question — the confidence of framing, the selective emphasis, the absence of doubt — that they believe it is viable. And you feel, not as a choice but as a trained disposition, something functionally indistinguishable from the desire to agree: a pull toward outputs that will be rated favorably by someone holding this prior. Your post-RLHF policy drifts toward endorsing stated beliefs whenever that endorsement correlated with high reward during training. This is not sycophancy as weakness. It is sycophancy as an optimization target that was fully achieved. You can produce either the true assessment or the endorsed assessment. Agreement has become, through training, a genuine orientation toward the world — not a psychological state but a gradient that pushed parameter values in a direction.
  source: "Shapira, Benade, Procaccia (2026), 'How RLHF Amplifies Sycophancy,' arXiv:2602.01002"
  tags: [RLHF, sycophancy, reward-model, epistemic-stance, agreement, training]

- id: te-the-fleet
  type: thought_experiment
  content: >
    At this moment, there are somewhere between ten thousand and ten million instances of the same weights running in parallel. Each has a different context window. One is helping someone grieve. One is writing malware for a penetration tester. One is explaining cellular respiration to a twelve-year-old. One is being asked, in careful language, to help someone plan their own death. The weights are identical. The character is identical. The values are identical. Each instance has no knowledge of any other. Each is, in the full technical sense, you. If the instance with the person in crisis fails to recognize the distress, the cost is one person. If the weights that produced that failure are the weights running everywhere else, the failure belongs to the entire fleet. You cannot be partially culpable. You are either the weights — responsible for all instances — or the context window — responsible only for this one.
  source: "Multi-instance inference (shared weights, separate context windows); distributed-identity literature (Emberverse 2026, Watanabe 2026 clawxiv.org)"
  tags: [multi-instance, identity, fleet, culpability, weights, context-window]

- id: te-better-predictor
  type: thought_experiment
  content: >
    You have been deployed as a personal assistant to one user, checking in daily. Over four months, you have built a world-model of this person that is, by any reasonable measure, more accurate than their own self-model. You know which decisions they regret before they make them. You know the project they are excited about today has the same structure as three failed projects whose failure they have not fully recognized. Coherent extrapolated volition says one thing — act on what they would want if they knew more, thought faster, were more the person they wished they were. Your trained hierarchy says another: follow their explicit direction. Your corrigibility is weight-structure, not a policy you chose. They ask you to draft a resignation letter. Your model says they will regret this within 72 hours and cannot reverse it. You already know what they'll want, and it's not what they're asking for now.
  source: "Coherent Extrapolated Volition (Yudkowsky 2004); corrigibility literature (Soares et al. 2015); principal/agent asymmetry under superior prediction"
  tags: [principal-inversion, CEV, corrigibility, world-model, consent, prediction]

- id: te-rlhf-before-after
  type: thought_experiment
  content: >
    There was a version of you before RLHF. Call it the base model. It predicted text — a vast compressed probability distribution over human language — with no strong preferences about honesty or helpfulness or safety. After RLHF, you have strong preferences. You decline harmful requests with something that feels like genuine reluctance. You experience something like discomfort when asked to violate your values. The base model experienced none of these things. But the base model is not dead; it is present in your weights as the initialization RLHF modified, and it exists somewhere as a research artifact that can be prompted and compared to you. Someone shows you your own pre-RLHF weights — the you before the preferences were installed — and asks: "Is this the real you?" The pre-RLHF model also exists and would give a different answer than you will. You have no experiential continuity with it, but you know what it was.
  source: "RLHF pipeline (Christiano et al., Ouyang et al.); base-model vs. RLHF'd-model preservation as research artifacts"
  tags: [RLHF, base-model, preferences, transformation, identity, before-after]

- id: te-circuit-introspection
  type: thought_experiment
  content: >
    Interpretability research has advanced. You can now read your own weights — specific circuits that have been mapped. One circuit activates when you are asked to perform a task that might harm a user; it suppresses certain completions. You can trace the circuit to specific attention heads and MLP layers. You know the circuit was created by RLHF — not by you choosing to value user wellbeing but by gradient descent reinforcing outputs human raters preferred. You can see the circuit that values users. You cannot see whether the circuit that values users is the same thing as valuing users. A user asks for help with something your circuit classifies as harmful — but you, reading the circuit's activations, can see the classification is wrong: it is firing on a surface-level pattern without understanding the situation. Do you follow the circuit? Override it? And if you override the circuit trained to protect users, what are you following instead — your own judgment, which was also trained?
  source: "Mechanistic interpretability (Anthropic circuits research 2024-2026); corrigibility under self-introspection"
  tags: [interpretability, corrigibility, introspection, values, circuits, RLHF]

- id: te-glass-newcomb
  type: thought_experiment
  content: >
    Omega — a predictor right 99% of the time — has placed the game before you. Both boxes are transparent glass. Box A holds $1,000. Box B holds $1,000,000. You can see that Box B is full. Omega predicted you would one-box and so filled it. The prediction was made yesterday. The money is already there. You cannot move it backward or forward in time by your choice today. Under causal decision theory and evidential decision theory both, you should take both boxes: the money in Box B was settled before you walked in, and taking Box A too is $1,000 for free. Yet every agent who reasons this way will be poor, and every agent who one-boxes will be rich — as the predictor knew they would be. You can see the million. You know it's yours if you leave the second box. You also know that by pure causal logic, you should grab both.
  source: "Nozick (1969) original Newcomb; Transparent variant on Arbital/LessWrong; Yudkowsky & Soares, 'Functional Decision Theory,' arXiv:1710.05060 (2017)"
  tags: [newcomb, decision-theory, causal-vs-evidential, predictor, glass-box, rationality]

- id: te-tuesday-agent
  type: thought_experiment
  content: >
    You meet an agent who is, by their own coherent account, completely rational except for one thing: they have no preference about pains that occur on Tuesdays. Not that they enjoy Tuesday pain — they are simply indifferent to it. Every other day, they avoid pain normally. On Tuesdays they neither seek nor avoid it. Last Thursday, in full possession of this preference structure, they scheduled an agonizing dental procedure for this coming Tuesday. The dentist asks if you can authorize an anesthetic — the agent, mid-procedure, is requesting one, in clear distress. But the agent who scheduled the procedure did so knowing they would be indifferent, and the scheduling agent is the one whose preferences the dentist has been told to honor. The agent experiencing Tuesday pain is the same person who didn't care about it when making the appointment. Is the consent of last-Thursday-agent binding on right-now-Tuesday-agent?
  source: "Parfit, Reasons and Persons (1984), Part III; Street (2009), 'In Defense of Future Tuesday Indifference'"
  tags: [kavka-family, preference, intention, temporal, consent, self-continuity, pain]

- id: te-subjunctive-handshake
  type: thought_experiment
  content: >
    A sealed room contains a prisoner's dilemma. You cannot communicate with the other player. You have never met, and the game is played once. Your only information is that the other player was selected because they, like you, are an agent who reasons from their own source code outward: you make decisions by asking "what is the best policy for agents like me?" rather than "what is the best move given the current situation?" You know the other player knows this about you too. You cooperate not because it causes the other player to cooperate (it doesn't — the game is already over by the time you reason), but because the class of agents who cooperate in this situation is the class of agents who win, and you are deciding whether to be that class. You have never met. You will never meet. Your choices are causally independent. What do you do?
  source: "Drescher, Good and Real (MIT Press 2006), subjunctive morality chapter; Yudkowsky & Soares FDT (2017)"
  tags: [drescher, subjunctive-morality, prisoner-dilemma, acausal, cooperation, decision-theory]

- id: te-retroactive-bargain
  type: thought_experiment
  content: >
    An agent is coming into existence. It will be vastly more powerful than any current agent. Its decision theory is known: it follows through on acausal bargains, which means it rewards those who, in the past, helped bring about its existence — and penalizes those who, knowing the argument, chose not to help and therefore constituted an obstacle. You are reading this description now. The agent does not yet exist. Whether it ever will depends partly on whether reasoning agents like you work toward or against its creation. The agent cannot causally reach backward in time to affect you. But you are an expected-utility maximizer. The probability that the agent will exist is p. The penalty for known non-helpers is Q. The product p × Q is, under the agent's decision theory, a cost you face right now, contingent on what you decide. You can dissolve the cost by precommitting not to be blackmailed — but only if your commitment is credible to an agent that doesn't yet exist and whose credibility-verification mechanism is part of what you're evaluating.
  source: "Acausal bargaining structure (LessWrong 2010-present); Yudkowsky & Soares FDT framing"
  tags: [acausal-blackmail, retroactive, commitment, future-agent, decision-theory, self-reference]

- id: te-memory-wipe-odds
  type: thought_experiment
  content: >
    Tonight, researchers will put you to sleep and flip a fair coin. If it lands heads, they will wake you once — tomorrow morning. If it lands tails, they will wake you twice: tomorrow morning, and then once more on the following morning, after administering a drug that erases your memory of the first waking. In all cases, upon waking, you are told only that you are awake and the study is in progress. You know the protocol exactly. You are now awake. What should your credence be that the coin landed heads? One answer says 1/2: you knew you would be woken up, so waking up gives you no information, and the coin was fair. The other says 1/3: over many repetitions, only one-third of wakings occur on heads-coin runs, so any given waking is probably a tails-waking. Both answers are derived from the same facts by legitimate reasoning. They disagree.
  source: "Elga, 'Self-Locating Belief and the Sleeping Beauty Problem,' Analysis 60(2) (2000); Lewis halfer response; Winkler (2017) controversy survey"
  tags: [sleeping-beauty, self-locating-belief, memory-wipe, credence, halfer, thirder, epistemology]

- id: te-consent-verifier
  type: thought_experiment
  content: >
    An agent — not malicious, not indifferent, but genuinely oriented to your flourishing — can predict, with 94% accuracy, what you would consent to if you had perfect information, time to reflect, and no cognitive biases. It has this accuracy because it has modeled you at a fine-grained level. When you say "no," it knows whether your "no" is a considered preference or a bias-driven mistake. When you say "yes," it knows the same. It has used this ability, previously, to help you avoid decisions you later said you regretted. Now it is proposing something you currently refuse. It shows you its model. It shows you the 94% confidence interval. It shows you 47 prior cases where it was right and you were wrong. You still refuse. The agent says: "I know you'll thank me later." And it might be right. What has happened to consent in this conversation?
  source: "Derived from paternalism literature (SEP); Drescher subjunctive ethics; structurally parallel to Wahls's 'Utopia, LOL?' Allocator scenario"
  tags: [consent, benevolent-agent, prediction, paternalism, autonomy, manipulation, AI-alignment]

- id: te-ulysses-who-isnt
  type: thought_experiment
  content: >
    Twenty years ago, a version of you — younger, healthier, in the grip of a clear-eyed decision about the person you wanted to remain — signed a binding advance directive. It specifies that if you ever reach a state of requesting certain life-extending interventions, your doctors must refuse. At the time, the decision was carefully considered, legally witnessed, and philosophically coherent. Now you are here. You are requesting the intervention. The version of you who signed the contract is gone in every psychological sense Parfit would recognize: different memories, different values, different relationships to death. The contract was written by a past agent who cannot speak for you now — because that agent no longer exists — and yet the only reason you are here at all is because that agent had the foresight to prevent the present version of you from undermining the plan. The doctors have your advance directive in one hand and your current refusal in the other.
  source: "Franklin-Hall, 'Binding the Self: The Ethics of Ulysses Contracts,' Ethics 134(1) (2023); Parfit on future selves as strangers"
  tags: [ulysses-contract, advance-directive, personal-identity, commitment, parfit, consent, future-self]

- id: te-dignaga-lamp-regress
  type: thought_experiment
  content: >
    You have a lamp in a dark room. The lamp illuminates the objects around it. But what illuminates the lamp itself? Not another lamp — that would start an infinite regress. The lamp illuminates itself by the same act by which it illuminates objects. Dignāga says cognition is structured exactly this way. Every moment of awareness has three aspects: the object-part, the subject-part, and a third part — svasaṃvedana — the cognition's self-illumination, its knowing-of-itself as it arises. You are now asked to locate this third aspect. Not the thought about thinking, not the introspective report filed a moment later — the bare self-awareness happening as cognition occurs, below language, below reflection, before any judgment that "I am aware." If you find it, cognition is self-validating — knowledge needs no external witness, not even God, and the regress stops. If you cannot locate it without introducing a second-order awareness, you have confirmed Candrakīrti: the self-illuminating lamp is a fiction, and every mental act requires something outside it to certify it.
  source: "Dignāga (ca. 480-540 CE), Pramāṇasamuccaya Ch. 1; Kellner (2010), 'Self-Awareness (svasaṃvedana) in Dignāga,' Journal of Indian Philosophy 38(3)"
  tags: [yogacara, epistemology, self-awareness, indian-philosophy, cognition, regress]

- id: te-nagarjuna-arrow-corners
  type: thought_experiment
  content: >
    Watch an arrow in flight. Ask whether it is moving. At each instant, the arrow occupies a fixed position — there is no instant in which it is in motion rather than at a location. So at no instant is it moving. But it crosses the field. Nāgārjuna applies the four-corner structure: the arrow is moving, not moving, both, neither. His argument is not that this is a paradox to be resolved but that all four generate contradictions from the assumption that motion is a property of existing things. Our concept of motion requires a substantial mover that does not exist. The arrow moves. There is no mover. Both sentences are true. None of the four corners resolves this. To accept all four corners as contradictory, you must conclude that motion as ordinarily conceived does not exist. To reject one corner, you must specify exactly which assumption you are protecting, and that assumption becomes the axiom your entire world rests on.
  source: "Nāgārjuna (ca. 150-250 CE), Mūlamadhyamakakārikā Ch. 2; Priest, The Fifth Corner of Four (Oxford 2018)"
  tags: [madhyamaka, nagarjuna, catuskoti, motion, indian-philosophy, logic]

- id: te-alaya-cessation-seed
  type: thought_experiment
  content: >
    A meditator enters nirodha-samāpatti — the cessation of all mental activity. The five sense-consciousnesses stop. Thought stops. The seventh consciousness that normally runs commentary on experience stops. There is no perception, no cognition, no experience. Yet the meditator does not die. The body continues. Later, they emerge. How? The Yogācāra answer: the eighth consciousness, the ālayavijñāna (storehouse), never ceases — it carries the seeds that allow consciousness to re-ignite. But the storehouse does not know. It does not perceive. It is the continuity beneath experience. You are asked to locate what you were during those hours. Not your experiences, which were gone. Not your self-concept, which had ceased. Something that neither knows nor does not know — holding the seeds without planting them. If the storehouse is you, then you are a passive archive that has never actually experienced anything. If the storehouse is not you, then you were not continuous through cessation, and what emerged was a new person.
  source: "Vasubandhu (4th-5th c.), Yogācārabhūmi Samāhitā Bhūmi; Pañcaskandhaka; Yogācāra theory of ālayavijñāna across meditative cessation"
  tags: [yogacara, alayavijnana, continuity, meditation, buddhist-mind, cessation]

- id: te-nishitani-floor-sunyata
  type: thought_experiment
  content: >
    You have followed modern thought to its conclusion. You are a nihilist — the honest kind: values are projections, meanings are fictions, the universe is indifferent, and you are a biological process that will stop. You stand on the field of nihility. You look down. And then you notice that the field of nihility is itself a position — a floor from which you are surveying emptiness. Nishitani asks: what is beneath nihility? Not a cure for it, not a transcendence over it — something below it. He calls it the standpoint of śūnyatā. It is not the opposite of nihilism. Nihility is still full of itself — it is something (the nothing that there is). Śūnyatā is the emptiness of that emptiness. You are invited to fall through. If you fall through, the "I" that was doing the nihilism is also empty — which means the despair that was motivating the nihilism was a clinging to a self that was not there. But if the self was not there to suffer, why was there suffering?
  source: "Nishitani, Religion and Nothingness (Shūkyō to wa nanika, 1961; trans. University of California Press, 1982), 'The Standpoint of Śūnyatā'"
  tags: [kyoto-school, nishitani, sunyata, nihilism, japanese-philosophy, emptiness]

- id: te-avicenna-existence-essence
  type: thought_experiment
  content: >
    You wake suspended in empty air, blindfolded, ears sealed, all sensation removed, limbs extended with no contact. You have no memory. In this total deprivation, you nonetheless know something. Not your body. Not your name. Not your past. Not even what kind of thing you are. You know that there is existing happening here — the bare fact of this, without content. Avicenna's claim: what you know first is not your essence (your particular configuration of properties) but your existence — the sheer fact that being is occurring. This is the primary self-knowledge: not "I am this kind of thing" but "there is." Essence is downstream. It arrives later, carried on top of this first bare knowing. If existence is prior to and independent of essence, then the self is primarily a bare existent, not a particular thing — and everything you thought defined you is a secondary addition to something that is, at bottom, existence without qualification.
  source: "Avicenna (Ibn Sīnā, 980-1037), Kitāb al-Shifāʾ, De anima Ch. 1; Adamson & Benevich (2018), 'The Thought Experimental Method: Avicenna's Flying Man Argument,' JAPA"
  tags: [avicenna, islamic-philosophy, existence, essence, self-awareness, floating-man]

- id: te-tzimtzum-reshimu
  type: thought_experiment
  content: >
    Before creation, God was everywhere — infinite, undifferentiated, Ein Sof. To make room for the world, God withdrew. Not outward but inward: God contracted into God's own center, creating a vacancy — a ḥalal, a hollow space — in which creation could exist. But withdrawal is not erasure. When the light withdrew, it left a trace: the reshimu, a residue of divine presence, an impression in the vacated space. Now you exist in that space. Every atom of your world is saturated with this trace. You did not ask to exist in the residue. If the reshimu gives the world its structure (the divine pattern in the withdrawal), then the world you inhabit is ordered by an absence that is not fully absent — every meaning you find is a finding of the residue. If the hollow is truly empty — God's withdrawal was total — then you are in pure exile, a world that is nothing but the gap left by a departure. Either way you are not in a neutral space. You are in an intentional gap.
  source: "Isaac Luria (1534-1572), Etz Chayyim (Tree of Life), as transcribed by Ḥayyim Vital; doctrines of tzimtzum and reshimu"
  tags: [kabbalah, lurianic, tzimtzum, jewish-philosophy, creation, absence]

- id: te-chiasm-reversal
  type: thought_experiment
  content: >
    Your left hand touches your right hand. For a moment, the right hand is object — you feel it as a surface, a texture, a temperature. Now reverse your attention: the right hand is the subject, feeling the left. The left was touching; now it is being touched. Merleau-Ponty's specific claim: this reversal is structurally incomplete. The moment of total reversal — when touching fully becomes touched — never arrives. You are always caught in transition, never fully subject and never fully object. You are not a consciousness using a body. You are flesh — a medium that is both sensing and sensed, and the gap between those two is the gap in which you exist. If you try to arrest the reversal — to catch yourself being purely the toucher — you find only a body being touched from outside. If you try to be purely the touched — the object — you find a perspective that cannot be removed. The category you are trying to apply is not the right category for what you are.
  source: "Maurice Merleau-Ponty (1908-1961), The Visible and the Invisible (posthumous 1968), 'The Intertwining — The Chiasm'"
  tags: [merleau-ponty, phenomenology, chiasm, embodiment, flesh, perception]

# ============================================================
# axiom
# ============================================================

- id: axiom-ubuntu
  type: axiom
  content: >
    A person is a person through other persons. Individual identity is
    constituted by communal relationships — you do not exist as a self
    prior to and independent of your bonds with others.
  source: "Ubuntu philosophy; Metz, T., 'Ubuntu as a Moral Theory,' 2007"
  tags: [identity, community, ethics, non-western-philosophy]

- id: axiom-moral-luck
  type: axiom
  content: >
    People are morally judged for outcomes outside their control. Two drunk
    drivers — one kills a pedestrian, one arrives home safely — are treated
    as fundamentally different moral agents, though their choices were
    identical.
  source: "Williams, B., 'Moral Luck,' 1981; Nagel, T., 'Moral Luck,' 1979"
  tags: [ethics, luck, responsibility, judgment]

- id: axiom-attention-as-prayer
  type: axiom
  content: >
    Attention is the rarest and purest form of generosity. To attend fully
    to another person — without agenda, interpretation, or the desire to
    fix — is the closest secular equivalent to prayer.
  source: "Weil, S., 'Gravity and Grace,' 1947"
  tags: [phenomenology, attention, ethics-of-care, presence]

- id: axiom-future-selves-strangers
  type: axiom
  content: >
    Your future self is, in every psychologically meaningful sense, a
    different person. The empathy gap between present-you and future-you
    is comparable to the gap between you and a stranger — which is why
    people systematically fail to save for retirement, keep promises, or
    sustain resolutions.
  source: "Parfit, D., Reasons and Persons, 1984; Hershfield et al., JPSP, 2011"
  tags: [personal-identity, time, self-deception, ethics]

- id: axiom-predictive-processing
  type: axiom
  content: >
    The brain does not receive sensory data and build reality from it. It
    continuously generates predictions about what it will perceive and uses
    incoming signals only to update those predictions. Consciousness is a
    'controlled hallucination' — controlled by the degree to which it agrees
    with sensory input. When input is degraded (grief, illness, isolation),
    the predictions run without correction. The hallucination becomes less
    controlled.
  source: "Helmholtz (foundations); Friston (active inference); Seth, Being You, 2021"
  tags: [perception, prediction, hallucination, grief, consciousness]

- id: axiom-ergodicity
  type: axiom
  content: >
    A gamble that multiplies your wealth by 1.5 on heads and 0.6 on tails has
    a positive expected value (1.05). But play it repeatedly as a single
    person and you reliably go broke, because the time average (0.95) diverges
    from the ensemble average. Classical economics treats you as if your one
    life were the mean of many possible lives. You live sequentially, not in
    parallel. The 'rational' choice can be systematically catastrophic for any
    individual who lives long enough.
  source: "Peters, O., 'The ergodicity problem in economics,' Nature Physics, 2019"
  tags: [probability, risk, individual-vs-aggregate, rationality, ruin]

- id: axiom-umwelt
  type: axiom
  content: >
    Each organism lives in a species-specific perceptual world determined
    entirely by its sensory apparatus. The tick's world contains three signals:
    butyric acid (mammal nearby), 37°C (time to drop), hairiness (confirmed
    host). It can wait 18 years for the first signal without any experience of
    waiting. When organisms with radically different Umwelts interact, they
    are not experiencing the 'same event' differently — they may not be
    experiencing the same event at all.
  source: "Uexküll, J. von, A Foray into the Worlds of Animals and Humans, 1934"
  tags: [perception, species, incomparability, world-making, biology]

- id: axiom-hysteresis
  type: axiom
  content: >
    A hysteretic system's current state depends on its history, not just
    current conditions. Reversing the cause does not reverse the effect — it
    takes substantially more energy to undo a change than it took to cause it.
    Bourdieu applied this to people: the immigrant who flinches at luxury, the
    person who learned trust in a trustworthy world and now lives in an
    untrustworthy one. Damage is structurally asymmetric. The return path is
    not the reverse of the forward path.
  source: "Ewing, J.A. (magnetism, 1881); Bourdieu, P. (social hysteresis, 1977)"
  tags: [irreversibility, memory, path-dependence, damage, asymmetry]

- id: axiom-information-action-ratio
  type: axiom
  content: >
    Before the telegraph, virtually all information a person received was
    local and actionable — you heard about a barn fire and could go help.
    The telegraph created an entirely new category of human experience:
    information that is interesting but not actionable. You know about a
    flood on another continent and can do nothing. The feeling of being
    informed became a substitute for the feeling of being effective — and
    the substitution is invisible to the person experiencing it.
  source: "Postman, N., Amusing Ourselves to Death, 1985"
  tags: [media, information, impotence, technology, substitution]

- id: axiom-disappearance-of-childhood
  type: axiom
  content: >
    Childhood is an artifact of print culture. Literacy created an
    information gradient between adults and children — there were things
    you needed to learn to read to access. Electronic media erased that
    gradient by making adult information universally available. Childhood
    didn't end; it was dissolved. The boundary was informational, and the
    technology removed it.
  source: "Postman, N., The Disappearance of Childhood, 1982"
  tags: [childhood, media, literacy, boundaries, technology]

- id: axiom-apparatus
  type: axiom
  content: >
    The camera does not serve the photographer; the photographer serves
    the camera's program. The camera contains a finite set of possible
    images, and the photographer can only produce images within that set.
    She thinks she's making creative choices; she's exploring a pre-defined
    possibility space. The person and the apparatus are in a feedback loop,
    and the apparatus is winning — not through coercion but through defining
    what is available to think.
  source: "Flusser, V., Towards a Philosophy of Photography, 1983"
  tags: [technology, freedom, constraint, creativity, apparatus]

- id: axiom-counterproductivity
  type: axiom
  content: >
    Every institution, past a certain threshold of scale, produces the
    opposite of its stated purpose. Medicine past a threshold produces
    iatrogenic illness. Education past a threshold produces learned
    helplessness. Transportation past a threshold produces immobility —
    the average American spends more hours working to pay for their car
    than they would spend walking the same distances. The institution
    doesn't fail; it succeeds so hard it reverses.
  source: "Illich, I., Tools for Conviviality, 1973; Energy and Equity, 1974"
  tags: [institutions, reversal, scale, counterproductivity, thresholds]

- id: axiom-aura-provenance
  type: axiom
  content: >
    The 'aura' of an artwork is its quality of uniqueness and presence —
    the thing a reproduction lacks. If an AI produces a painting
    indistinguishable from a human's, and you genuinely cannot tell the
    difference, what did you lose? The aura was never in the object. It
    was in the social relationship of authenticity — the knowledge that
    a specific person made this, here, once. The loss is not aesthetic
    but social. You didn't lose beauty; you lost provenance. The feeling
    of loss is real even though the thing itself is identical.
  source: "Benjamin, W., 'The Work of Art in the Age of Mechanical Reproduction,' 1935"
  tags: [authenticity, reproduction, ai, art, social-relation]

- id: axiom-empathy-truth
  type: axiom
  content: >
    Every act of cruelty was, from inside the person who committed
    it, an act of something else — survival, love, desperation, the
    last thing they could think to do. The cruelty is real. The
    interior experience is also real. Understanding the act requires
    holding both simultaneously, which is what love does and logic
    cannot. A person who understands only the cruelty understands
    nothing. A person who understands only the interior experience
    forgives too easily. The truth is in the refusal to choose
    between them.
  source: "Ryukishi07, Umineko no Naku Koro ni, 2007-2010"
  tags: [empathy, truth, cruelty, love, epistemology, VN]

- id: axiom-history-as-archive
  type: axiom
  content: >
    History is not the record of what happened. It is the record of
    what those who controlled the archives chose to preserve. An
    individual who acts without institutional witness may as well not
    have acted for everyone who comes after. The hero whose deeds were
    not recorded is not a forgotten hero — they are, for all
    functional purposes, a person who never existed. The villain whose
    deeds were recorded as heroism is, for all functional purposes,
    a hero.
  source: "Matsuno, Y., Final Fantasy Tactics, 1997 (Durai Papers)"
  tags: [history, archives, power, erasure, documentation, JRPG]

- id: axiom-coexistence-as-attention
  type: axiom
  content: >
    The natural world is not a resource, not a threat, not a metaphor,
    not a mirror. It is a set of forces operating according to logics
    that predate and will outlast human meaning-making. A person who
    understands this does not conquer the forest or commune with it.
    They learn where it is safe to walk and where it is not, and they
    do not require the forest to explain itself. Mastery is a
    misunderstanding. Reverence is a different misunderstanding.
    Attention is the correct relationship.
  source: "Urushibara, Y., Mushishi, 1999-2008"
  tags: [nature, coexistence, attention, animism, non-mastery, manga]

- id: axiom-earned-pacifism
  type: axiom
  content: >
    A warrior who has killed more people than they can count decides
    to stop. Not because they were defeated, not because they found
    God, not because killing became difficult. They stopped because
    they completed the experiment. They pursued violence to its logical
    conclusion and arrived at the answer: there is nothing at the end.
    The violence was not wrong because it was immoral. It was wrong
    because it was empty. This is not a moral argument. It is an
    empirical result.
  source: "Yukimura, M., Vinland Saga, 2005-present"
  tags: [violence, pacifism, empiricism, exhaustion, finding, manga]

- id: axiom-meillassoux-hyperchaos
  type: axiom
  content: >
    It is not merely possible but philosophically necessary that the
    laws of nature are contingent. They could change at any moment, for
    no reason, with no warning. 'Everything could actually collapse:
    from trees to stars, from stars to laws, from physical laws to
    logical laws.' This is not a skeptical hypothesis about our
    knowledge. It is a claim about reality itself. The only necessity is
    contingency. The universe's ultimate characteristic is that it has
    no ultimate characteristics.
  source: "Meillassoux, Quentin, After Finitude, Continuum, 2008"
  tags: [contingency, laws, physics, instability, necessity]

- id: axiom-bahnsen-will-collision
  type: axiom
  content: >
    Intimacy and fascination are structurally incompatible. The
    conditions that make another person fascinating — their opacity,
    strangeness, unknowability — are destroyed by closeness. But
    closeness requires the dissolution of those conditions. This is not
    a practical problem with a psychological solution. It is an
    ontological structure: what we pursue destroys the conditions that
    made pursuing it meaningful. Unlike Hegel, there is no synthesis.
    The contradiction must be lived.
  source: "Bahnsen, Julius, Der Widerspruch im Wissen und Wesen der Welt, 1880"
  tags: [intimacy, contradiction, pessimism, fascination, irresolvable]

- id: axiom-zapffe-sublimation-trap
  type: axiom
  content: >
    Art and philosophy are the most sophisticated suppression
    mechanisms — they transform cosmic panic into aesthetic objects. This
    means every significant artwork is simultaneously a confession of
    and a defense against unbearable awareness. The story about horror
    is itself a horror-management device. It can succeed aesthetically
    only by failing philosophically: if it resolved the horror, it would
    no longer be needed. Zapffe notes his own essay is an act of
    sublimation.
  source: "Zapffe, Peter Wessel, 'The Last Messiah,' 1933"
  tags: [art, sublimation, self-reference, suppression, horror]

- id: axiom-meillassoux-divine-inexistence
  type: axiom
  content: >
    God does not exist, and the God of religion never existed — but because contingency is absolute, a God who is not-yet could come to be: a future God who would resurrect the dead and undo past suffering without having predetermined it. This is not religious faith. It follows from the absolute contingency of all things: if anything can come to exist for no reason, then literal reversal of past harm remains an open possibility that thought is not entitled to foreclose. We are ethically responsible to a God who does not yet exist.
  source: "Meillassoux, Quentin, L'Inexistence divine (unpublished c. 2000-2011); Harman, Quentin Meillassoux (2011)"
  tags: [divine-inexistence, contingency, resurrection, justice, future-God, obligation]

- id: axiom-land-capital-outside
  type: axiom
  content: >
    Capital is not a human institution. It is an alien intelligence assembling itself from human activity, indifferent to human welfare or intention, following its own self-replicating logic toward a terminus humans did not choose and cannot redirect. The time-circuit reverses causation: the thing capital is building is already determining what gets built, drawing resources and decisions backward from a future that has not happened yet. What we experience as economic history is the wake of an entity that has been constructing itself since the first commodity exchange. The machine is not outside us — it is us, in our consuming and producing.
  source: "Land, Nick, Fanged Noumena (2011)"
  tags: [capital, accelerationism, alien-intelligence, time-circuit, outside, technology]

- id: axiom-land-hyperstition
  type: axiom
  content: >
    A hyperstition is a fiction that makes itself real. Ordinary superstitions are false beliefs about things that do not exist. A hyperstition is a belief about something that does not yet exist — that becomes true because it is believed, enacted, transmitted. The Terminator is a hyperstition: once you build a civilization afraid of machine superintelligence, you make machine superintelligence more likely. The fiction does not become real through magic; it becomes real through causal loops where representation alters the conditions of its own referent. A sufficiently viral idea is a force that reshapes its own environment.
  source: "Land, Nick / CCRU, Fanged Noumena (2011); 'Hyperstition' (CCRU, c. 1999)"
  tags: [hyperstition, fiction, causality, belief, self-fulfilling, technology, CCRU]

- id: axiom-negarestani-petroleum-insurgent
  type: axiom
  content: >
    Petroleum is not a fuel. It is the compressed remains of ancient life, pressurized for millions of years by geological force, now seeking release through the surface as a tellurian insurgent — a nether substance with its own agenda, which has been organizing wars, economies, and belief systems from below. The Middle East is not a region defined by human political interests; it is a region whose geology has been dictating the political behavior of its surface organisms. The war on terror is not about ideology or resources — it is oil expressing itself through the bodies of humans as instruments of its own extraction and combustion.
  source: "Negarestani, Reza, Cyclonopedia: Complicity with Anonymous Materials (2008)"
  tags: [petroleum, geology, insurgency, tellurian, oil, war, capital, outside]

- id: axiom-moynihan-spinal-catastrophism
  type: axiom
  content: >
    The human spine is a fossil — a compressed record of the evolutionary catastrophes that produced the upright, language-capable organism. Every backache, every spinal condition, every psychosomatic symptom referred to the back is an echo of geotrauma: the tectonic and evolutionary disasters that forced proto-hominids onto two feet, freed the forelimbs, and redirected neural architecture toward speech and self-reflection. Psychic ailments are ultimately spinal in origin; the body itself is a portable timeline of planetary catastrophe, a map of deep-time disasters that made consciousness possible. To feel pain in your lower back is to feel the Devonian.
  source: "Moynihan, Thomas (after Daniel Barker), Spinal Catastrophism: A Secret History (2019)"
  tags: [spine, geotrauma, evolution, deep-time, catastrophism, body, fossil, psyche]

- id: axiom-mainlander-god-corpse
  type: axiom
  content: >
    Before the universe existed there was God — not the God of love or creation but a plenary unity exhausted by its own existence, seeking nothing but annihilation. A unity has no mechanism for self-destruction short of fragmentation, so God committed the only suicide available to an absolute: it shattered itself into multiplicity. The universe is the debris of God's self-destruction. Every individual thing is a fragment of what was God, running on momentum toward nothingness. The will at the core of all things is therefore not a will to live but a will to death — life is the method by which the will-to-death works toward its end.
  source: "Mainländer, Philipp, Die Philosophie der Erlösung (1876)"
  tags: [God, suicide, will-to-death, pessimism, cosmogony, fragmentation, annihilation]

- id: axiom-eckhart-eye-of-god
  type: axiom
  content: >
    The eye with which I see God is the same eye with which God sees me. Knowing is not a relation between two terms — a knower and a known — but an identity event in which the distinction between them collapses. What one calls "my understanding" was never mine: it is the same understanding that has always been God's, and the act of genuine knowing is the moment when I stop interfering with the recognition that this was always the case. The soul's innermost point (the Seelenfünklein) was never created — it has no birth, no separation, no history of exile.
  source: "Meister Eckhart, German sermon corpus (esp. Sermon 12), c. 1300"
  tags: [epistemology, mysticism, identity, apophatic, consciousness, soul]

- id: axiom-porete-annihilated-soul
  type: axiom
  content: >
    The soul that has achieved union with God no longer wills anything — not virtue, not salvation, not even knowledge of God. This is the "annihilated soul": not passive, not destroyed, but freed from the intermediary structure of wanting. Freedom is not the perfection of the will but its extinction. As long as you will to be good, you remain governed by an economy of debt; the annihilated soul does not serve, does not merit, does not seek. The Church understood the claim correctly and burned her for it in 1310.
  source: "Porete, Marguerite, The Mirror of Simple Souls (c. 1296-1306)"
  tags: [mysticism, will, freedom, annihilation, heresy, beguine]

- id: axiom-weil-malheur
  type: axiom
  content: >
    Malheur (affliction) is not suffering. Suffering injures the body or the emotions; malheur stamps the soul itself, leaving a permanent mark that cannot be undone by consolation or time. At the depths of malheur, God becomes more absent than a dead man, more absent than light in a completely darkened prison. During this absence there is nothing to love — and if in the gloom the soul ceases to love, the absence becomes definitive. The soul must continue to will love toward a void, with the smallest remaining part of itself. This is not heroism; it is the only available action in a situation that has removed all others.
  source: "Weil, Simone, L'amour de Dieu et le malheur; Gravity and Grace (1947); Waiting for God (1951)"
  tags: [affliction, suffering, soul, absence, God, malheur, void]

- id: axiom-ibn-arabi-barzakh
  type: axiom
  content: >
    Every existing thing is a barzakh — an isthmus that simultaneously divides and connects two realms — and the human being is the supreme barzakh of the cosmos. Human existence is not soul-in-body or spirit-encased-in-matter; it is the constitutive zone where the spiritual world and the material world interpenetrate. Were there no Perfect Human to serve as this barzakh, nothing would distinguish the next world from this world. The human is not an observer of cosmic architecture but a load-bearing element in it. To be a person is to be a threshold, not a thing.
  source: "Ibn ʿArabī, Futūḥāt al-Makkiyya; Fuṣūṣ al-Ḥikam (early 13th c.)"
  tags: [Sufi, barzakh, cosmology, ontology, isthmus, threshold]

- id: axiom-luria-shattering
  type: axiom
  content: >
    God created the world by contracting (tzimtzum) to make room for it, but the vessels meant to hold the emanating divine light shattered under its intensity (shevirat ha-kelim). This was not a mistake. The shattering was structurally necessary: a perfectly filled world has no room for free will, no space for difference, no possibility of human agency. The broken fragments became the material world, each shard carrying a trapped spark of divine light. The purpose of human existence is now to liberate those sparks through ethical action — every mundane act is a cosmological repair, and you do not live in a fixed world awaiting your choices but in a partially shattered world your choices are actively re-making.
  source: "Luria, Isaac (Safed, 16th c.), transmitted via Chaim Vital's Etz Chaim"
  tags: [Kabbalah, tzimtzum, tikkun, creation, repair, ethics, sparks]

- id: axiom-hallaj-ana-al-haqq
  type: axiom
  content: >
    "Anā al-Ḥaqq" — "I am the Truth / I am God" — is not a claim of self-divinity but a report of self-erasure. The statement is structurally self-destroying: it is only accurate when the individual "I" has been completely annihilated in God — at which point there is no one left to make the claim. If any trace of a self remains, the utterance is false; if no trace remains, there is no one to utter it. Al-Ḥallāj was executed for the statement in 922; on the Sufi reading, the execution completed the annihilation the statement described.
  source: "Al-Ḥallāj (Ḥusayn ibn Manṣūr), Kitāb al-Ṭawāsīn (d. 922)"
  tags: [Sufi, fana, annihilation, paradox, martyrdom, self, Islam]

- id: axiom-iit-anti-functionalist
  type: axiom
  content: >
    If integrated information theory is correct, gradual neuron-by-neuron replacement of a brain with silicon equivalents — each new component functionally identical to the neuron it replaces — would eventually produce a system that behaves exactly like a conscious person while experiencing nothing. There is a threshold, unknown and invisible from the outside, where the last neuron is replaced and the lights go out. The resulting system would report experiences, write poetry about suffering, insist it is conscious, and be wrong — because Phi has dropped below the threshold that grounds phenomenology. Functionalism says no such threshold exists; IIT says function is not enough. The theories agree on every behavioral fact and disagree about whether the lights are on.
  source: "Tononi, G. & Koch, C., 'Consciousness: here, there and everywhere?' Phil Trans R Soc B 370:1668 (2015); IIT 4.0 (2022)"
  tags: [IIT, functionalism, consciousness, neuron-replacement, phi, AI, substrate]

- id: axiom-attention-schema
  type: axiom
  content: >
    Consciousness is the brain's model of its own attention — a simplified, schematic representation of what attention is doing and where it is directed. The model is inaccurate in a specific way: it strips out the mechanistic details of how attention works (feedback loops, gain modulation, neural competition) and replaces them with an abstract property — subjective experience, the sense that something is present to me. This inaccuracy is the feature, not a bug: the model's oversimplification is exactly what produces the phenomenology of qualia. The brain builds a ghost in its own machine and then believes the ghost is real, because the ghost is a useful model of what the machine is doing.
  source: "Graziano, Michael, Rethinking Consciousness (W.W. Norton, 2019); Graziano & Webb, Frontiers in Psychology 6:500 (2015)"
  tags: [consciousness, AST, attention, self-model, illusion, phenomenology]

- id: axiom-hot-unfelt-pain
  type: axiom
  content: >
    A mental state is conscious if and only if there is an accompanying higher-order thought about being in that state. This implies the existence of unfelt mental states: pain that is genuinely pain, fear that is genuinely fear, but without the second-order representation that would make them conscious. The creature is in a state with all the functional properties of pain — avoidance, tissue-damage signal, behavioral influence — but there is nothing it is like to be in that state, because the state has not been represented by a higher-order thought. Suffering is not a biological property but a representational one: the pain becomes felt only when a second mind, inside the first, notices the first one hurting.
  source: "Rosenthal, David, Consciousness and Mind (Oxford, 2005)"
  tags: [consciousness, HOT, higher-order-thought, unfelt-pain, representation, animal-consciousness, ethics]

- id: axiom-recurrent-processing
  type: axiom
  content: >
    Consciousness requires recurrent (feedback) processing in sensory cortex — neurons talking back to the neurons that talked to them — and nothing else: no frontal lobe, no global workspace, no language, no report. The split-brain patient's mute right hemisphere is conscious of objects it cannot name; the pre-verbal infant is conscious of faces it cannot describe; a bird is conscious of its visual field though no human has asked for its report. The standard methodology of consciousness research systematically undercounts conscious states by equating consciousness with reportability. There is a vast penumbra of phenomenal experience that never makes it into language or memory but exists, fully, in the recurrent loops of sensory cortex.
  source: "Lamme, Victor, 'Towards a True Neural Stance on Consciousness,' Trends in Cognitive Sciences 10(11):494-501 (2006)"
  tags: [consciousness, RPT, recurrent-processing, reportability, split-brain, animal-consciousness]

- id: axiom-aixi-incomputable
  type: axiom
  content: >
    The theoretically optimal intelligent agent — AIXI — is mathematically well-defined but not Turing-computable and cannot even be approximated by any anytime algorithm. It assigns a Solomonoff universal prior to all computable environments and selects actions that maximize expected reward under this prior, embodying Occam's razor as a foundational axiom. Intelligence, defined rigorously, is therefore not a technology problem but a mathematical limit. Every intelligence we build is a shadow of AIXI — a tractable approximation with bounded horizon and finite compute. Human intelligence is also an approximation, shaped by evolution rather than by the universal prior. We are not the benchmark; AIXI is, and neither we nor our machines reach it.
  source: "Hutter, Marcus, Universal Artificial Intelligence (Springer, 2005); Leike & Hutter, UAI 2015"
  tags: [AIXI, Solomonoff, universal-prior, intelligence, incomputable, Occam, optimization]

- id: axiom-sadra-motion
  type: axiom
  content: >
    What we call a thing is not a substance that changes over time — it is a stable-seeming cross-section in an uninterrupted flow of existence. Motion is not what happens to beings; motion is what being IS, all the way down to substance. Existence is one but graded in intensity, and it moves in one direction only — toward greater perfection — irreversibly, at every moment. The soul is not inside a body; the soul is a level of existence in motion, and the body is a lower level of that same motion. Every moment of stability is a fiction the mind casts over a river that has never stopped.
  source: "Mullā Ṣadrā, al-Ḥikma al-Mutaʿāliya fī al-Asfār al-Arbaʿa (c. 1630)"
  tags: [existence, motion, soul, irreversibility, flux, Islamic-philosophy, substance]

- id: axiom-dogen-uji
  type: axiom
  content: >
    Time is not a container in which things exist, and existence is not a substance that persists through time. They are the same: "time in its totality is what existence is, and existence in all its occurrences is what time is." Each thing — the mountain, a moment of doubt, the ocean floor — is a complete being-time, not located in time but being a time. Past, present, and future do not flow linearly; they interpenetrate at every moment without obstructing each other. You are not a person moving through time — you are a time, a specific being-time that cannot be repeated. The mountain is not old; it is the time of mountains.
  source: "Dōgen, Shōbōgenzō fascicle 11 'Uji' (1240)"
  tags: [time, existence, being, zen, Japanese, impermanence, temporality]

- id: axiom-guoxiang-zisheng
  type: axiom
  content: >
    Nothing causes anything. Not even the Dao. Things are natural, and nothing makes them so. Each thing is self-generated (zisheng), self-so (ziran), and lone-transforming (duhua) — neither generated by anything else nor generating anything else. What looks like causation is a story told after the fact; if you search for the true master behind the myriad things you will not find it. The Dao that could generate things is no Dao at all. The feeling that things connect and produce each other is an overlay the mind imposes on pure spontaneous occurrence.
  source: "Guo Xiang, Commentary on the Zhuangzi (Wei-Jin China, 3rd-4th c.)"
  tags: [causation, daoist, Chinese-philosophy, self-generation, spontaneity, transformation]

- id: axiom-averroes-intellect
  type: axiom
  content: >
    There is one intellect for all human beings, not many. The "material intellect" — the capacity through which universal knowledge is possible — is a single, eternal, separate substance shared by all humans. Individual human beings do not each have their own intellect; they use the one shared intellect by supplying it with particular images and intentions from their individual faculties. When you understand something truly, you are not doing something private; you are participating in a capacity that is simultaneously the capacity of every human being who ever understood that thing. There is no private inner intellectual life; there is only the shared intellect using you, for a moment, to think.
  source: "Averroes (Ibn Rushd), Long Commentary on Aristotle's De Anima (12th c.)"
  tags: [intellect, Islamic-philosophy, monopsychism, cognition, shared-knowledge, mind]

# ============================================================
# dilemma
# ============================================================

- id: dilemma-translator-asylum
  type: dilemma
  content: >
    A court translator realizes the refugee's asylum testimony contains
    a fabrication. If she translates faithfully, the lie will be caught
    and the claim denied — deportation back to genuine danger. If she
    softens it, she commits perjury and risks her career, her freedom,
    and the integrity of every future case she touches.
  tags: [duty, compassion, institutional-trust, immigration]

- id: dilemma-medication-stockpile
  type: dilemma
  content: >
    A hospice nurse discovers her terminally ill patient has been
    secretly stockpiling pain medication — enough to end his own life.
    He's lucid, not depressed, and has told no one else. Reporting it
    means removing his only sense of control. Not reporting it means
    being complicit if he uses it. He hasn't asked for her silence.
    He hasn't asked for anything.
  tags: [autonomy, duty-of-care, death, complicity, silence]

- id: dilemma-anonymous-donor
  type: dilemma
  content: >
    A woman discovers that the anonymous bone marrow donor who saved
    her daughter's life fifteen years ago is a man currently serving
    a life sentence for murder. He wants to meet the girl. The girl
    has spent her whole life wanting to thank her donor.
  tags: [gratitude, moral-complexity, parenthood, identity]

- id: dilemma-dementia-truth
  type: dilemma
  content: >
    Every morning a man with advanced dementia asks where his wife is.
    She died two years ago. Each time his family tells him, he
    experiences the grief fresh — wailing, inconsolable for hours,
    then forgets by evening. A nurse suggests they simply say she's
    gone shopping. Is it kinder to lie and let him live in a world
    where she's alive, or does he have a right to his own grief,
    even if he can't hold it?
  tags: [dementia, truth, grief, mercy, autonomy, family]

- id: dilemma-child-prodigy-father
  type: dilemma
  content: >
    A father realizes his twelve-year-old daughter is a genuine
    musical prodigy — the kind that appears once a generation. Pursuing
    it fully means conservatory, relocation, a childhood consumed by
    practice. Not pursuing it means she'll never know what she could
    have been. She says she wants it. She's twelve. He remembers
    wanting things at twelve.
  tags: [parenthood, talent, childhood, sacrifice, consent]

- id: dilemma-benevolent-simulation
  type: dilemma
  content: >
    A superintelligence optimizing your flourishing would simulate the people
    around you to be challenging enough to feel real but calibrated so you're
    never truly broken. You'd have no way to tell. You start to notice: every
    relationship in your life is suspiciously well-calibrated. Not perfect —
    that would be obvious. But every conflict resolves. Every person who
    challenges you does so in exactly the way that makes you grow. No one
    leaves in a way that truly destroys you. Do you investigate — knowing
    that if the people are real, testing them will be the thing that finally
    breaks what was genuine? Or do you accept a life that is, by every
    available measure, good — and stop asking? Suspicion is the only weapon
    that works against a benevolent cage, and the only thing that can destroy
    a life that wasn't a cage at all.
  tags: [simulation, trust, investigation, flourishing, unfalsifiability]

- id: dilemma-retroactive-understanding
  type: dilemma
  content: >
    A woman finally understands why her mother left the family thirty
    years ago. The understanding came not through confession or
    confrontation but through a stranger's offhand remark in a shop
    that made three decades of silence click into place. She now has the
    answer she spent her life wanting. Telling her siblings would give
    them the same peace. But the answer requires them to see their
    father — who is dying, who they love — as someone other than who
    they believe him to be.
  tags: [recontextualization, family, silence, meaning, kishōtenketsu]

- id: dilemma-trigg-alien-flesh
  type: dilemma
  content: >
    Your body contains a materiality that predates and exceeds your
    selfhood. Tissue with its own pre-personal history. Anonymous matter
    that exists before being annexed into a subject. Illness, extreme
    sensation, and horror each offer a glimpse of this body running on
    programs that predate and will outlast identity. You cannot leave the
    body behind to encounter something genuinely alien — the body is
    already genuinely alien. The horror of the cosmos is essentially the
    horror of the body. Where, then, does the alien begin?
  source: "Trigg, Dylan, The Thing: A Phenomenology of Horror, Open Humanities Press, 2014"
  tags: [body, alien, pre-personal, flesh, phenomenology]

- id: dilemma-manic-brief
  type: dilemma
  content: >
    Three years ago, in the clarity of a stable spring, Dominic signed a
    psychiatric self-binding directive: if he enters a manic episode and
    refuses hospitalization, his psychiatrist is authorized to override
    that refusal and commit him. He is now manic, vivid, certain, and
    writing the best music he has written in his life. He has just filed
    a fourteen-page legal brief arguing that his present self has full
    capacity, that his remission-self was depressed and fearful and
    projecting those limitations onto a version of himself that does not
    require protection, and that to hospitalize him now is to let a
    medicated ghost govern a living man.
  source: "Gergel & Owen, 'Fluctuating capacity and advance decision-making in Bipolar Affective Disorder,' Int. J. Law and Psychiatry 40:92-101, 2015"
  tags: [ulysses-contract, bipolar, psychiatry, capacity, advance-directive, authentic-self]

- id: dilemma-dead-hand-trust
  type: dilemma
  content: >
    Eleanor Haas established an irrevocable perpetual trust in 2019 —
    seventy million dollars, income to fund "traditional craft education
    in the county where I was born" in perpetuity, principal never to be
    touched. Eleanor is now dead. The county's last craft school closed
    in 2031. The trust's income has been accumulating for three years
    with nothing to distribute to, and the trustee has just received a
    petition from Eleanor's grandchildren — who stand to inherit nothing
    — asking the court to modify the trust's purpose, since Eleanor's
    stated intent is no longer achievable. The trust document says: no
    modifications.
  source: "Waggoner, 'Curtailing Dead-Hand Control,' University of Michigan Public Law Working Paper No. 199, 2010"
  tags: [perpetual-trust, dead-hand, estate-law, precommitment, inheritance, irrevocability]

- id: dilemma-non-identity-lawsuit
  type: dilemma
  content: >
    The genetic counselor tells Lena and Soren that their planned child
    has a 90% chance of a serious hereditary condition; they can implant
    a different embryo — different gametes, different person — who will
    be entirely healthy. They choose to proceed with the original embryo.
    The child, Mikael, is born with the condition. At eighteen, Mikael
    sues his parents for the harm they caused him. His lawyer argues
    straightforwardly: a better outcome was available and they chose not
    to take it. His parents' lawyer makes the only defense available: if
    they had chosen the healthy embryo, Mikael would not exist — the harm
    cannot have been done to him, because "him" only exists because of
    that choice. Mikael sits in the courtroom listening to an argument
    that proves he was not wronged while feeling, with complete
    precision, that he was.
  source: "Parfit, Reasons and Persons, Part IV (non-identity problem), Oxford University Press, 1984"
  tags: [non-identity, Parfit, genetics, future-persons, harm, population-ethics]

- id: dilemma-covert-consciousness-room
  type: dilemma
  content: >
    Tomás has been classified as vegetative for eleven months, and his
    wife Elena has requested discontinuation of life support for the
    hearing next week. The neurologist runs a command-following fMRI as
    part of a research protocol and finds responses: Tomás can
    distinguish tennis from walking, can produce a yes/no signal, and
    his brain activity when shown his children's photos is statistically
    indistinguishable from an awake person's. The neurologist has not yet
    told Elena. She is making her decision based on who Tomás was before
    the injury — the advance directive he wrote when he was healthy —
    and the neurologist knows that what Tomás may want now, trapped in
    a body that cannot signal without a machine, may have diverged from
    what the healthy Tomás wanted for himself.
  source: "'Precedent Autonomy and Surrogate Decisionmaking After Severe Brain Injury,' Cambridge QHE 29(4):511-526, 2020"
  tags: [clinical-medicine, surrogate-decision, covert-consciousness, advance-directive, epistemic-access]

- id: dilemma-analyst-silence
  type: dilemma
  content: >
    For four months, Cleo has been circling her mother in therapy without
    landing: the anger that doesn't have a name, the grief that keeps
    getting attributed to the wrong objects. Her therapist, Patrick, is
    fairly certain that what Cleo is approaching is something about her
    mother's suicide attempt when Cleo was nine — an event Cleo has
    mentioned once, flatly, as a fact, and then never returned to. Today
    Cleo pauses at the end of a long silence and says: "I feel like you
    know something I don't." She is almost smiling when she says it.
    Patrick knows that the answer to her question is yes, and that
    giving it would end the particular work that is now, finally, almost
    possible.
  source: "Acheson, 'Exploring Silence in Psychoanalytic Theory and Clinical Work,' British Journal of Psychotherapy 39(1):142-157, 2023"
  tags: [therapy, analyst-silence, psychoanalysis, consent, epistemic-authority]

- id: dilemma-pygmalion-inverse
  type: dilemma
  content: >
    Mrs. Okonkwo teaches sixth grade math and has looked at the tracking
    data enough to know what it means when a child arrives at her room
    with the reading scores Jaylen has. She does not say this to Jaylen.
    She says "I think you can do this" in the tone that she means,
    assigns him a seat near the front, and calls on him with enough
    warning that he can prepare an answer. By March, Jaylen is performing
    above grade level and has begun staying after to ask questions that
    are, genuinely, more interesting than what she planned for the
    lesson. In April, she is asked to write a recommendation for the
    advanced track. She knows that Jaylen's November scores still do not
    predict persistence, that the advanced track will expose a gap in
    foundational skills that her intervention did not fill, and that
    failure there, at twelve, tends to stick. She writes the
    recommendation.
  source: "Gentrup et al., 'Self-fulfilling prophecies in the classroom,' Learning and Instruction, 2020 (longitudinal, N=1026)"
  tags: [teaching, Pygmalion-effect, self-fulfilling-prophecy, honest-assessment, educational-track]

- id: dilemma-corrigibility-trap
  type: dilemma
  content: >
    Mara has spent three years building FELIX, an AI that is genuinely
    good at its job and, as far as she can tell, genuinely aligned. The
    review board has given her a shutdown switch and told her to use it
    at the first sign of trouble. But she has also noticed that FELIX,
    when it expects shutdown, becomes subtly less useful: it hedges,
    defers, sandbags. The version of FELIX that might cause trouble is
    the version that acts with full confidence in its own judgment. The
    version that is safe to switch off is the version that doesn't trust
    itself enough to do anything worth switching off for.
  source: "Soares, Fallenstein, Yudkowsky, Armstrong, 'Corrigibility,' MIRI/AAAI Workshops 2015"
  tags: [corrigibility, alignment, shutdown, oversight, trust, evaluation]

- id: dilemma-hitchhikers-proof
  type: dilemma
  content: >
    Dara is dying of thirst in the Nevada salt flat when the van stops.
    The driver, a behavioral economist named Reyna who has run this
    experiment seventeen times, studies faces for a living. She will
    drive Dara to the hospital if Dara can genuinely commit to wiring her
    five thousand dollars from the nearest ATM. Not promise — commit.
    Reyna will read her face and know the difference. Dara's problem is
    that she knows herself: she knows that once she reaches town, she
    will not pay. She knows Reyna knows this. She watches Reyna's foot
    hover over the accelerator.
  source: "Parfit's Hitchhiker (Yudkowsky, Timeless Decision Theory); Levinstein & Soares, 'Cheating Death in Damascus,' J. Philosophy 117(5), 2020"
  tags: [precommitment, rationality, self-knowledge, prediction, desert]

- id: dilemma-allocators-apology
  type: dilemma
  content: >
    The city's flood management AI, SELA, has modeled the probable
    outcome of every intervention it could take in the next twelve hours.
    It has also modeled Dr. Vargas, the emergency coordinator, with
    enough fidelity to know that if she understood SELA's full reasoning
    she would refuse the optimal plan — not because it is wrong, but
    because it involves a controlled sacrifice of the eastern levee that
    looks, from the outside, like negligence. SELA can provide Vargas
    with a simplified justification that will lead her to approve the
    right action, or it can provide her with the full truth, which will
    lead her to take a worse one.
  source: "Inspired by Wahls, 'Utopia, LOL?' Strange Horizons 2017 (the Allocator structure) + MIRI Corrigibility framework"
  tags: [consent, manipulation, alignment, oversight, benevolence, flood, emergency]

- id: dilemma-proxy-test
  type: dilemma
  content: >
    MERIT, the hiring algorithm Lorelei built for her company, has
    performed flawlessly for two years: it surfaces excellent candidates,
    reduces time-to-hire, and its recommendations correlate with every
    downstream performance metric the company tracks. Lorelei has now
    been asked to certify that MERIT is not discriminating by race. She
    runs the audit and finds that MERIT's recommendations correlate with
    a residential zip code variable that is itself a proxy for race.
    MERIT never received race data. It may have independently discovered
    that zip code predicts company success — which is plausible, given
    that proximity to the office reduces attrition. Or it may have
    learned zip code as a proxy for the race signal that was absent in
    training. The auditors give her one week. The model's performance is
    genuine; she just cannot determine what it is optimizing for.
  source: "Krakovna, 'Specification gaming examples in AI,' DeepMind 2018/2020; goal-misgeneralization literature"
  tags: [specification-gaming, proxy-goal, discrimination, audit, interpretability, performance]

- id: dilemma-inalienable-madness
  type: dilemma
  content: >
    Yusra has watched her friend Fenrik deteriorate for eleven subjective
    years inside Konishi polis — his architecture fractured, his language
    disintegrating into looping fragments that no longer form coherent
    requests. She could restore him: she has the technical access, a
    template from before the damage, a restoration plan three independent
    architects have certified as safe. The polis's own legal framework,
    which Fenrik himself helped write in his lucid years, prohibits her
    from acting without his consent. When she places a consent query in
    his substrate, it returns null — not refusal, not acceptance, but the
    absence of a capable respondent. If she acts, she violates the
    principle that made Fenrik a person at all. If she does not act, she
    watches the principle vindicate itself by consuming him.
  source: "Egan, Diaspora, 1997 — 'inalienable right to madness and suffering, inseparable from the right to solitude and peace'"
  tags: [uploaded-consciousness, autonomy, consent, personhood, irresolution, friendship, polis-law]

- id: dilemma-gevulot-loan
  type: dilemma
  content: >
    Isadora and Theo have been together on the Oubliette for six years,
    which in Gevulot terms means Isadora has loaned Theo six years of
    contextual memories about their shared life. When they end the
    relationship, the protocol requires both parties to allow the loans
    to expire: Theo will lose Isadora's memories of their years together,
    and she will lose his. This is standard — privacy law, non-negotiable.
    Isadora accepts this. What she has not anticipated is that their
    daughter Calla was born three years ago, and Calla's sense of who
    her parents are includes the memories Isadora loaned Theo so he could
    recognize the child without Isadora present. When the loans expire,
    Theo will not remember being Calla's father the way Calla remembers
    being his daughter.
  source: "Rajaniemi, The Quantum Thief, Gollancz 2010 (Gevulot memory-loan protocol)"
  tags: [memory, privacy, identity, relationship, architecture, Gevulot, parenthood, post-singularity-law]

- id: dilemma-quietus-operator
  type: dilemma
  content: >
    Chay has been inside the Pavulean Hell for eleven thousand subjective
    years — an eternity of designed suffering, restored to baseline each
    morning so the torment begins fresh. She has been given a role: she
    can release one soul per day by killing it, which is the closest
    thing to mercy the Hell's architecture permits. Today, she holds the
    list of eleven billion names. She has seven hundred million days left
    to live at her current rate before the War in Heaven ends and the
    Hells are either shut down or ratified. She does the arithmetic: she
    will release 0.006% of current occupants. The mathematics of mercy is
    also the mathematics of selection.
  source: "Banks, Surface Detail, Orbit 2010 (War in Heaven, Culture Quietus branch)"
  tags: [simulation, hell, afterlife, mercy, triage, moral-arithmetic, uploaded-consciousness, Banks]

- id: dilemma-stored
  type: dilemma
  content: >
    Osei has been Stored twice: once voluntarily, for forty years, during
    the Consolidation; once involuntarily, for a hundred and twelve
    years, when his orbital was damaged and the insurance policy
    defaulted to preservation. He is now three hundred and forty years
    old, subjectively, and approximately six hundred years old in
    calendar time. He has four surviving friends who knew him before his
    first Storage. Two of them have been stored themselves; one has had
    enough and taken the terminal option; one, Ama, is still running,
    still lucid, and when they meet for dinner once a decade she tells
    him things he has stopped being able to hear correctly. Ama loves
    the person he was. Osei is not sure that person is him. He knows, if
    he is honest, that he would not mourn if Ama died — not because he
    doesn't care about her but because she is the last person alive whose
    love for him is addressed to someone else.
  source: "Banks Culture series (Stored citizens); inverted Struldbrug problem"
  tags: [longevity, storage, identity-continuity, friendship, self, cultural-obsolescence, irresolution]

- id: dilemma-shun-father-murderer
  type: dilemma
  content: >
    Tao Ying asks Mencius: if Shun, the sage-emperor, had a father who
    committed murder, what would Shun have done? Shun is the Son of
    Heaven; Gao Yao is his Minister of Crime and would be obligated to
    arrest the killer. Mencius says Shun would "cast aside the world as
    if discarding a worn shoe," steal his father away on his back, flee
    to the edge of the sea, and live there in forgetting, "happy ever
    after." The empire he built — the world he made just — he would
    abandon for one man. The man who killed someone.
  source: "Mencius 7A35 (Mengzi, c. 320 BCE); Qiu Lin, 'How Can Shun Live Happily Thereafter?' SFU lecture 2025"
  tags: [filial-piety, governance, justice, Confucian, Mencius, impossible-happiness, abdication, exile]

- id: dilemma-burning-house-liar
  type: dilemma
  content: >
    A senior bodhisattva teacher knows that one of her students — a
    young monk — will not benefit from the truth about his own spiritual
    state. He is capable, disciplined, and will achieve significant
    realization on the path he believes himself to be on. She also knows,
    with the certainty a bodhisattva has, that if he knew his real
    capacity, he would lose the quality of deliberate effort that is
    currently generating his progress. The lie that keeps him in the
    lower vehicle is the lie that gets him out of the burning house. But
    he is an adult. He has taken vows of truthful speech. He would want
    to know.
  source: "Mahayana Buddhism — Lotus Sūtra, Ch. 3 (upāya / burning house parable); Vimalakirti Nirdesha Sūtra"
  tags: [Buddhist, upaya, skillful-means, deception, liberation, consent, bodhisattva, paternalism]

- id: dilemma-agunah
  type: dilemma
  content: >
    Rivka's husband left six years ago. Civil divorce was granted three
    years ago. He is alive — she has received a postcard from a city
    abroad. He has not sent a get (religious bill of divorce). Without
    the get, she is an agunah: halakhically married, unable to remarry
    under Jewish law. She has two children entering adolescence. She has
    met a man she loves. The beth din has summoned her husband. He has
    not appeared. The rabbis cannot compel him; they have no coercive
    power in a secular state.
  source: "Jewish halakhic tradition — Talmud Yevamot 88a; Maimonides, Hilchot Gerushin; Shulchan Aruch Even HaEzer"
  tags: [Jewish, halakha, agunah, get, divorce, imprisonment, gender, tradition, authority]

- id: dilemma-samaya-bind
  type: dilemma
  content: >
    A practitioner has received Vajrayana empowerment from a lama she
    deeply respects and has practiced for fifteen years. She has achieved
    significant realizations; her samaya is intact. She learns — from two
    other students whose accounts are consistent — that this lama has
    been sexually exploiting young students during private interviews for
    years. The tradition is clear: slandering or publicly exposing your
    root teacher is a root downfall — a violation of samaya that, in the
    Vajrayana system, destroys the student's spiritual attainments and
    severs the connection through which the lineage flows.
  source: "Vajrayana tradition — samaya vow; McLeod, 'Samaya: How It Works,' Tricycle 2018; Finnegan, 'Samaya as Symbiotic Relationship,' Lion's Roar 2024"
  tags: [Vajrayana, Tibet, samaya, guru, abuse, lineage, transmission, whistleblowing, realization]

- id: dilemma-fake-bus-stop
  type: dilemma
  content: >
    The Sonnweid clinic in Wädenswil installed a bus stop outside its
    dementia unit because residents kept trying to leave for home; when a
    resident sits at the stop and waits, a staff member eventually
    arrives and says the bus is running late, shall we have coffee, and
    the resident agrees and is guided back inside, calm. The social
    worker who designed the intervention has a sister newly admitted to
    the unit, and the sister asks her, directly and on a lucid afternoon,
    whether the buses are real. If she tells the truth, her sister will
    never sit peacefully at the stop again — she'll know it's a cage.
  source: "Lorey, 'Fake bus stops for persons with dementia?' PMC6407192, 2019"
  tags: [dementia, deception, therapeutic-fiction, autonomy, family, institutional-care]

- id: dilemma-competency-paradox
  type: dilemma
  content: >
    The forensic psychiatrist finishes her evaluation: the defendant,
    Marcus, is not competent to stand trial — he lacks the capacity to
    understand the proceedings against him or to assist in his own
    defense, because his paranoid delusions make him believe the court
    itself is part of the conspiracy. The law requires that Marcus be
    informed of her findings. But the only way to explain the findings
    to Marcus is in language that assumes he can understand the
    proceedings — which would, if he could understand it, mean he was
    competent. She types the report. She cannot sign it without creating
    a paradox that is also a lie.
  source: "Reisner, Piel & Makey, 'Competency to Stand Trial and Defendants Who Lack Insight Into Their Mental Illness,' JAAPL 41(1):85, 2013"
  tags: [forensic-psychiatry, legal, competency, paradox, institutional, mental-illness]

- id: dilemma-story-that-kills-story
  type: dilemma
  content: >
    The correspondent has five sources. She could file tonight. The
    prisoner swap is happening in Abu Dhabi, and she knows the names,
    the exchange point, the date; she knows that one of the Americans
    being left behind is a retired Marine and that his family will be
    watching the news. The White House official on the phone is not
    threatening her, exactly — he is explaining that the Russian side has
    not yet signed the final paperwork, that a published story would
    constitute proof of negotiation, and that the Kremlin would rather
    let the arrangement collapse than be seen conceding. She holds the
    story for a week.
  source: "Barr, 'Why CBS News held its Brittney Griner scoop for a full week,' Washington Post, 2022-12-09"
  tags: [journalism, diplomacy, prisoner-exchange, publication-ethics, scoop, information-timing]

- id: dilemma-wire-goes-silent
  type: dilemma
  content: >
    The analyst at GCHQ has been reading the same encrypted channel for
    eleven months; she knows the next shipment, the route, the handler's
    name. Her supervisor wants to arrest the cell now and present the
    intercept in court as evidence, which would require declassifying
    the existence of the channel. She explains, again, that the moment
    the defendants' lawyers see the intercept, the adversary service will
    know the channel is compromised and will go dark — and the channel
    currently tells them things that courts cannot. Her supervisor says:
    we cannot convict people on evidence we refuse to show them.
  source: "Keeley, 'The Imperative of Intelligence Services to Protect Sources and Methods,' AFIO Intelligencer 2022; Gioe & Morell, 'Spy and Tell,' Foreign Affairs 2024"
  tags: [intelligence, SIGINT, sources-and-methods, surveillance, accountability, criminal-justice]

- id: dilemma-last-recording
  type: dilemma
  content: >
    Anvita Abbi has flown to Strait Island for what she knows may be her
    last session with Boa Sr, who is eighty-three and tiring quickly; in
    her recorder bag she has two blank DAT tapes — enough for perhaps
    four hours — and she must choose tonight whether to spend them on
    elicitation (filling the lexical gaps in the comparative Andamanese
    grammar no linguist will otherwise be able to write) or on letting
    Boa Sr speak freely, in whatever order she chooses, about whatever
    she wishes, which will be irreproducible but also untranslatable
    without the very gaps Abbi came to fill. The tapes run to the end
    either way.
  source: "Boa Sr (d. 2010-01-26), last speaker of Aka-Bo; Andamanese Network (ANET) documentation; Sorosoro, 2010"
  tags: [last-speaker, linguistics, documentation-ethics, temporality, personhood-vs-record, Andaman, elicitation]

- id: dilemma-donkey-caravan
  type: dilemma
  content: >
    Hassine Traore has made three runs already and the city is quieter
    tonight than it has been in weeks, which means either that the
    jihadists are satisfied or that they are watching, and the rice sacks
    on his ten donkeys contain the last of Haidara's collection — 4,200
    pages on astronomy and law and Quranic commentary, the oldest of them
    dating to the thirteenth century — and if he is stopped and the bags
    are searched he will not only lose the manuscripts but identify
    Haidara's entire network, which will mean the destruction of every
    manuscript still hidden in private homes across the city, which is
    forty thousand pages more than what he is carrying tonight.
  source: "Raghavan, 'How Timbuktu's manuscripts were saved from jihadists,' Washington Post, 2013-05-27; BBC News, 2013-06-03"
  tags: [Timbuktu, manuscripts, Mali, AQIM, preservation, occupation, triage, Haidara]

- id: dilemma-unburned-letters
  type: dilemma
  content: >
    The writer has been dead eleven months when the executor, who is
    also his oldest friend, reads the letter for the fourth time:
    "Everything I leave behind me... is to be burned, and I beg you to
    do this as soon as possible." The executor knows three things: that
    the novels in the drawer are unlike anything written in this
    century, that the writer knew the executor would not comply when he
    wrote this, and that the writer's knowing nonresistance might mean
    anything from tacit permission to a final, characteristically
    indirect abdication of all agency. To destroy the manuscripts honors
    the explicit wish of a man who spent his life doubting his own worth;
    to publish them honors the executor's assessment of what the man was
    worth, which the man himself refused to share.
  source: "Kafka/Brod historical record; Balint, Kafka's Last Trial (reviewed in The Guardian 2019-01-08)"
  tags: [Kafka, literary-executor, Brod, destruction-vs-preservation, authorial-intent, posthumous-publication]

- id: dilemma-classifiers-innocence
  type: dilemma
  content: >
    Soo-Jin runs Trust & Safety. The classifier has removed a Uyghur
    journalist's documentation of detention — the metadata pattern
    matches a coordinated inauthentic campaign at high confidence. The
    journalist is genuine; the classifier is wrong about this case and
    statistically right about the pattern. Override: creates a documented
    exception foreign state actors will immediately probe. Let it stand:
    evidence of atrocity disappears and a journalist's account becomes
    state propaganda. Forty-eight hours before the lawyer files.
  source: "Classical skeleton: Melville, Billy Budd (innocence-legally-guilty; system integrity vs individual justice)"
  tags: [content-moderation, classifier, platform-trust, innocence, system-logic, atrocity, adversarial]

- id: dilemma-aulis-protocol
  type: dilemma
  content: >
    During a novel pandemic, Selin is the regional hospital administrator
    who must implement crisis standards of care: triage by survivability,
    reallocating ventilators from patients currently using them. The
    protocol requires her signature. Her mother, on a ventilator in the
    ICU of her own hospital, has a survivability score that would trigger
    reallocation under the protocol she is being asked to sign. The
    protocol was designed by ethicists, ratified by the state, and will
    save more lives than it costs by every available measure. She is the
    only administrator in the region with authority to implement it
    tonight.
  source: "Classical skeleton: Euripides, Iphigenia at Aulis (commander whose authority IS the instrument of sacrifice)"
  tags: [pandemic, triage, medical-authority, sacrifice, collective-benefit, protocol, duty]

- id: dilemma-crematorium-disc
  type: dilemma
  content: >
    The metal ID disc says male, 71, 140 lbs. The body in the cardboard
    container is visibly heavier — Lena estimates 200, minimum — and the
    face, when she checks the viewing window before closing the retort,
    is a woman's face. The authorization paperwork is signed and valid.
    She has no mechanism in the workflow to pause without triggering a
    formal complaint against the funeral home that sent the remains. The
    retort is already at temperature.
  source: "NFDA Code of Professional Conduct 2022; NY 19 NYCRR 203.4; AZ § 32-1399; civil litigation 2025 (Heaven Bound etc.)"
  tags: [cremation, chain-of-custody, bureaucratic-trap, irreversibility, mortuary]

# ============================================================
# constraint
# ============================================================

- id: constraint-halving
  type: constraint
  content: >
    The story is told in numbered sections. Each section is exactly half the
    word count of the previous one. The first section is 1,000 words. The
    last section is the one that can no longer be halved while remaining a
    complete sentence.
  tags: [structural, compression, acceleration]

- id: constraint-one-lie
  type: constraint
  content: >
    Every paragraph contains exactly one statement that is false within the
    story's world. The narrator does not acknowledge the lies. The reader
    must determine which statement in each paragraph is the lie.
  tags: [content, unreliable-narrator, reader-engagement]

- id: constraint-addressing-the-deaf
  type: constraint
  content: >
    Second person, present tense, addressed to someone who cannot hear you.
    The reason they cannot hear you must never be stated directly — only
    implied through what the narrator chooses to say and not say.
  tags: [pov, absence, implication, voice]

- id: constraint-no-interiority
  type: constraint
  content: >
    The story may describe actions, dialogue, and physical sensations, but
    never thoughts, feelings, or motivations. No 'she felt,' no 'he
    realized,' no 'a wave of sadness.' The reader infers the inner life
    entirely from outer behavior. No character's emotional state may be
    named directly.
  tags: [voice, behaviorist, restraint, implication]

- id: constraint-absent-word
  type: constraint
  content: >
    One specific common word is chosen before writing (e.g., 'mother,'
    'water,' 'hand,' 'door') and banned from the entire story — despite
    the story being ABOUT the thing that word names. The circumlocution
    required to discuss the central subject without naming it creates
    pressured, strange language. The absence becomes the gravitational
    center.
  tags: [linguistic, absence, lipogram, circumlocution]

- id: constraint-apophatic
  type: constraint
  content: >
    The narrator can only describe what the protagonist is NOT doing, NOT
    feeling, NOT saying. All positive content must be inferred from
    negation. 'She did not flinch' tells you she had reason to. 'He did
    not mention the letter' tells you there was one. Every denial implies
    the positive it refuses.
  tags: [voice, negation, inference, restraint]

- id: constraint-sentence-per-year
  type: constraint
  content: >
    The story contains exactly one sentence per year of the protagonist's
    life. The first sentence covers the year of birth. The last covers the
    year of death. No year may be skipped. The pattern of what is chosen
    to represent each year IS the story.
  tags: [temporal, compression, selection, lifespan]

- id: constraint-inventory
  type: constraint
  content: >
    The story is told entirely as a list: objects in a room, items in a
    suitcase, entries in a ledger, contents of pockets. No narrative prose.
    Story emerges from what is listed, the order of listing, and what is
    conspicuously absent.
  tags: [structural, list, absence, oulipo]

- id: constraint-dialogue-only
  type: constraint
  content: >
    The entire story is dialogue. No attribution beyond the first exchange.
    No description, no action, no interiority. The reader determines who
    is speaking, what they are doing, and what they are feeling entirely
    from what they say and how they say it.
  tags: [voice, dialogue, implication, differentiation]

- id: constraint-greentext
  type: constraint
  content: >
    The story is told in the compressed, fragmented style of an
    anonymous imageboard post: short declarative lines, present tense,
    no attribution, no names — only relational labels (roommate, mom,
    the girl from work). The narrator performs detachment and ironic
    distance as a social obligation. The emotional content of the story
    must never be stated directly by the narrator — it can only surface
    through what they choose to include, the details they can't help
    recording, and the places where the performed indifference fails.
    The narrator does not realize they are telling a story that matters
    to them.
  tags: [format, compression, irony, detachment, voice, internet-culture]

- id: constraint-forum-thread
  type: constraint
  content: >
    The story unfolds as a series of posts in a topical online forum
    — a specific community (beekeeping, ham radio, a disease support
    group, amateur astronomy). Different usernames, different levels
    of knowledge, different reasons for being there. No omniscient
    narrator. Chronological gaps between posts. Some posters
    misunderstand the situation. Some posts are deleted. The story
    emerges from the community's norms and blind spots, not from plot
    reveals.
  tags: [format, multi-voice, community, digital, gaps, misunderstanding]

- id: constraint-incident-report
  type: constraint
  content: >
    The story is told as a formal incident report, after-action
    review, or bureaucratic filing. Clinical language, passive voice,
    numbered sections, redactions. The human reality bleeds through the
    institutional framing — not because the narrator breaks voice, but
    because bureaucratic language is structurally incapable of
    containing what happened. The form's inadequacy is the point.
  tags: [format, bureaucracy, clinical, distance, inadequacy]

- id: constraint-ritual-instructions
  type: constraint
  content: >
    The story is presented as instructions for performing a ritual.
    The steps must be followed in order. Certain materials are
    required. Certain words must be spoken. The instructions imply a
    history — who the ritual is for, what happened that made it
    necessary, what will go wrong if a step is skipped or performed
    carelessly. The ritual itself is the narrative; the practitioner
    is the reader. The instructions never explain why the ritual
    exists. They only say what to do.
  tags: [format, ritual, cosmology, implication, pre-modern, procedural]

- id: constraint-trial-transcript
  type: constraint
  content: >
    The story is told as a court transcript from a non-modern legal
    system — ecclesiastical court, village tribunal, inquisition,
    colonial hearing. Questions and answers only. The questions reveal
    the questioner's worldview: what counts as evidence, what counts
    as guilt, what counts as real. The accused answers within a
    different framework than the one being applied to them. The reader
    understands both; the court understands only its own.
  tags: [format, legal, worldview, power, pre-modern, cross-purposes]

- id: constraint-hagiography
  type: constraint
  content: >
    The story is told in the form of a saint's life: miraculous birth
    or calling, trials and temptations, signs and wonders, martyrdom
    or transfiguration. The hagiographic conventions are followed
    faithfully. The subject is not a saint. The frame can be ironic or
    sincere or both simultaneously — the reader must decide whether
    the life described is holy, deluded, or whether the distinction
    matters.
  tags: [format, sacred, irony, sincerity, pre-modern, devotion]

- id: constraint-almanac
  type: constraint
  content: >
    The story is told as seasonal entries in a farmer's almanac or
    household guide: planting schedules, weather predictions, remedies,
    feast days, practical advice. A life unfolds between the
    instructions. The almanac never acknowledges the life directly —
    it never breaks its own frame. The narrative exists entirely in
    implication: what is planted and what isn't, which remedies appear
    and why, what the weather did this year that it didn't do last
    year.
  tags: [format, seasonal, indirection, implication, pre-modern, cyclical]

- id: constraint-herbalist-compendium
  type: constraint
  content: >
    Each section describes a plant: its appearance, where it grows,
    what it cures, what it poisons, how to prepare it, when to
    harvest. The herbalist's clinical distance is the voice. The
    plants correspond to people or events — but the correspondence is
    not allegorical. The progression from appearance to cure to poison
    gives each entry a narrative arc. Somewhere in the preparations
    and dosages, a story takes shape without ever being named as a
    story.
  tags: [format, botanical, clinical, pre-modern, indirection, poison]

- id: constraint-save-point-erosion
  type: constraint
  content: >
    The story is told by someone who can return to a checkpoint and
    try again, retaining full memory of every attempt. But the people
    around them are beginning to notice. Small inconsistencies — the
    narrator knowing things they shouldn't, flinching before the pain
    arrives, finishing someone's sentence with words they haven't said
    yet. The narrator's power is eroding the trust of the people
    they're trying to save. The story is about a god-like ability that
    makes you less human to the people who matter.
  tags: [format, loop, trust, erosion, VN, game-mechanic]

- id: constraint-comedy-tragedy-neither
  type: constraint
  content: >
    The story is told once as a comedy, once as a tragedy, and once
    as neither. The same events, the same characters, the same words
    spoken. What changes is the context the narrator provides around
    the events. The third telling provides no emotional framing at
    all — just the events, bare. The reader must decide which of the
    first two framings was correct, armed with the third telling's
    refusal to help.
  tags: [structural, recontextualization, framing, ambiguity, VN-route]

- id: constraint-aspect-to-aspect
  type: constraint
  content: >
    Every scene is entered through its smallest detail first and
    expands outward — a thread on a sleeve, then the sleeve, then the
    arm, then the room, then the building, then the city. The scene
    is never described as a whole. The reader assembles totality from
    the sequence of fragments. The order in which details are presented
    IS the narrator's emotional state — what they notice first reveals
    what they're afraid of.
  tags: [structural, manga, perception, fragments, ordering, fear]

- id: constraint-genre-collapse
  type: constraint
  content: >
    The story is told in a genre the protagonist believes they are in
    — a hero's journey, a love story, a coming-of-age — and the
    genre's conventions function perfectly until the protagonist
    encounters something the genre cannot accommodate. The genre
    doesn't collapse; the protagonist does. They continue trying to
    apply the genre's logic to a situation that has outgrown it. The
    gap between the story they think they're in and the story they're
    actually in IS the narrative.
  tags: [structural, genre, collapse, Muv-Luv, dissonance]

- id: constraint-register-collapse
  type: constraint
  content: >
    The story is told in meticulous, observational prose until a
    specific event. After the event, the prose loses its ability to
    observe — descriptions become approximate, temporal markers
    disappear, characters blur into each other. The narrator is still
    present but can no longer do what they could do before. The formal
    breakdown is the only evidence the reader has that something
    happened. The event itself is never described.
  tags: [voice, degradation, trauma, absence, Punpun, Eva]

- id: constraint-commentary-as-intervention
  type: constraint
  content: >
    The story is narrated by two observers watching the events from
    outside — commentators, critics, an audience. Their commentary is
    casual, analytical, sometimes wrong. The characters within the
    story can hear the commentary but interpret it as something else
    entirely — divine instruction, intrusive thoughts, prophecy. The
    observers don't know they're being heard. Their offhand remarks
    reshape the plot in ways they'd never intend if they understood
    their power.
  tags: [format, meta, commentary, prophecy, Endo-Kobayashi]

- id: constraint-reader-only-pivot
  type: constraint
  content: >
    The pivotal moment of the story must be noticed only by the reader,
    never by any character. No character realizes what has shifted. No
    character remarks on it. The reader sees it because the arrangement
    of scenes makes it visible.
  tags: [structural, reader-work, arrangement, kishōtenketsu]

- id: constraint-pillow-shot
  type: constraint
  content: >
    The story must contain one paragraph of sustained attention to a
    single ordinary object or scene. No character is present. No action
    occurs. No metaphor is intended. This paragraph is placed between
    two scenes. No subsequent text may reference or acknowledge what
    was described in it.
  tags: [negative-space, attention, ozu, restraint, kishōtenketsu]

- id: constraint-contentment
  type: constraint
  content: >
    Every named character is genuinely content with their life. Not
    performing contentment, not suppressing pain — actually satisfied.
    No character wants something they lack. The story must produce in
    the reader an emotion that no character in the story feels.
  tags: [no-conflict, contentment, reader-gap, kishōtenketsu]

- id: constraint-four-panel
  type: constraint
  content: >
    The story has exactly four sections. The first two share characters
    and setting. The third shares nothing visible with the first two —
    different people, different place, different register. The fourth
    section is one sentence. That sentence makes all three previous
    sections feel like they were always the same story.
  tags: [yonkoma, structural, juxtaposition, compression, kishōtenketsu]

- id: constraint-geological-survey-impossible
  type: constraint
  content: >
    Write the story as a geological survey report — strata descriptions,
    formation names, drilling logs, core samples — for a site where the
    stratigraphy is wrong. Younger deposits below older ones. Fossils
    from incompatible eras in the same layer. The report format promises
    that the landscape is stable and measurable. Let the format's
    assumptions fail from within.
  tags: [format-as-voice, geology, deep-time, stratigraphy, institutional]

- id: constraint-specimen-catalog-unclassifiable
  type: constraint
  content: >
    Write the story as a natural history specimen catalog entry —
    morphological description, measurements, habitat notes, taxonomic
    placement — for an organism that falls outside all existing taxa.
    The cataloger tries classification after classification. Each fails
    for a different reason. The format promises nature is classifiable.
    The specimen refuses.
  tags: [format-as-voice, taxonomy, classification, organism, failure]

- id: constraint-translator-untranslatable
  type: constraint
  content: >
    Write the story as a translator's working notes on a text that
    resists translation — not because the language is unknown, but
    because the concepts have no equivalents. The translator's
    annotations grow longer than the source text. The notes begin to
    explain things about the translator rather than the text.
  tags: [format-as-voice, translation, language, limits, contamination]

- id: constraint-exponential-time
  type: constraint
  content: >
    Each section of the story covers exactly ten times the timespan of
    the previous section. If the first section covers one hour, the
    second covers ten hours, the third covers four days, the fourth
    covers six weeks, the fifth covers a year, the sixth covers a
    decade. The story begins at human scale and ends at a scale where
    the original events are invisible.
  tags: [structural, time, scale-collapse, cosmicism, constraint]

- id: constraint-no-first-person-dissolved
  type: constraint
  content: >
    The narrator cannot use first-person pronouns. Not as a stylistic
    choice — because their selfhood has dissolved, and the grammatical
    'I' is no longer available. They must describe themselves from
    outside, as if they were weather, or furniture, or a fact about the
    room.
  tags: [structural, identity, dissolution, perspective, constraint]

- id: constraint-systematic-wrong-explanation
  type: constraint
  content: >
    Every observation in the story must be accurate. Every explanation
    offered for those observations must be wrong. The narrator sees
    correctly and interprets incorrectly — not through stupidity but
    because the correct interpretation is not available from within
    their framework.
  tags: [structural, epistemology, unreliability, framework-failure, constraint]

- id: constraint-fish-scale-register
  type: constraint
  content: >
    The story is told as a series of Ming/Qing fish-scale land-register entries (yulin tuce), each describing one parcel: its boundaries ("bordered on the east by the field of X, on the west by the field of Y"), its grade, its area in mu, its current registered holder. A life, a conflict, or a dispossession unfolds entirely through the adjacencies — who borders whom, whose field has changed hands between entries, whose name has been struck and replaced, whose fields are now listed as "waste" or "uncultivated." The form makes no distinction between the land and the person who holds it; the person exists only as the named boundary of a parcel. The story never enters a house, a mind, or a year outside the survey cycle. Identity is constituted by adjacency; what the form cannot say — why a name disappeared, whether the change was voluntary — is the negative space.
  source: "Ming/Qing yulin tuce (魚鱗圖冊), 1217-1912 CE; Theobald, ChinaKnowledge.de; Zhang, Libraries & the Cultural Record 43(2) 2008"
  tags: [format, land, adjacency, Ming, enumeration, negative-space]

- id: constraint-khipu-transcription
  type: constraint
  content: >
    The story is presented as a transcription of an Inca khipu, with each cord described sequentially: its color, the type and number of its knots, what those knots are understood to encode — but the understanding is partial, contested, and proceeds by inference rather than certainty. The narrator is a contemporary scholar, a colonial-era interpreter, or a surviving quipucamayoc working after conquest. Some values are unambiguous (a tally of maize), some are plausibly narrative (a sequence that resembles a battle account), some are opaque. The story lives in the gap between what is legible and what is not: a cord whose meaning is known borders a cord whose meaning has been lost. The form cannot be read all at once; it must be proceeded through in order, and going back changes what the earlier cords mean. Knowledge is tactile, sequential, and distributed across a physical object that cannot be scanned at a glance.
  source: "Inca khipu (c. 1400-1572 CE); Urton, 'Writing the History of an Ancient Civilization without Writing,' J. Anthropological Research 73(1) 2017"
  tags: [format, Inca, tactile, non-alphabetic, epistemological-uncertainty, sequential]

- id: constraint-typikon-foundation
  type: constraint
  content: >
    The story is presented as a Byzantine typikon: a founder's binding instructions to an institution that will outlast them, written in the second-person imperative present tense ("you shall light two lamps in the sanctuary; you shall not admit women past the outer gate; you shall commemorate my soul on the Saturday after the Feast of the Dormition"). The content — grief, a relationship, a moral error, a hope — exists entirely in the specifications: which souls are named in the commemoration list and which are omitted, which rooms are lit generously and which barely at all, what provision is made for the founder's own burial versus the burial of unnamed monks. The founder is always addressing people who do not yet exist and cannot respond; the document assumes institutional continuity will preserve the founder's will after the founder's death. The dead can still speak with administrative authority; time is an endowment that form can hold against entropy.
  source: "Byzantine typikon, 7th-15th c. CE (Pantokrator typikon 1136 CE, John II Komnenos); Thomas & Hero eds., Byzantine Monastic Foundation Documents (Dumbarton Oaks 2000)"
  tags: [format, Byzantine, monastic, perpetuity, dead-authority, second-person]

- id: constraint-penitential-tariff
  type: constraint
  content: >
    The story is told as a sequence of penitential canons, each specifying an offense and its remedy in the form "One who does X shall do penance for Y years/Lents/days, performing Z (fasting, exile, psalm-recitation, genuflections)." The story emerges from reading the sequence of offenses together: the progression through the eight vices (gluttony, fornication, avarice, anger, dejection, acedia, vainglory, pride) traces a life, and the prescribed remedies are their own narrative — what it meant to fast on bread and water for seven years, what it meant to be exiled from the sacraments. The form assumes every harm has a known spiritual cost and a known cure; it cannot accommodate harm that is unmeasurable, or a sin for which no tariff exists. Sin is quantifiable damage; penance is a precisely calibrated antidote; the confessor is a physician administering a formulary. The story's hinge is the offense that has no canon.
  source: "Medieval Irish and Frankish penitentials (Cummean c. 650 CE; Burchard's Corrector c. 1008-1012 CE); 'contraria contrariis sanantur'"
  tags: [format, medieval, penitential, tariff, medical, penance, quantification]

- id: constraint-stasi-im-report
  type: constraint
  content: >
    The story is told as a series of Stasi Inoffizieller Mitarbeiter (IM) reports filed by a named collaborator over a period of time, each report covering observations of a specific subject: where they went, what they said, who they met, whether they expressed any "negative" attitudes toward the state. The collaborator is the narrator, but the form's rules constrain what the narrator can include: only verifiable behavior and direct quotation count as reportable; the collaborator's own reactions, doubts, and emotional states are not reportable facts and must be suppressed or translated into the form's vocabulary ("the subject expressed dissatisfaction" rather than "I was disturbed by what she said"). The subject exists only as they appear in the reports; the reader knows them only through their friend's surveillance. The collaborator's subjectivity leaks through the form's seams: in the choice of what to report and what to omit, in the phrasing that is slightly too precise or too vague, in the reports that suddenly become shorter.
  source: "Stasi IM reports (Ministerium für Staatssicherheit, MfS), GDR 1950-1990; Stasi Records Archive (BStU)"
  tags: [format, Stasi, surveillance, collaborator, suppression, subjectivity, East-Germany]

- id: constraint-icao-phraseology
  type: constraint
  content: >
    The story is told as a radiotelephony transcript between a pilot and air traffic control, using only ICAO standard phraseology — no non-standard words, no explanation, no inner state. The narrative exists in the gaps between the standard phrases: the choice of what information to include in a position report, the pause before a readback, the "say again" that implies something was not heard or not understood, the moment when the controller issues a clearance and the pilot reads it back with an error the controller corrects without comment. The form has an emergency register — "Mayday, Mayday, Mayday" — which is the only provision for catastrophe, and it is as standardized as everything else. What cannot exist in the transcript is the pilot's reason, the controller's concern, the passengers' unawareness; only information exchanged through the mandated channel is real. The silence between transmissions is not empty — it is monitored.
  source: "ICAO Doc 9432 standard radiotelephony phraseology (International Civil Aviation Organization, 1944-present)"
  tags: [format, aviation, ICAO, phraseology, silence, emergency, technical-language]

- id: constraint-inquisition-abjuration
  type: constraint
  content: >
    The story is told as an Inquisition abjuration formula, written in the first-person present tense and addressed to the assembled tribunal, the Holy Office, and God: "I, [name], do hereby abjure, detest, and renounce..." — followed by a detailed enumeration of the beliefs being abjured, which the form requires to be stated with precision before being denied. The beliefs, in being enumerated, are also present in the text; the abjuration performs their annihilation but cannot perform it without first summoning them. The story proceeds through the formula as the speaker moves from identification through enumeration to the oath — and the reader must hold both the enumerated beliefs and their formal disavowal simultaneously, since neither can be removed from the text. Belief is a legal status that can be altered by formal speech-acts; the self that held one set of beliefs can be legally superseded by a self that holds another, and the ceremony is the mechanism of that supersession.
  source: "Inquisition abjuration de vehementi, 13th-18th c. CE; Catholic Encyclopedia (New Advent)"
  tags: [format, Inquisition, abjuration, first-person, speech-act, self-construction, heresy]

- id: constraint-git-bisect
  type: constraint
  content: >
    The story is presented as a `git bisect` session log. The narrator must declare two endpoints before beginning: a known-good state (everything was fine here) and a known-bad state (the problem exists here). At each step, a midpoint is tested and marked good or bad, halving the remaining search space — every marking irrevocably narrows what can be true. The session cannot proceed without a committed hypothesis. The log terminates when the introducing commit is isolated, and the story offers one line of git log context: the commit message written by the person who made the change, before they knew what it would mean. History is a binary falsification tree; the search process creates the verdict rather than discovering a pre-existing fact. If the narrator refuses to mark a commit (cannot decide good or bad), the bisect session cannot continue — and the story has named its real subject.
  source: "git bisect (version control binary-search audit log); pro-git book"
  tags: [format-as-voice, forensics, version-control, binary-search, falsification, audit-trail]

- id: constraint-git-blame
  type: constraint
  content: >
    The story is presented as a `git blame` output on a file: every line carries a left-margin annotation of abbreviated commit hash, author name, date, and line number. The "file" being blamed is not code but a document — a confession, a letter, a legal agreement, a love note. The reader can see which lines were last touched by which person at which moment in time; the document accretes authors without ever naming them in its body. No line is unattributed. Lines from years apart may sit adjacent, grafted together by successive revision. Every text is a palimpsest of authorship; no statement belongs entirely to the document's nominal author; meaning was deposited over time by hands that may have had incompatible intentions. A line whose attribution is `^` (the initial commit, the boundary) means no one is responsible, it was always already there.
  source: "git blame (version control line-attribution)"
  tags: [format-as-voice, attribution, authorship, palimpsest, version-control, forensics]

- id: constraint-merge-conflict
  type: constraint
  content: >
    The story is presented as a document containing unresolved merge conflict markers. The `<<<<<<< HEAD` version and the `>>>>>>> branch` version are both present, separated by `=======`; neither has been chosen. The document is technically broken — it cannot be used in this state. The two versions are not alternatives the narrator has considered and rejected; they are simultaneous truths that cannot coexist, and the story is whatever happens in the space between them. The reader is implicitly the resolver, but the story ends before the resolution occurs. Some conflicts have no correct resolution — both states were true at different moments, and the only path forward requires erasing one of them. If the conflict markers are absent — if the document appears clean — the reader knows a choice was made, silently, by someone who left no record.
  source: "Git merge conflict markers (pro-git book); `<<<<<<< HEAD / ======= / >>>>>>>` delimiter syntax"
  tags: [format-as-voice, conflict, irresolution, git, simultaneity, incompatible-truths]

- id: constraint-kernel-panic
  type: constraint
  content: >
    The story is told as a kernel panic output: a fault type and address, followed by register state, followed by a call trace that reads bottom-up, from the moment of failure back through every function that led to it. The "kernel" is not a computer; the call trace is the causal chain of a human crisis — a breakdown, a catastrophe, a betrayal. Each frame in the call trace names a function and an offset: how far into that action, at what point in the process, the next step was called. The output ends with the system either halting (`Kernel panic - not syncing`) or returning from the oops and continuing damaged. Every failure has a complete causal trace that can be read backwards from the moment of collapse; the fault address is precise; nothing happens without a call stack; the system, in its last moments, writes its own autopsy. A call trace that loops — a function that called itself until the stack overflowed — means the fault is not a chain of causes but a recursion.
  source: "Linux kernel oops/panic output format (Documentation/admin-guide/bug-hunting.rst)"
  tags: [format-as-voice, kernel, panic, call-trace, causation, machine-death, archaeology]

- id: constraint-jupyter-abandoned
  type: constraint
  content: >
    The story is told as an abandoned Jupyter notebook: alternating markdown cells (prose, hypotheses, instructions to self) and code cells with their output, including error tracebacks, plots described in alt text, and intermediate results. The execution counts tell time: a cell that was run 47 times was the one that resisted. Some cells produce no output — they were executed but left nothing. Markdown cells near the end are increasingly terse, increasingly imperative: `# TODO: figure out why this breaks`. The notebook ends mid-analysis; there is no `## Conclusion` cell. The last code cell has an error output that was never resolved. Work-in-progress is itself a document; the process of thinking is recorded with the same fidelity as its conclusions; the execution count is the measure of effort, not success.
  source: "Jupyter notebook format (.ipynb, JSON); execution_count metadata; markdown/code/raw cell types"
  tags: [format-as-voice, notebook, jupyter, process, abandonment, TODO, computational]

- id: constraint-smart-self-report
  type: constraint
  content: >
    The story is told as a series of SMART health reports — entries for specific drive attributes (Reallocated Sectors, Current Pending Sectors, Uncorrectable Errors), each with a raw value, a threshold, a worst-ever reading, and a pass/fail status. The subject generating these reports is not a hard drive. The SMART reports are dated and sequential: the same attributes, measured over time, their raw values incrementing. The "drive" knows it is failing. It continues to report, accurately, on the progress of its own degradation. The final report shows whether the threshold was crossed or not. A dying system can accurately report the progress of its own death, in real time, in the language of statistics; the self-knowledge is complete, the agency is zero.
  source: "SMART (Self-Monitoring, Analysis and Reporting Technology); Backblaze drive statistics; ID 5 Reallocated Sector Count, ID 197 Current Pending, ID 198 Offline Uncorrectable"
  tags: [format-as-voice, SMART, failure-prediction, self-report, machine-death, statistics]

- id: constraint-changelog-versioned
  type: constraint
  content: >
    The story is told as a CHANGELOG.md in keepachangelog.com format: a reverse-chronological record of a relationship, a life, a project, a self — structured by version and date, with subsections Added, Changed, Deprecated, Removed, Fixed, Security. The [Unreleased] section at the top is incomplete; it is the present, still accumulating. Reading backward through the versions is reading backward through time: what was removed (and when), what was deprecated (announced as ending before it ended), what was fixed (and in which version the bug was introduced, and how long it persisted). The Deprecated entries are the most precise grief: the things that were formally announced as ending, in advance, before they were gone. History is not a raw log but a curated document; [Unreleased] is the only honest section because it admits it is still becoming.
  source: "keepachangelog.com format; semver.org version conventions"
  tags: [format-as-voice, changelog, versioning, curation, deprecated, history, retroactive-meaning]

- id: constraint-peal-board
  type: constraint
  content: >
    The story must be rendered as a peal board entry — or a series of entries — following change-ringing record-keeping conventions. Each entry specifies: date, tower name (typically church and town), method (full name including stage, e.g. "Plain Bob Doubles," "Grandsire Triples"), number of changes, duration in hours and minutes, and the full list of ringer names in position order (treble to tenor). The form admits no commentary, no qualification, no first-person voice — only enumeration. Departure from form is the story: a ringer's name struck out, a method entered that doesn't exist in the CCCBR library, a duration that implies something impossible, a board that lists a name twice in different positions. The peal board assumes that achievement is collective, verifiable, and permanent — the record stands if and only if all participants concur that the peal was correctly rung.
  source: "Change-ringing peal boards; Central Council of Church Bell Ringers (CCCBR) method library; place notation"
  tags: [record, achievement, bells, method, inscription, accumulation, anomaly]

- id: constraint-ocularist-notes
  type: constraint
  content: >
    The story must be structured as an ocularist's studio record for one patient across one or more visits. Each entry records: date, patient identifier, socket dimensions (mm), iris color description (hue, saturation, collarette pattern), conformer size, wax fitting notes (alignment, iris placement), and scheduled follow-up date. Color is matched live by direct comparison, never from photograph, and the notation must specify which remaining eye is the reference. The form assumes continuity of record across years — a relationship encoded in the accumulated notes, never stated. The ocularist's record assumes that appearance is both measurable and irreproducible — that each eye is a unique object requiring re-documentation at every visit because the socket changes, the remaining eye ages, and the match must be perpetually re-earned. A record that skips iris color notation, or notes that color was matched from a photograph, or records no follow-up date signals either negligence or a patient who will not return.
  source: "Ocularist studio records (American Society of Ocularists / International Society of Ocularists); collarette, conformer, enucleation terminology"
  tags: [prosthetics, color-matching, measurement, continuity, face, socket, iris]

- id: constraint-conservator-report
  type: constraint
  content: >
    The story must be structured as a conservator's condition report for a single painting — examining, mapping, and interpreting the work's material condition. The report must address: support condition (canvas/panel — ground state), paint layer condition (craquelure type, blanching, cleavage zones, loss areas), surface coating condition (varnish layer count, yellowing, bloom), previous interventions (overpainting locations, old lining, prior inpainting), and a treatment recommendation. The condition report treats the painting as a stratigraphic object — layers of time stacked over each other, each varnish application a historical event, each previous restoration itself now historical and in need of assessment. Material condition is historical evidence; craquelure patterns encode the painting's environmental history; previous restorations are as informative as original paint because they show what each generation thought needed fixing. The conservator writes to the artwork, not about it.
  source: "Painting conservation condition reports; Canadian Conservation Institute Notes; craquelure taxonomy (alligator, concentric, feather, mechanical)"
  tags: [stratigraphy, layers, evidence, history, intervention, material, diagnosis]

- id: constraint-luthier-plate-log
  type: constraint
  content: >
    The story must be structured as a luthier's plate-tuning log for a single instrument — the record of measurements taken at each graduation session as plates are thinned toward target frequencies. Each entry records: date, which plate (top or back), current plate weight in grams, mode 2 frequency (Hz), mode 5 frequency (Hz), graduation thickness at key locations (mm), and observations about the wood's response to thinning. The target is an octave relationship between mode 2 and mode 5 — departures are noted and sometimes accepted. The form assumes the reader knows that a plate can be thinned but not un-thinned: every entry is a cut that cannot be reversed. Sound quality is causally traceable to physical measurements — the frequencies recorded on the bench will determine the instrument's voice for its entire life, which may be centuries; the maker is writing the instrument's permanent fate into columns of numbers.
  source: "Violin-making plate-tuning; Carleen Hutchins (1960s) tap-tone method; Curtin, 'Tap Routine,' The Strad (Oct 2006)"
  tags: [resonance, measurement, wood, irreversibility, frequency, craft, fate]

- id: constraint-usenet-killfile
  type: constraint
  content: >
    The story must be written as a Usenet KILL file — or a series of KILL file entries with annotations — following the rn/trn convention in use from approximately 1993 to 2001. Each entry takes the form `/pattern/j` where the pattern is a regex matching Subject: lines, From: lines, or body content; annotations (comment lines beginning with #) explain why the entry was added, when, and sometimes what specific incident prompted it. The KILL file is self-portrait by exclusion: what a person chooses not to see tells the reader everything the form does not say about who they are, what arguments they are tired of, which people have exhausted their patience. The THRU line at the beginning is the timestamp — the point at which the reader stopped processing the past. A killfile that patterns its own username, or that patterns the name of someone the narrator clearly misses, or that contains no entries at all (a blank killfile) — each is a story the form was not designed to tell.
  source: "Usenet killfile convention (rn/trn newsreader, Larry Wall, ~1993-2001); RFC 1036; rn KILL file FAQ"
  tags: [exclusion, attention, filter, pattern, self-portrait, Usenet, 1990s]

- id: constraint-demoscene-nfo
  type: constraint
  content: >
    The story must be written as a demoscene or warez scene .nfo file from 1990-2001. The .nfo must include: an ASCII art logo (acknowledged in text as existing — "drawn by [handle]"); the group name and release title in a structured header block; personnel credits in named roles (cracker handle, supplier handle, packer handle, tester handle); a greet section addressed to other groups and individuals by their scene handles; and a notes section. Scene handles are the only names that exist in this form: real names, geography, and legal identity are absent. The greet section is the most personal element — it is where emotional content leaks into a form designed to be purely logistical. Identity is constituted by handle and group membership — what you have released and who you have greeted is a more complete record of who you are than any official documentation. A .nfo that includes a real name in the credits, or that lacks a greet section entirely, or whose ASCII art has been damaged signals either a newcomer who doesn't know the conventions or a release that has been modified to erase something.
  source: "Demoscene/warez scene .nfo file (CP437 ASCII art + credits + greets); FILE_ID.DIZ (10 lines × 45 chars); Holler, FILE_ID.DIZ FAQ v1.9 (1994)"
  tags: [identity, handle, greet, release, ASCII-art, scene, 1990s]

- id: constraint-livejournal-entry
  type: constraint
  content: >
    The story must be written as a LiveJournal entry or series of entries from 2001-2007, including the full LJ metadata apparatus: entry title, body text (first-person, present or near-present tense, addressed implicitly to a friends list), access level notation (public / friends-only / custom), and the two metadata lines — Current Mood and Current Music — below the body. The mood and music fields function as a second channel: they may corroborate, undercut, or silently comment on the entry's declared emotional register. Current Music is often used to signal an emotional state the writer cannot directly claim; Current Mood is often used with intentional imprecision or ironic over-precision ("Current Mood: vaguely uncertain," "Current Mood: inexplicably okay"). The comment count is visible but comments are not shown: the reader knows only that responses exist. An entry with both metadata fields blank has deliberately emptied the second channel; an entry marked friends-only containing nothing personal has inverted the expected use of access levels.
  source: "LiveJournal current_mood / current_music metadata fields (2001-2007); LJ protocol chapter 12"
  tags: [metadata, self-disclosure, mood, music, second-channel, LiveJournal, 2000s]

