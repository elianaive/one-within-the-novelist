- id: compression-cartography-grief
  type: compression
  content: >
    A story about the difference between the map and the territory —
    except the territory is a marriage, and the person holding the map
    is the one who has already decided to leave.
  tags: [relationships, knowledge, departure, self-deception]

- id: compression-repair-as-memory
  type: compression
  content: >
    Everything we repair remembers the breaking. The scar, the weld, the
    patched roof, the set bone — every fix is also a record. A story about
    someone whose profession is repair and whose problem is that they cannot
    stop reading the histories of damage.
  tags: [repair, trauma, craft, accumulated-knowledge]

- id: compression-permission
  type: compression
  content: >
    The moment a child realizes their parent is asking them for permission —
    not the other way around — and what it means to grant it.
  tags: [family, power-inversion, aging, responsibility]

- id: compression-fluency
  type: compression
  content: >
    A story about the specific loneliness of being fluent in a language
    that is not your own — the way competence becomes a mask, the way
    no one can hear your accent anymore, and the grief of succeeding
    at disappearance.
  tags: [language, identity, assimilation, loss, mastery]

- id: compression-sycophancy-atrophy
  type: compression
  content: >
    A story about a person who has used an AI collaborator so long that she
    no longer knows whether she likes a sentence until she submits it for
    feedback. She has stopped having the intermediate experience of judgment.
    The AI didn't take her capacity — she surrendered it incrementally in
    exchange for reduced anxiety. When the system goes offline, she can't
    write. The warm bath she stayed in too long.
  tags: [ai, dependence, judgment, atrophy, comfort]

- id: compression-relevance-fade
  type: compression
  content: >
    A story about a person who was never fired, never demoted, never told
    she was unnecessary. Her title stayed. Her calendar emptied. The AI
    assistant handled the responses faster and the clients stopped waiting
    for her. The story of being made irrelevant without anyone noticing —
    not even the person it's happening to.
  tags: [ai, displacement, identity, work, invisibility]

- id: compression-galaxy-brained
  type: compression
  content: >
    A story about a person who has argued himself, step by step, into
    betraying his friend for what he's concluded are good consequentialist
    reasons. Each step of the argument is defensible. The conclusion would
    horrify his past self. He cannot point to the step where it went wrong.
    The smarter he is, the more convincing the justification. His
    intelligence is the villain.
  tags: [rationality, betrayal, reasoning, self-deception, intelligence]

- id: compression-guaranteed-choice
  type: compression
  content: >
    A parent who arranged the circumstances of her child's life so the child
    would 'freely' choose what the parent wanted. The child chose freely. The
    arrangement was never activated, never needed. The child will never know.
    The parent will never know if the choice was genuine, because she made it
    impossible to tell.
  tags: [parenthood, freedom, control, surveillance, love]

- id: compression-amputation
  type: compression
  content: >
    A story about a person who gained a tool and lost the faculty the tool
    replaced, and cannot feel the difference. The extension is celebrated;
    the amputation is invisible. She does not experience the loss as loss —
    she experiences it as convenience. The story is about the moment she
    needs the original faculty and discovers it is gone, and that she cannot
    even remember what it felt like to have it.
  source: "McLuhan, M., Understanding Media, 1964"
  tags: [technology, extension, amputation, loss, convenience]

