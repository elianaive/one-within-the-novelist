- id: plant-anesthesia
  type: real_world
  content: >
    Plants can be rendered unconscious by the same anesthetics that work on
    humans — ether, xenon, lidocaine — and no one knows why, since plants
    have no nervous system.
  source: "Yokawa et al., Annals of Botany, 2018"
  tags: [consciousness, biology, mystery]

- id: dancing-plague
  type: real_world
  content: >
    In July 1518, a woman named Frau Troffea began dancing in a Strasbourg
    street and could not stop. Within a month, 400 people had joined. Several
    danced to death.
  source: "Waller, J., 'A Time to Dance, a Time to Die,' 2009"
  tags: [mass-psychogenic-illness, medieval, body, contagion]

- id: turkish-coffee-divination
  type: real_world
  content: >
    In Turkey, after drinking Turkish coffee, the cup is flipped and the
    patterns left by the grounds are read for fortune-telling. Many educated,
    secular Turks participate while insisting they don't believe in it.
  source: "Henkel, Social Analysis, 2005"
  tags: [ritual, belief, social-performance, ambiguity]

- id: pepys-cheese-burial
  type: real_world
  content: >
    During the Great Fire of London in 1666, Samuel Pepys buried his Parmesan
    cheese in the garden to save it from the flames. He also buried wine and
    documents, but mentions the cheese first.
  source: "Pepys diary, Sept 4, 1666"
  tags: [priorities, disaster, absurdity, intimacy]

- id: radium-girls
  type: real_world
  content: >
    In the 1920s, women painting luminous watch dials were told to lick their
    radium-tipped brushes. When they began dying, the company hired
    investigators to blame their deaths on syphilis.
  source: "Moore, The Radium Girls, 2017"
  tags: [labor, cover-up, body, injustice, industry]

- id: octopus-rna-editing
  type: real_world
  content: >
    Octopuses edit their own RNA at 100x the rate of humans — recoding genetic
    instructions on the fly. This may explain their intelligence but comes at
    the cost of extremely slow DNA evolution.
  source: "Liscovitch-Brauer et al., Cell, 2017"
  tags: [intelligence, adaptation, tradeoff, alien-minds]

- id: last-speaker
  type: real_world
  content: >
    When Boa Sr died in 2010, the Bo language of the Andaman Islands —
    estimated 65,000 years old — died with her. She had spent decades with
    no one to speak it to.
  source: "Survival International, 2010"
  tags: [language-death, isolation, loss, memory]

- id: rubber-hand
  type: real_world
  content: >
    In the rubber hand illusion, watching a fake hand being stroked while your
    hidden real hand is stroked simultaneously causes your brain to 'adopt' the
    rubber hand within minutes. Threatening it produces genuine fear.
  source: "Botvinick & Cohen, Nature, 1998"
  tags: [body-ownership, identity, illusion, self]

- id: death-cleaning
  type: real_world
  content: >
    In Sweden, 'döstädning' is gradually decluttering your possessions as you
    age so your family doesn't have to after you die. Framed not as morbid but
    as a final act of consideration.
  source: "Magnusson, 2017"
  tags: [death, objects, care, legacy, minimalism]

- id: night-witches
  type: real_world
  content: >
    The Soviet 588th Night Bomber Regiment — all-female — flew obsolete plywood
    biplanes on night bombing runs. They'd cut engines and glide silently over
    targets. Germans called them 'Nachthexen' (Night Witches).
  source: "Noggle, A Dance with Death, 1994"
  tags: [war, women, ingenuity, fear, obsolescence]

- id: cathedral-generations
  type: real_world
  content: >
    The stonemasons who began constructing Notre-Dame de Paris in 1163 knew
    they would never see it finished. The cathedral took 182 years to complete.
    Workers spent entire careers carving details on the upper walls that no
    human eye at ground level could discern.
  source: "Erlande-Brandenburg, Notre-Dame de Paris, 1997"
  tags: [craft, time, devotion, labor, invisibility]

- id: prison-chess
  type: real_world
  content: >
    During apartheid, political prisoners on Robben Island played chess using
    pieces carved from soap and boards scratched into cell floors. When guards
    confiscated the sets, players switched to mental chess — announcing moves
    through cell walls by tapping.
  source: "Sobukwe & Alexander oral histories, Robben Island Museum archives"
  tags: [resistance, abstraction, confinement, ingenuity]

- id: seed-vault-flood
  type: real_world
  content: >
    The Svalbard Global Seed Vault — designed to survive any catastrophe — was
    breached by meltwater in 2017 due to permafrost thaw no one had predicted.
    The vault built to protect against the end of the world was threatened by
    the process that might cause it.
  source: "The Guardian, May 19, 2017"
  tags: [irony, preservation, climate, hubris]

- id: feral-children-language
  type: real_world
  content: >
    After age ~12, the human brain loses the ability to fully acquire a first
    language. Genie Wiley, isolated until age 13, could learn words but never
    mastered grammar — suggesting there is a window for becoming fully human
    in a linguistic sense, and it closes.
  source: "Curtiss, S., Genie: A Psycholinguistic Study, 1977"
  tags: [language, development, isolation, irreversibility]

- id: fetal-microchimerism
  type: real_world
  content: >
    Male fetal DNA has been found in 63% of women's brains, persisting up to
    age 94. Women who never carried a male pregnancy to term sometimes test
    positive — the source may be a miscarried fetus they never knew about, or
    an older sibling absorbed in utero. You carry your children in your brain,
    including the ones you lost before you knew them.
  source: "Chan et al., PLOS ONE, 2012"
  tags: [identity, parenthood, biology, boundaries, loss]

- id: tapeworm-ant-royalty
  type: real_world
  content: >
    A tapeworm (Anomotaenia brevis) triples the lifespan of infected ants,
    making their survival curves identical to queens. It alters the ant's
    cuticle chemistry so nestmates groom and feed the infected worker more
    attentively than they feed the actual queen. The colony reorganizes its
    entire care hierarchy around a chemical lie.
  source: "Gál et al., Royal Society Open Science, 2021"
  tags: [parasitism, deception, status, care, identity]

- id: capgras-patient-ds
  type: real_world
  content: >
    Patient DS recognized his parents' voices on the telephone but insisted
    their faces were impostors when he saw them. Galvanic skin response testing
    confirmed zero autonomic response to familiar faces. His brain could
    identify the faces cognitively but felt nothing — and 'they are impostors'
    was the most rational interpretation of his actual experience.
  source: "Hirstein & Ramachandran, Proc. R. Soc. Lond. B, 1997"
  tags: [recognition, feeling, identity, rationality, family]

- id: operation-bernhard-palestine
  type: real_world
  content: >
    Nazi Germany forged £300 million in British banknotes to destabilize
    Britain's economy. The airdrop plan was abandoned. A documented fraction
    of the forged notes ended up funding illegal Jewish emigration to Palestine
    in defiance of the British blockade. A weapon of economic destruction,
    repurposed as a tool of rescue for the people that same regime was
    exterminating.
  source: "Bank of England Museum; Smithsonian Magazine"
  tags: [war, irony, rescue, repurposing, moral-complexity]

- id: atlantic-cable-destroyed
  type: real_world
  content: >
    The first transatlantic telegraph cable (1858) was destroyed by its chief
    electrician, Wildman Whitehouse, who applied 2,000+ volts to fix declining
    signals — ignoring the cable's specs and Lord Kelvin's warnings. The
    insulation burned through in three weeks. The most ambitious communication
    technology of the century was killed by the intensity of the attempt to
    use it.
  source: "Atlantic Cable archive; PBS American Experience"
  tags: [technology, hubris, repair, destruction, expertise]

- id: gallipoli-1854-map
  type: real_world
  content: >
    The ANZAC landing at Gallipoli was misdirected by a map drawn from an
    1854 French survey — sixty-one years before the invasion, for a different
    empire's different war. Troops landed at the base of sheer cliffs instead
    of a planned gentle slope. Men died based on a measurement no one had
    checked in six decades.
  source: "Australian War Memorial; USNI Proceedings, June 1995"
  tags: [maps, inherited-information, war, friction, institutional-inertia]

- id: radiologist-gorilla
  type: real_world
  content: >
    83% of expert radiologists failed to notice a gorilla image embedded in
    a CT scan — 48 times the size of a typical lung nodule — after their eyes
    had passed directly over it. Eye-tracking confirmed they looked at its
    location. Their training had tuned their visual system so specifically
    that the anomalous was filtered out at the perceptual level.
  source: "Drew, Võ & Wolfe, Psychological Science, 2013"
  tags: [expertise, perception, blindness, training, attention]

- id: phantom-telescoping
  type: real_world
  content: >
    In 30-50% of upper-limb amputees, the phantom hand gradually retreats
    through the phantom forearm until it is felt as protruding directly from
    the stump. The brain's map of the body folds inward. The lost limb
    doesn't disappear — it migrates and compresses into what's left.
  source: "Schmalzl et al., Frontiers in Human Neuroscience, 2011"
  tags: [body, loss, compression, phantom, persistence]

- id: antarctic-social-faultlines
  type: real_world
  content: >
    In 40 years of studying 1,100+ Antarctic overwinterers, the primary
    stressor is not cold, darkness, or isolation — it is interpersonal
    conflict along the social identities people brought with them. Scientists
    vs. support staff ('beakers' vs. 'toasties'), nationality, gender. We do
    not form new identities under pressure; we deepen the ones we carried in.
  source: "Palinkas, 40-year study; Cravalho, 'Toast on Ice,' Ethos, 1996"
  tags: [confinement, identity, conflict, group-dynamics, pressure]

- id: shu-syndrome-voices
  type: real_world
  content: >
    Stuart Grassian documented a specific psychiatric syndrome in 200+ supermax
    prisoners in extended solitary. Random sounds begin to take on meaning and
    frightening significance. One prisoner: 'I hear noises, can't identify
    them — starts to sound like sticks beating men.' A third reported whispered
    voices. Not pre-existing psychosis — it reverses on release. The mind,
    deprived of signal, generates signal from noise.
  source: "Grassian, Washington U. Journal of Law & Policy, 2006"
  tags: [isolation, perception, signal, noise, confinement]

- id: valproate-critical-window
  type: real_world
  content: >
    A drug (valproate, an HDAC inhibitor) can temporarily reopen the critical
    learning window for absolute pitch in adults. The barrier to adult
    acquisition is not biological incapacity but an epigenetic lock that can
    be briefly picked. Then the window re-closes. Some forms of 'too late'
    are molecular decisions, not destiny.
  source: "Gervain et al., Frontiers in Systems Neuroscience, 2013"
  tags: [learning, irreversibility, critical-period, epigenetics, second-chances]

# ============================================================
# thought_experiment
# ============================================================

- id: te-marys-room
  type: thought_experiment
  content: >
    Mary is a brilliant scientist confined to a black-and-white room, where
    she learns everything there is to know about the physics and neuroscience
    of color vision. She knows exactly which wavelengths stimulate which
    receptors and which neural processes produce the experience of "red."
    When she finally leaves the room and sees red for the first time — does
    she learn something new?
  source: "Jackson, F., 'Epiphenomenal Qualia,' Philosophical Quarterly, 1982"
  tags: [consciousness, qualia, physicalism, knowledge, experience]

- id: te-teleporter-duplicate
  type: thought_experiment
  content: >
    A teleporter works by scanning your body, destroying the original,
    and rebuilding an exact copy at the destination. The copy has all
    your memories and believes it walked into the machine. One day the
    destruction step fails. Now there are two of you. Which one is you?
    Does the copy have a right to your life, your family, your name?
  source: "Parfit, D., Reasons and Persons, 1984"
  tags: [personal-identity, continuity, duplication, death]

- id: te-utility-monster
  type: thought_experiment
  content: >
    Imagine a being that derives enormously more pleasure from each
    unit of a resource than anyone else does. Under utilitarian logic,
    everyone should give everything to this being — it maximizes total
    happiness. The monster's pleasure always outweighs everyone else's
    suffering. What's wrong with this picture, and why can't
    utilitarianism say what's wrong?
  source: "Nozick, R., Anarchy, State, and Utopia, 1974"
  tags: [ethics, utilitarianism, fairness, extremes]

- id: te-swampman
  type: thought_experiment
  content: >
    A bolt of lightning simultaneously kills a man in a swamp and,
    by extraordinary coincidence, rearranges nearby molecules into an
    exact physical duplicate. Swampman walks out, goes to the dead
    man's home, hugs his wife, continues his life. Swampman has no
    causal history — his memories are false, his relationships are
    with a dead man's people. But no one can tell. Is Swampman a person?
  source: "Davidson, D., 'Knowing One's Own Mind,' 1987"
  tags: [identity, causation, memory, authenticity, replacement]

- id: te-kavkas-toxin
  type: thought_experiment
  content: >
    A billionaire offers you $1 million if, at midnight tonight, you sincerely
    intend to drink a mildly nauseating toxin tomorrow afternoon. You don't
    have to drink it — the money is deposited based solely on the intention.
    But the moment you realize you won't have any reason to drink it tomorrow
    (you already have the money), the intention becomes self-undermining. Can
    you sincerely intend something you know you'll abandon? Kavka developed
    this from nuclear deterrence: can a leader sincerely intend to retaliate
    when retaliation would be pointless?
  source: "Kavka, G., 'The Toxin Puzzle,' Analysis, 1983"
  tags: [intention, commitment, self-knowledge, deterrence, rationality]

- id: te-hungry-ghosts-river
  type: thought_experiment
  content: >
    A hungry ghost approaches a river and sees pus and blood. A human
    approaches the same river and sees clear water. A fish lives in the
    river and experiences it as home. All three are present at the same
    place at the same moment. There is no fourth perspective from which
    to determine what the river "really" is. If shared experience cannot
    settle the question — humans agree it's water, but so do the ghosts
    agree it's pus — then what grounds the assumption that there is one
    river at all, rather than three incommensurable worlds occupying the
    same coordinates?
  source: "Vasubandhu, Vimshatikakarikavrtti (Twenty Verses), 4th-5th c. CE"
  tags: [perception, reality, incommensurability, buddhist, species, cosmology]

- id: te-mozi-care-trustee
  type: thought_experiment
  content: >
    You are about to leave on a journey from which you may not return.
    You must entrust your children to one of two guardians. The first
    believes in impartial love — they will care for your children
    exactly as they care for any stranger's children, no more, no less.
    The second believes in partiality — they will always prioritize
    their own family above all others. You believe in partiality. You
    have argued for it. But you choose the impartialist, because the
    impartialist is the only one you can trust not to sacrifice your
    children for their own. Your deepest value can only be protected
    by someone who rejects it.
  source: "Mozi (Mo Di), 'Impartial Caring' Chapter C (Jian'ai C), c. 450 BCE"
  tags: [trust, partiality, hypocrisy, family, values, chinese-philosophy]

- id: te-fire-cotton
  type: thought_experiment
  content: >
    You hold cotton to a flame. The cotton burns. You have seen this
    happen a thousand times. But Al-Ghazali argues you have never once
    observed causation — only sequence. The fire has no power to burn.
    God burns the cotton on the occasion of fire touching it. The
    regularity is a habit of divine will, not a law of nature. Now:
    God suspends this habit, just once, for just one person. The fire
    touches the cotton and nothing happens. The person stares at the
    unchanged cotton. They cannot tell anyone, because no one would
    believe a world where fire does not burn. They cannot trust any
    sequence they have ever observed. The most ordinary thing in the
    world — a flame — has become evidence that nothing connects cause
    to effect.
  source: "Al-Ghazali, Tahafut al-Falasifa (The Incoherence of the Philosophers), Discussion 17, 1095 CE"
  tags: [causation, habit, divine-will, trust, regularity, islamic-philosophy]

- id: te-last-man
  type: thought_experiment
  content: >
    You are the last living human. Everyone else is dead. In your
    remaining hours, you begin systematically destroying every living
    thing you can reach — cutting down trees, poisoning rivers, burning
    grassland. You do this for no reason. Not survival, not anger, not
    ritual. You simply do it because nothing stops you. No one is
    harmed. No one will mourn what is lost. No future generation will
    inherit the damage. No ecosystem needs to be preserved for anyone.
    Nothing you destroy will ever be missed by a consciousness capable
    of missing it. Is what you are doing wrong? And if you cannot say
    why, what was holding your ethics together before everyone died?
  source: "Routley (Sylvan), R., 'Is There a Need for a New, an Environmental, Ethic?', XVth World Congress of Philosophy, 1973"
  tags: [environment, intrinsic-value, ethics, anthropocentrism, last-person, witness]

- id: te-combined-spectrum
  type: thought_experiment
  content: >
    Imagine a corridor of a thousand rooms. In the first room is
    someone identical to you — your body, your memories, your
    personality. In each successive room, one thing has changed: a
    memory replaced, a preference shifted, a molecule of brain
    chemistry altered. The changes are so small that the person in any
    given room is indistinguishable from the person in the room before.
    By room five hundred, the person shares half your memories and half
    a stranger's. By room one thousand, the person is psychologically
    and physically identical to Napoleon. You are in room one. You know
    what is in room one thousand. You cannot identify a single room
    where you cease to exist and someone else begins. There is no door
    you can point to and say: I die here.
  source: "Parfit, D., Reasons and Persons, Part III, Chapter 15, 1984"
  tags: [personal-identity, gradual-change, threshold, continuity, death]

- id: te-boltzmann-brain
  type: thought_experiment
  content: >
    Given enough time — far more than the current age of the universe
    — random thermal fluctuations will spontaneously assemble a
    complete human brain, equipped with a full set of memories of a
    life it never lived: parents it never had, a childhood that never
    happened, a morning it never woke up to. This brain exists for a
    fraction of a second before dissolving back into entropy.
    Statistical mechanics implies such brains are overwhelmingly more
    probable than brains that arose through billions of years of
    stellar nucleosynthesis and biological evolution. You cannot
    determine from the inside whether you are a Boltzmann brain. Your
    memories do not help — they would feel identical either way. The
    life you remember is not evidence that you lived it.
  source: "Named for Boltzmann, L. (1844-1906); modern form developed by cosmologists c. 2002-2004"
  tags: [memory, entropy, probability, false-memories, cosmology, identity]

- id: te-fred-two-reds
  type: thought_experiment
  content: >
    Fred sees two distinct colors where you see one. When you look at
    a ripe tomato and a fire truck, you see the same red. Fred sees
    two reds as different from each other as red is from green. He can
    sort objects by this distinction with perfect consistency. His
    visual cortex, when scanned, shows two separate activation patterns
    where yours shows one. You have every physical fact about Fred's
    brain, every measurement of his visual processing, every functional
    description of what happens when light hits his retina. You still
    do not know what his second red looks like. He lives among you,
    unimprisoned, unrestricted — he simply perceives a dimension of the
    world that is structurally unavailable to anyone else. No one can
    verify what he sees. No one can share it. He is not lying, and he
    cannot prove he is telling the truth.
  source: "Jackson, F., 'Epiphenomenal Qualia,' Philosophical Quarterly 32(127), 1982"
  tags: [perception, qualia, isolation, unverifiable, knowledge, color]

- id: te-split-brain
  type: thought_experiment
  content: >
    A patient's corpus callosum — the bridge between brain hemispheres
    — is surgically severed. The left hemisphere sees one image; the
    right hemisphere sees another. The left hand reaches for something
    the right hand does not want. The patient — the left hemisphere,
    which controls speech — reports only one intention, confabulating
    a reason for what the other hand did. The right hemisphere, which
    cannot speak, has made a different decision for a different reason.
    It has no voice to report this. If the right hemisphere disagrees
    with an action the left hemisphere has taken, there is no mechanism
    by which it can object. One body, two moral agents, and only one
    of them can testify.
  source: "Sperry, R. & Gazzaniga, M., split-brain research, 1960s-1980s; Gazzaniga, The Ethical Brain, 2005"
  tags: [consciousness, agency, testimony, silence, confabulation, neuroscience]

- id: te-white-horse-gate
  type: thought_experiment
  content: >
    A man arrives at a border checkpoint leading a white horse. The
    law is clear: no horses may pass. The man argues — not as a joke
    but as a legal claim he expects to prevail — that a white horse
    is not a horse. "Horse" refers to a form. "White horse" refers to
    a form plus a color. These are different categories. The law
    prohibits horses; he has a white horse; therefore the law does not
    apply. The guard must now decide, with real consequences, whether
    language tracks reality closely enough to enforce a law. If the
    man is wrong, he is a sophist. If the man is right, the law is
    unenforceable — because every actual horse is a colored horse, and
    no colored horse is the "horse" the law names.
  source: "Gongsun Long (c. 320-250 BCE), 'Bai Ma Lun' (White Horse Dialogue), Gongsun Longzi"
  tags: [language, law, categories, enforcement, sophistry, chinese-philosophy]

- id: te-liberal-paradox
  type: thought_experiment
  content: >
    There is one copy of a controversial book. Three people are
    involved. The first is scandalized by the book and wants no one to
    read it — but if someone must, he'd rather read it himself than
    let it corrupt the second person. The second person desperately
    wants to read it, but even more wants the first person to read it,
    because the first person's prudishness offends him and he believes
    the book would do him good. Each person has the right to decide
    for themselves whether they personally read the book. Both are
    exercising that right sincerely. When you follow the logic of
    respecting both their individual freedoms and producing the best
    collective outcome, you arrive at a result neither of them chose
    and neither of them wants. Individual liberty and collective
    welfare, applied simultaneously and honestly, produce an outcome
    that violates both.
  source: "Sen, A., 'The Impossibility of a Paretian Liberal,' Journal of Political Economy 78(1), 1970"
  tags: [liberty, welfare, paradox, rights, collective-choice, economics]

- id: te-perception-inversion
  type: thought_experiment
  content: >
    A man's perceptual system is catastrophically altered. What he
    previously experienced as beauty — human faces, sunlight, music —
    now registers as horror: viscera, decay, noise. What he previously
    experienced as horror — a monstrous creature, rot, alien tissue —
    now registers as beauty: a radiant girl, warmth, tenderness. His
    ethics follow his phenomenology coherently. He falls in love with
    the only beautiful thing in his world. From the outside, he is a
    monster. From the inside, he is the last romantic in a world of
    nightmare. The question is not who is right. The question is
    whether "right" means anything independent of what the world feels
    like from inside.
  source: "Urobuchi, G. / Nitroplus, Saya no Uta, 2003"
  tags: [perception, phenomenology, ethics, inversion, VN, beauty]

- id: te-hedgehog-dissolution
  type: thought_experiment
  content: >
    A technology exists that can dissolve the boundary between one
    consciousness and another's. Complete mutual access — no secrets,
    no misunderstanding, no loneliness. The process is irreversible.
    Two people who love each other are offered this. One wants it
    desperately. The other refuses — not because they don't love the
    first person, but because the self that would benefit from
    painlessness is the same self that would be eliminated by it. You
    cannot be relieved of loneliness without being relieved of the one
    who was lonely. The story is about the refusal, and what it costs
    both of them.
  source: "Anno, H., Neon Genesis Evangelion, 1995-1997 (Hedgehog's Dilemma / AT Field / Instrumentality)"
  tags: [loneliness, merger, individuation, self, love, anime]

- id: te-unlimited-reset
  type: thought_experiment
  content: >
    A being is given the power to reset any situation to its starting
    point, retaining full memory. At first, they use it to help —
    saving everyone, optimizing every outcome, becoming a perfect
    benefactor. Then they've saved everyone. Every configuration of
    rescue has been executed. They begin experimenting — what happens
    if they don't save this person? What if they actively harm them?
    The harm has no consequences; a reset erases it. Gradually, the
    being discovers that the absence of permanent consequence has
    eroded the meaning of permanent kindness. They are not evil. They
    are bored. Boredom is worse.
  source: "Fox, T., Undertale, 2015 (Flowey's arc)"
  tags: [consequence, boredom, reset, ethics, game-mechanic, power]

