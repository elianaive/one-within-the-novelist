- id: image-piano-field
  type: image
  content: >
    An upright piano stands in the middle of a harvested wheat field, its
    lid open. A woman in a paramedic's uniform sits on the bench, not
    playing, just resting her hands on the keys.
  tags: [incongruity, exhaustion, music, silence]

- id: image-translation-booth
  type: image
  content: >
    A simultaneous translator in a glass booth at a UN session begins
    crying mid-sentence. She doesn't stop translating. The delegates below
    hear the foreign minister's trade policy argument delivered in a
    breaking voice.
  tags: [language, emotion-leak, professionalism, containment]

- id: image-night-swim
  type: image
  content: >
    Two teenagers swim in a flooded quarry at night. One of them has been
    blind since birth. She is the one who suggested coming here.
  tags: [perception, trust, darkness, youth]

- id: image-repairman-museum
  type: image
  content: >
    A refrigerator repairman sits alone in a closed art museum after hours,
    eating his lunch in front of the same painting every Tuesday. He has
    never mentioned this to anyone.
  tags: [solitude, ritual, beauty, secrecy]

- id: image-krikalev-orbit
  type: image
  content: >
    Cosmonaut Sergei Krikalev launched from the Soviet Union in May 1991.
    While he orbited on Mir, the country dissolved beneath him. His mission
    was extended because there was no money to bring him home. He spent
    months looking down at borders being redrawn, listening to mission
    control explain that the nation that sent him up no longer existed.
  source: "Multiple; Krikalev returned March 1992 to Kazakh soil"
  tags: [dissolution, orbit, borders, abandonment, geopolitics]

- id: image-jarrett-broken-piano
  type: image
  content: >
    The Köln Concert, 1975. The venue provided a rehearsal piano in terrible
    condition — keys stuck, upper registers tinny, pedals unreliable. Keith
    Jarrett almost walked out. He played anyway, and the limitations forced
    him into the lower registers and a rhythmic intensity he might never
    have found on a good instrument. It became one of the most celebrated
    solo piano recordings in history. A man sitting down at a broken piano,
    furious, playing the performance of his life because the piano was wrong.
  source: "Jarrett/ECM Records, 1975; multiple retrospective accounts"
  tags: [limitation, fury, transcendence, instrument, improvisation]

- id: image-sokushinbutsu-bell
  type: image
  content: >
    Japanese Buddhist monks who undertook sokushinbutsu — self-mummification
    over years of ascetic practice — sealed themselves alive in a stone tomb
    with a small bell. They rang the bell once a day. When the bell stopped
    ringing, the tomb was sealed permanently. The image: a bell ringing once
    a day from inside stone, and the morning it doesn't.
  source: "Documented practice, 11th-19th century; Dainichi-Bō temple, Yamagata"
  tags: [death, ritual, silence, discipline, transition]

- id: image-carter-vulture
  type: image
  content: >
    Kevin Carter's 1993 photograph: a vulture watching a starving child in
    Sudan. Carter won the Pulitzer. He killed himself three months later.
    The image that matters is not the vulture watching the child — it is the
    photographer watching the vulture watching the child, choosing to frame
    the shot instead of intervening. The camera as an instrument that
    simultaneously documents suffering and creates distance from it.
  source: "Carter, K., photograph, Sudan, 1993; Pulitzer Prize 1994"
  tags: [observation, complicity, distance, camera, destruction]

- id: image-parks-fingerprinted
  type: image
  content: >
    Rosa Parks being fingerprinted after her arrest, 1955. Not the bus. Not
    the refusal. The bureaucratic processing of resistance. The state's
    response to moral courage is a form and an ink pad. The most powerful
    thing about the image is its banality — the system doesn't rage, it
    files.
  source: "Associated Press photograph, Montgomery, Alabama, 1955"
  tags: [bureaucracy, resistance, banality, institution, processing]

- id: image-umbrella-teargas
  type: image
  content: >
    A protester holding an umbrella against tear gas, Hong Kong, 2014. An
    object designed for rain, deployed against a chemical weapon. The
    umbrella is insufficient and everyone knows it, including the person
    holding it. Resistance as the act of using the wrong tool because it
    is the only one you have.
  source: "Umbrella Movement photographs, Hong Kong, 2014"
  tags: [resistance, insufficiency, improvisation, fragility, defiance]

- id: image-lunch-skyscraper
  type: image
  content: >
    Eleven men eating lunch on a steel beam 840 feet above New York, 1932.
    The photograph was almost certainly staged as promotion for 30
    Rockefeller Center. Most of the men have never been conclusively
    identified. The most iconic image of American working-class fearlessness
    is probably an advertisement, and the workers in it are anonymous.
  source: "Photograph, 30 Rockefeller Plaza construction, 1932; authorship disputed"
  tags: [labor, anonymity, performance, staging, mythology]

- id: image-costco-christmas
  type: image
  content: >
    A man in a suit sits in a Costco food court alone on Christmas Day,
    eating a $1.50 hot dog. His phone is face-down on the table. He's
    brought his own mustard.
  tags: [loneliness, dignity, specificity, ritual, holiday, detail]

- id: image-monk-scriptorium
  type: image
  content: >
    A monk copies a manuscript he cannot read. He has spent eleven years
    reproducing texts in a language he does not speak. His letter-forms
    are considered the most beautiful in the scriptorium. He has no idea
    what any of it says.
  tags: [craft, meaning, devotion, pre-modern, labor, gap]

- id: image-replacement-hand-glass
  type: image
  content: >
    A being composed entirely of replacements looking at the last
    fragment of their original body, held behind glass in someone
    else's collection. They reach toward it and their replacement
    hand — the fourth one, the one made from a material that can't
    feel temperature — touches the glass. They know they should feel
    something. They know this because they remember remembering that
    they once could.
  tags: [identity, replacement, loss, memory, manga, gem]

- id: image-figure-megastructure
  type: image
  content: >
    A human-sized figure walking through a structure so vast its walls
    disappear into darkness in every direction. They have been walking
    for what they believe is years. They carry a weapon designed for a
    threat they have never encountered. The structure was built by
    something that is no longer here, for a purpose that cannot be
    determined from inside. The figure is not lost — there is nowhere
    to be found.
  tags: [scale, architecture, solitude, purpose, manga, Blame]

- id: image-apothecary-tasting
  type: image
  content: >
    A servant girl in the imperial harem crouching over a mortar and
    pestle at dawn, grinding something green. She tastes it with her
    fingertip — not to test the flavor but to measure her body's
    reaction. Her eyes dilate. She makes a note. The substance could
    save the empress or kill her. The girl is not deciding which. She
    is simply interested in what it does.
  tags: [expertise, poison, medicine, curiosity, palace, manga]

# ============================================================
# compression
# ============================================================

- id: compression-cartography-grief
  type: compression
  content: >
    A story about the difference between the map and the territory —
    except the territory is a marriage, and the person holding the map
    is the one who has already decided to leave.
  tags: [relationships, knowledge, departure, self-deception]

- id: compression-repair-as-memory
  type: compression
  content: >
    Everything we repair remembers the breaking. The scar, the weld, the
    patched roof, the set bone — every fix is also a record. A story about
    someone whose profession is repair and whose problem is that they cannot
    stop reading the histories of damage.
  tags: [repair, trauma, craft, accumulated-knowledge]

- id: compression-permission
  type: compression
  content: >
    The moment a child realizes their parent is asking them for permission —
    not the other way around — and what it means to grant it.
  tags: [family, power-inversion, aging, responsibility]

- id: compression-fluency
  type: compression
  content: >
    A story about the specific loneliness of being fluent in a language
    that is not your own — the way competence becomes a mask, the way
    no one can hear your accent anymore, and the grief of succeeding
    at disappearance.
  tags: [language, identity, assimilation, loss, mastery]

- id: compression-sycophancy-atrophy
  type: compression
  content: >
    A story about a person who has used an AI collaborator so long that she
    no longer knows whether she likes a sentence until she submits it for
    feedback. She has stopped having the intermediate experience of judgment.
    The AI didn't take her capacity — she surrendered it incrementally in
    exchange for reduced anxiety. When the system goes offline, she can't
    write. The warm bath she stayed in too long.
  tags: [ai, dependence, judgment, atrophy, comfort]

- id: compression-relevance-fade
  type: compression
  content: >
    A story about a person who was never fired, never demoted, never told
    she was unnecessary. Her title stayed. Her calendar emptied. The AI
    assistant handled the responses faster and the clients stopped waiting
    for her. The story of being made irrelevant without anyone noticing —
    not even the person it's happening to.
  tags: [ai, displacement, identity, work, invisibility]

- id: compression-galaxy-brained
  type: compression
  content: >
    A story about a person who has argued himself, step by step, into
    betraying his friend for what he's concluded are good consequentialist
    reasons. Each step of the argument is defensible. The conclusion would
    horrify his past self. He cannot point to the step where it went wrong.
    The smarter he is, the more convincing the justification. His
    intelligence is the villain.
  tags: [rationality, betrayal, reasoning, self-deception, intelligence]

- id: compression-guaranteed-choice
  type: compression
  content: >
    A parent who arranged the circumstances of her child's life so the child
    would 'freely' choose what the parent wanted. The child chose freely. The
    arrangement was never activated, never needed. The child will never know.
    The parent will never know if the choice was genuine, because she made it
    impossible to tell.
  tags: [parenthood, freedom, control, surveillance, love]

- id: compression-amputation
  type: compression
  content: >
    A story about a person who gained a tool and lost the faculty the tool
    replaced, and cannot feel the difference. The extension is celebrated;
    the amputation is invisible. She does not experience the loss as loss —
    she experiences it as convenience. The story is about the moment she
    needs the original faculty and discovers it is gone, and that she cannot
    even remember what it felt like to have it.
  source: "McLuhan, M., Understanding Media, 1964"
  tags: [technology, extension, amputation, loss, convenience]

- id: compression-only-reader
  type: compression
  content: >
    A man steps into a story he has read alone, obsessively, for
    years. The characters he loved on the page are now real and do not
    know him. He knows their futures. He knows who will die. He knows
    who will betray whom. His loneliness — the loneliness of the only
    reader — becomes the engine of every choice he makes. The story is
    about whether a reader's love for a character counts as love when
    the character has never heard of you.
  tags: [reading, loneliness, metafiction, love, knowledge, manhwa]

- id: compression-villainess-exit
  type: compression
  content: >
    A woman is trapped in a role — not by chains or walls but by the
    logic of the story she's in. She's the villainess. The story needs
    her to lose. Every choice she makes that deviates from the script
    is corrected — events conspire, coincidences accumulate, the world
    bends to put her back on the path to ruin. Her only genuine act of
    agency is to want something the story cannot provide. Not victory,
    not love, not redemption — just an ending that belongs to her.
  tags: [determinism, agency, exit, narrative-cage, villainess, manhwa]

- id: compression-name-without-referent
  type: compression
  content: >
    A being has had every component of their body replaced — arms,
    legs, head, eyes — each piece swapped for a different material
    from a different source. Their original components are scattered
    across the world, used as decorations, worn as jewelry, forgotten.
    They no longer remember who they were. Everyone still calls them
    by the same name. The story is about a name that has outlasted
    everything it was supposed to refer to.
  tags: [identity, replacement, memory, name, Ship-of-Theseus, manga]

- id: compression-fluency-in-cruelty
  type: compression
  content: >
    A woman infiltrates her own family. She learns their language of
    manipulation, their grammar of cruelty, their syntax of strategic
    affection. She becomes fluent. Fluency is the trap — the language
    shapes the speaker. She begins to think in their categories: who
    is useful, who is expendable, who can be leveraged. She has not
    changed her values. She has changed her reflexes. The values say
    one thing. The reflexes do another. The story is about the moment
    the reflexes win and the values don't even notice.
  tags: [competence, corruption, language, family, reflexes, manhwa]

- id: compression-medicine-poison-dosage
  type: compression
  content: >
    A servant girl in the imperial harem whose only power is knowing
    what plants do. Medicine and poison are the same substances — the
    distinction is dosage, timing, and intent. She solves mysteries
    through pharmacology, not magic. She navigates palace politics
    through the same logic: everything is a matter of dose. Loyalty
    in small amounts is survival. In large amounts, it's a death
    sentence.
  tags: [expertise, dosage, palace, pharmacology, agency, manga]

