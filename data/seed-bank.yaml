# ============================================================
# anti_target
# ============================================================

- id: anti-reconciliation-arc
  type: anti_target
  content: >
    PATTERN: Reconciliation arc (protagonist returns home, confronts past,
    reconciles with estranged family/community). SUBVERSION: The protagonist
    returns and reconciles, but the reconciliation is the wrong choice — it
    requires them to become smaller, to un-know things they learned by
    leaving. The story is about the cost of belonging when belonging demands
    amnesia.
  tags: [homecoming, conformity, self-betrayal]

- id: anti-grief-meditation
  type: anti_target
  content: >
    PATTERN: Grief meditation (dead loved one, metaphorical journey toward
    acceptance). SUBVERSION: The grieving person isn't sad — they're
    relieved, and the story is about the social performance of grief when
    the private experience is liberation. The dead person was loved AND
    the death was a release, and the story refuses to resolve that
    contradiction.
  tags: [grief, relief, performance, ambivalence]

- id: anti-ai-consciousness
  type: anti_target
  content: >
    PATTERN: AI consciousness story (AI becomes sentient, questions its
    existence, humans debate its rights). SUBVERSION: The AI is
    unambiguously not conscious — everyone agrees, including the AI's
    own diagnostics. The story is about the human who can't stop treating
    it as if it were, and what that compulsion reveals about the human
    need to find personhood in things.
  tags: [ai, projection, loneliness, anthropomorphism]

- id: anti-small-town-secret
  type: anti_target
  content: >
    PATTERN: Small-town secret (outsider arrives, uncovers the town's
    hidden truth). SUBVERSION: Everyone in town already knows the secret.
    The outsider is the last to find out, and the story is about the
    elaborate collective performance of pretending not to know — not to
    protect the secret, but to protect the outsider from having to act
    on it.
  tags: [community, performance, protection, complicity]

- id: anti-sanitized-conflict
  type: anti_target
  content: >
    PATTERN: Sanitized conflict (tension with no real stakes, no one gets
    hurt, clean resolution — the difficult conversation leads to
    understanding). SUBVERSION: The conflict appears to resolve — the
    characters have the conversation, say the right things, embrace. But
    the resolution is itself the violence. The reconciliation forecloses
    the anger that was the last honest thing between them. Being
    understood is the thing that destroys them, because it removes the
    last reason to keep fighting for what they actually needed.
  tags: [conflict, resolution-as-violence, RLHF, honesty]

- id: anti-magical-realism-metaphor
  type: anti_target
  content: >
    PATTERN: Magical realism metaphor (literal manifestation of emotional
    state — grief becomes weather, loneliness becomes invisibility, anger
    becomes fire). SUBVERSION: The magical element has no metaphorical
    relationship to the character's emotional content. A man can fly, and
    he uses it to avoid traffic on his commute. The miracle has been
    domesticated into banality. The world refuses to be a mirror for the
    protagonist's feelings. The story is about the specific sadness of
    wonders that don't change anything.
  tags: [magic, banality, pathetic-fallacy, indifference]

- id: anti-time-loop-lesson
  type: anti_target
  content: >
    PATTERN: Time loop lesson (protagonist repeats day/event, learns to
    be a better person — redemption with a built-in retry button).
    SUBVERSION: The protagonist repeats the day and gets worse. Each
    repetition strips away another inhibition. They don't learn patience
    and kindness — they learn what they're capable of when consequences
    are removed. The time loop reveals the person, and what it reveals
    is not redemptive.
  tags: [time-loop, degradation, consequences, revelation]

- id: anti-chosen-one
  type: anti_target
  content: >
    PATTERN: The chosen one (protagonist discovers special abilities or
    destiny, narrative vindicates their suffering as secretly meaningful).
    SUBVERSION: The character discovers they are not special. They have
    been living as if they had a calling — making sacrifices, enduring,
    waiting for the narrative to vindicate them — and there is no calling.
    They are ordinary. The story is about what remains when the
    architecture of specialness collapses, and whether a life organized
    around a destiny that doesn't exist was wasted or just a life.
  tags: [destiny, ordinariness, collapse, meaning, identity]

- id: anti-epistolary-revelation
  type: anti_target
  content: >
    PATTERN: Epistolary revelation (found letters/messages/recordings
    reveal hidden truth — 'she read the letter and everything became
    clear'). SUBVERSION: The letters are found, read carefully, and they
    are genuinely ambiguous. They could mean what the finder hopes or
    something completely different. The story is about the act of reading
    itself — the way we construct meaning from text when we need a
    particular answer. The document doesn't resolve the question; it
    reproduces it at higher resolution.
  tags: [ambiguity, reading, interpretation, epistolary, uncertainty]

- id: anti-moral-clarity
  type: anti_target
  content: >
    PATTERN: Moral clarity (good and evil are obvious, virtue is rewarded,
    evil is punished, the reader knows who to root for). SUBVERSION:
    Every character acts according to genuine moral convictions. No one is
    hypocritical. No one is self-deceiving. Multiple valid moral
    frameworks collide when applied to the same situation, and the outcome
    is catastrophic. Not because morality failed, but because morality is
    plural and the pluralism is irreconcilable. No one is wrong.
    Everything falls apart.
  tags: [pluralism, conviction, irreconcilable, catastrophe, sincerity]

- id: anti-confession-catharsis
  type: anti_target
  content: >
    PATTERN: Confession/catharsis arc (character carries a secret,
    confesses it, weight is lifted, healing begins). SUBVERSION: The
    confession happens and nothing changes. The person confessed to
    already knew. The weight doesn't lift. The secret was
    load-bearing — it was the last structure organizing the
    relationship, the thing that gave every interaction its shape and
    tension. Without it, there is nothing to navigate around. The
    story is about discovering that honesty can be a demolition, and
    that some silences were architectural.
  tags: [confession, catharsis, structure, demolition, honesty]

- id: anti-isekai-power-fantasy
  type: anti_target
  content: >
    PATTERN: Isekai power fantasy (protagonist dies in mundane world,
    reincarnates in RPG-like world with unique cheat ability, assembles
    companions, escalates through regions of increasing power without
    meaningful cost or personal growth). SUBVERSION: Told from the
    perspective of a native of the fantasy world watching the summoned
    hero arrive. The hero is incomprehensible — they laugh at dangers
    that kill real people, reference things that don't exist, treat
    the world's inhabitants as supporting characters in a personal
    narrative only they can see. The native cannot tell whether the
    hero is divine, insane, or simply incapable of taking other
    people's reality seriously. The story is about what it means to be
    a real person in someone else's fantasy.
  tags: [isekai, perspective-flip, NPC, power-fantasy, anime]

- id: anti-villainess-determinism
  type: anti_target
  content: >
    PATTERN: Villainess otome isekai (protagonist reincarnates as the
    villainess of an otome game, uses meta-knowledge to avoid doom
    flags, charm love interests, and achieve a happy ending the
    original story never offered). SUBVERSION: The protagonist doesn't
    want to win the game — she wants to leave it. The narrative's
    determinism is the antagonist: every choice that deviates from the
    script is corrected by the world, coincidences accumulate to drag
    events back toward the original plotline. Her only freedom is
    wanting the one thing the story cannot provide — an exit. Death is
    not a failure state; it is the only door the narrative can't lock.
  tags: [villainess, determinism, agency, exit, otome, manhwa]

- id: anti-cultivation-moral-collapse
  type: anti_target
  content: >
    PATTERN: Cultivation face-slapping (golden finger, humiliation,
    revenge, regional escalation, ascend to next tier, repeat —
    enemies are morally inferior, power validates the protagonist).
    SUBVERSION: A "righteous" cultivator systematically discovers that
    every righteous sect operates identically to the demonic sects
    they claim to oppose — the same resource hoarding, the same
    suppression of rivals, the same exploitation of weaker cultivators.
    The distinction between righteous and demonic is faction politics,
    not ethics. The protagonist cannot defect to the other side because
    there is nothing to defect to — the other side is the same thing
    wearing different robes.
  tags: [cultivation, morality, faction, hypocrisy, xianxia]

- id: anti-cultivation-transcendence-cost
  type: anti_target
  content: >
    PATTERN: Cultivation face-slapping. SUBVERSION: The protagonist
    cultivates successfully — reaches immortality, transcends the
    heavens, defeats every enemy the genre provides. And discovers that
    transcendence means watching everyone they loved age and die,
    repeatedly, across millennia. The power fantasy delivers exactly
    what it promised, and the price is the one thing the genre never
    mentions: immortality is not the absence of death but the permanent
    presence of loss. The story begins after ascension, not before.
  tags: [cultivation, immortality, loss, transcendence, aftermath, xianxia]

- id: anti-regression-victory-lap
  type: anti_target
  content: >
    PATTERN: Regression (protagonist dies at the end, returns to the
    beginning with full knowledge, replays life with foreknowledge
    advantage, takes revenge, optimizes outcomes). SUBVERSION: The
    protagonist is not the regressor — they're someone who has figured
    out that another person has regressed. The regressor's miraculous
    decisions, impossible foreknowledge, suspiciously perfect timing —
    the protagonist sees the pattern. The story is about realizing
    someone near you is playing a game you can't see, using knowledge
    they shouldn't have, and you are a piece on their board.
  tags: [regression, observation, manipulation, outsider, manhwa]
