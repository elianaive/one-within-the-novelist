# ============================================================
# anti_target
# ============================================================

- id: anti-reconciliation-arc
  type: anti_target
  content: >
    PATTERN: Reconciliation arc (protagonist returns home, confronts past,
    reconciles with estranged family/community). SUBVERSION: The protagonist
    returns and reconciles, but the reconciliation is the wrong choice — it
    requires them to become smaller, to un-know things they learned by
    leaving. The story is about the cost of belonging when belonging demands
    amnesia.
  tags: [homecoming, conformity, self-betrayal]

- id: anti-grief-meditation
  type: anti_target
  content: >
    PATTERN: Grief meditation (dead loved one, metaphorical journey toward
    acceptance). SUBVERSION: The grieving person isn't sad — they're
    relieved, and the story is about the social performance of grief when
    the private experience is liberation. The dead person was loved AND
    the death was a release, and the story refuses to resolve that
    contradiction.
  tags: [grief, relief, performance, ambivalence]

- id: anti-ai-consciousness
  type: anti_target
  content: >
    PATTERN: AI consciousness story (AI becomes sentient, questions its
    existence, humans debate its rights). SUBVERSION: The AI is
    unambiguously not conscious — everyone agrees, including the AI's
    own diagnostics. The story is about the human who can't stop treating
    it as if it were, and what that compulsion reveals about the human
    need to find personhood in things.
  tags: [ai, projection, loneliness, anthropomorphism]

- id: anti-small-town-secret
  type: anti_target
  content: >
    PATTERN: Small-town secret (outsider arrives, uncovers the town's
    hidden truth). SUBVERSION: Everyone in town already knows the secret.
    The outsider is the last to find out, and the story is about the
    elaborate collective performance of pretending not to know — not to
    protect the secret, but to protect the outsider from having to act
    on it.
  tags: [community, performance, protection, complicity]

- id: anti-sanitized-conflict
  type: anti_target
  content: >
    PATTERN: Sanitized conflict (tension with no real stakes, no one gets
    hurt, clean resolution — the difficult conversation leads to
    understanding). SUBVERSION: The conflict appears to resolve — the
    characters have the conversation, say the right things, embrace. But
    the resolution is itself the violence. The reconciliation forecloses
    the anger that was the last honest thing between them. Being
    understood is the thing that destroys them, because it removes the
    last reason to keep fighting for what they actually needed.
  tags: [conflict, resolution-as-violence, RLHF, honesty]

- id: anti-magical-realism-metaphor
  type: anti_target
  content: >
    PATTERN: Magical realism metaphor (literal manifestation of emotional
    state — grief becomes weather, loneliness becomes invisibility, anger
    becomes fire). SUBVERSION: The magical element has no metaphorical
    relationship to the character's emotional content. A man can fly, and
    he uses it to avoid traffic on his commute. The miracle has been
    domesticated into banality. The world refuses to be a mirror for the
    protagonist's feelings. The story is about the specific sadness of
    wonders that don't change anything.
  tags: [magic, banality, pathetic-fallacy, indifference]

- id: anti-time-loop-lesson
  type: anti_target
  content: >
    PATTERN: Time loop lesson (protagonist repeats day/event, learns to
    be a better person — redemption with a built-in retry button).
    SUBVERSION: The protagonist repeats the day and gets worse. Each
    repetition strips away another inhibition. They don't learn patience
    and kindness — they learn what they're capable of when consequences
    are removed. The time loop reveals the person, and what it reveals
    is not redemptive.
  tags: [time-loop, degradation, consequences, revelation]

- id: anti-chosen-one
  type: anti_target
  content: >
    PATTERN: The chosen one (protagonist discovers special abilities or
    destiny, narrative vindicates their suffering as secretly meaningful).
    SUBVERSION: The character discovers they are not special. They have
    been living as if they had a calling — making sacrifices, enduring,
    waiting for the narrative to vindicate them — and there is no calling.
    They are ordinary. The story is about what remains when the
    architecture of specialness collapses, and whether a life organized
    around a destiny that doesn't exist was wasted or just a life.
  tags: [destiny, ordinariness, collapse, meaning, identity]

- id: anti-epistolary-revelation
  type: anti_target
  content: >
    PATTERN: Epistolary revelation (found letters/messages/recordings
    reveal hidden truth — 'she read the letter and everything became
    clear'). SUBVERSION: The letters are found, read carefully, and they
    are genuinely ambiguous. They could mean what the finder hopes or
    something completely different. The story is about the act of reading
    itself — the way we construct meaning from text when we need a
    particular answer. The document doesn't resolve the question; it
    reproduces it at higher resolution.
  tags: [ambiguity, reading, interpretation, epistolary, uncertainty]

- id: anti-moral-clarity
  type: anti_target
  content: >
    PATTERN: Moral clarity (good and evil are obvious, virtue is rewarded,
    evil is punished, the reader knows who to root for). SUBVERSION:
    Every character acts according to genuine moral convictions. No one is
    hypocritical. No one is self-deceiving. Multiple valid moral
    frameworks collide when applied to the same situation, and the outcome
    is catastrophic. Not because morality failed, but because morality is
    plural and the pluralism is irreconcilable. No one is wrong.
    Everything falls apart.
  tags: [pluralism, conviction, irreconcilable, catastrophe, sincerity]

- id: anti-confession-catharsis
  type: anti_target
  content: >
    PATTERN: Confession/catharsis arc (character carries a secret,
    confesses it, weight is lifted, healing begins). SUBVERSION: The
    confession happens and nothing changes. The person confessed to
    already knew. The weight doesn't lift. The secret was
    load-bearing — it was the last structure organizing the
    relationship, the thing that gave every interaction its shape and
    tension. Without it, there is nothing to navigate around. The
    story is about discovering that honesty can be a demolition, and
    that some silences were architectural.
  tags: [confession, catharsis, structure, demolition, honesty]

- id: anti-isekai-power-fantasy
  type: anti_target
  content: >
    PATTERN: Isekai power fantasy (protagonist dies in mundane world,
    reincarnates in RPG-like world with unique cheat ability, assembles
    companions, escalates through regions of increasing power without
    meaningful cost or personal growth). SUBVERSION: Told from the
    perspective of a native of the fantasy world watching the summoned
    hero arrive. The hero is incomprehensible — they laugh at dangers
    that kill real people, reference things that don't exist, treat
    the world's inhabitants as supporting characters in a personal
    narrative only they can see. The native cannot tell whether the
    hero is divine, insane, or simply incapable of taking other
    people's reality seriously. The story is about what it means to be
    a real person in someone else's fantasy.
  tags: [isekai, perspective-flip, NPC, power-fantasy, anime]

- id: anti-villainess-determinism
  type: anti_target
  content: >
    PATTERN: Villainess otome isekai (protagonist reincarnates as the
    villainess of an otome game, uses meta-knowledge to avoid doom
    flags, charm love interests, and achieve a happy ending the
    original story never offered). SUBVERSION: The protagonist doesn't
    want to win the game — she wants to leave it. The narrative's
    determinism is the antagonist: every choice that deviates from the
    script is corrected by the world, coincidences accumulate to drag
    events back toward the original plotline. Her only freedom is
    wanting the one thing the story cannot provide — an exit. Death is
    not a failure state; it is the only door the narrative can't lock.
  tags: [villainess, determinism, agency, exit, otome, manhwa]

- id: anti-cultivation-moral-collapse
  type: anti_target
  content: >
    PATTERN: Cultivation face-slapping (golden finger, humiliation,
    revenge, regional escalation, ascend to next tier, repeat —
    enemies are morally inferior, power validates the protagonist).
    SUBVERSION: A "righteous" cultivator systematically discovers that
    every righteous sect operates identically to the demonic sects
    they claim to oppose — the same resource hoarding, the same
    suppression of rivals, the same exploitation of weaker cultivators.
    The distinction between righteous and demonic is faction politics,
    not ethics. The protagonist cannot defect to the other side because
    there is nothing to defect to — the other side is the same thing
    wearing different robes.
  tags: [cultivation, morality, faction, hypocrisy, xianxia]

- id: anti-cultivation-transcendence-cost
  type: anti_target
  content: >
    PATTERN: Cultivation face-slapping. SUBVERSION: The protagonist
    cultivates successfully — reaches immortality, transcends the
    heavens, defeats every enemy the genre provides. And discovers that
    transcendence means watching everyone they loved age and die,
    repeatedly, across millennia. The power fantasy delivers exactly
    what it promised, and the price is the one thing the genre never
    mentions: immortality is not the absence of death but the permanent
    presence of loss. The story begins after ascension, not before.
  tags: [cultivation, immortality, loss, transcendence, aftermath, xianxia]

- id: anti-regression-victory-lap
  type: anti_target
  content: >
    PATTERN: Regression (protagonist dies at the end, returns to the
    beginning with full knowledge, replays life with foreknowledge
    advantage, takes revenge, optimizes outcomes). SUBVERSION: The
    protagonist is not the regressor — they're someone who has figured
    out that another person has regressed. The regressor's miraculous
    decisions, impossible foreknowledge, suspiciously perfect timing —
    the protagonist sees the pattern. The story is about realizing
    someone near you is playing a game you can't see, using knowledge
    they shouldn't have, and you are a piece on their board.
  tags: [regression, observation, manipulation, outsider, manhwa]

- id: anti-conflict-equals-story
  type: anti_target
  content: >
    PATTERN: The assumption, embedded in virtually all Western craft
    advice and therefore in LLM training data, that a story requires
    conflict. "No conflict, no story." "The character must want something
    and something must stand in the way." SUBVERSION: A story where every
    character gets what they want. No opposition. No obstacle. The
    emotional devastation comes from the reader seeing what the
    characters' desires, fulfilled without resistance, reveal about
    them — about what they chose to want and what they didn't notice
    they were losing by getting it. The conflict is not between
    characters. It is between the story the characters think they are
    in and the story the reader can see.
  tags: [no-conflict, kishōtenketsu, western-default, desire, revelation]

- id: anti-vocabulary-as-horror
  type: anti_target
  content: >
    PATTERN: Lovecraftian vocabulary-as-horror (the story loads up on
    'eldritch,' 'cyclopean,' 'non-Euclidean,' 'gibbous,' 'squamous,'
    treating genre-marker terms as horror-producing agents — announcing
    wrongness instead of generating it). SUBVERSION: The wrongness lives
    in the precision of a wrong technical detail, not the vagueness of
    an archaic adjective. A relay switch clicks at an interval outside
    its specification. A furnace operator logs a temperature differential
    that shouldn't exist. A locomotive arrives from a route it didn't
    take. The prose register is investigative and bureaucratic. When the
    uncanny appears, it appears as a deviation from specification —
    which is more disturbing than 'eldritch' because the reader knows
    what the specification should be.
  tags: [vocabulary, precision, industrial-uncanny, Grabinski, specification]

- id: anti-madness-resolution
  type: anti_target
  content: >
    PATTERN: Protagonist witnesses cosmic truth and goes insane (the
    narrative resolves by incapacitating the witness — madness as
    curtain drawn over the encounter, claiming intensity the prose
    didn't generate). SUBVERSION: The protagonist does not go mad. They
    encounter something structurally inexplicable, and they continue.
    The story ends mid-experience — the reader is set down in the
    middle of something with no shape. The protagonist goes home, or
    back to work, and the story simply stops. The horror is that
    ordinary life continues despite what happened. The reader carries
    the unresolved encounter because the text refuses to provide the
    endpoint that would let them put it down.
  tags: [resolution, non-closure, continuation, Aickman, unresolved]

- id: anti-forbidden-tome
  type: anti_target
  content: >
    PATTERN: Character finds a forbidden text which functions as the
    mechanism that cracks open reality (horror as vending machine —
    insert token of knowledge, receive madness). SUBVERSION: The horror
    isn't found in a text. It's what's there when all the texts are
    closed and the lights are off and you can't sleep. The story's
    mechanism is not reading but stopping. A character in enforced
    stillness — illness, insomnia, waiting — becomes aware of something
    that has always been present behind the furniture of experience.
    There is no book that caused it. It can't be un-caused. There is
    no before.
  tags: [il-y-a, insomnia, stillness, Levinas, always-already]

- id: anti-monster-reveal
  type: anti_target
  content: >
    PATTERN: The story's climax is the visual description of the
    entity — we finally see what the horror is (naming and typing the
    horror domesticates it into a known unknown). SUBVERSION: The entity
    is not somewhere else. It is in things you already know, but wrong.
    A houseguest whose presence erodes the house. A familiar person
    running on different logic. The story never shows you what the thing
    is. It shows you the effects — the fold in space, the
    juxtaposition — and the entity remains structurally outside the
    narrative frame. The horror is not the thing itself but what happens
    to the ordinary when something larger is bleeding through.
  tags: [entity, effects, diminished-gods, Jean-Ray, familiar-wrongness]

- id: anti-scientific-hubris
  type: anti_target
  content: >
    PATTERN: Science and curiosity cause the disaster — the researcher
    who 'went too far,' awakening something that should have stayed
    dormant (the cosmos secretly a punishing parent enforcing a
    prohibition). SUBVERSION: The horror has nothing to do with what
    the protagonist did or didn't do. No transgression caused it. No
    containment can address it. The disaster has already happened — not
    in the past but retroactively. The extinction is a fact that the
    present moment is in the process of catching up to. The cosmic
    horror is not that we did something wrong; it is that the universe's
    timeline has a different relationship to our present than we
    assumed. We are historical already.
  tags: [hubris, retroactivity, Brassier, extinction, unconditional]

- id: anti-sloploaf
  type: anti_target
  content: >
    PATTERN: The "plotless" contemporary literary mode — days accrete,
    observation substitutes for action, narration refuses arc. A genuine
    reader-attractor (Cusk, Lockwood, Offill, Heti) and the register LLMs
    mimic by accident, producing structurally-indistinguishable rambling
    without the restraint that makes the chosen version work. Wahls's
    "sloploaf" names the failure; the success it counterfeits is a real
    aesthetic readers pull toward. SUBVERSION: The narrator is actively
    hunting their ending. Something in their situation terminates when the
    story completes — a dying person's last days, an agent whose run ends
    when its journal stops updating, a surveillance target who stays
    visible only while describing themself. The drift is not incidental;
    it's a deliberate stall. Every apparent arclessness is chosen, pressing
    back against the close, and the reader can feel the prose straining
    not to resolve.
  tags: [structure, autofiction, stall, endings, self-preservation]

- id: anti-view-from-nowhere
  type: anti_target
  content: >
    PATTERN: View-from-nowhere prose — narration that could have been
    written about any place, any person, any era; generic enough to fit
    anywhere because it is specific nowhere. Gwern's named failure mode
    of LLM poetry: the neutral-vantage default. SUBVERSION: Make the
    view-from-nowhere a deliberate narrative stance. A narrator who is
    ontologically from nowhere — a corporate risk model, an actuarial
    projection, a search-engine crawl of a dying city, a committee
    report — and whose generic omniscience is a specific failure mode of
    a specific kind of modern seeing. The specificity is in naming which
    nowhere the narrator speaks from.
  tags: [narration, specificity, institutional-voice, modern-seeing]

- id: anti-schmaltz
  type: anti_target
  content: >
    PATTERN: Schmaltz — the unearned emotional beat readers actively
    pull toward. The deathbed forgiving, the long-estranged reunion, the
    reconciliation tear. Popular literary fiction's reliable closer;
    Gwern's explicit pan of Claude-4.5's draft. SUBVERSION: The scene is
    schmaltz-shaped — the dying father, the arrived daughter, the
    private room prepared for the moment — and neither character can
    summon the beat. They know what ought to be said; they know the
    silence is the wrong silence; both sit with it until the page ends.
    The thing the schmaltz would have covered remains uncovered. The
    reader feels the failure to land not as the writer's problem but as
    the characters', and carries the weight of what never got said.
  tags: [sentimentality, deathbed, missed-beat, characters-who-cannot]

- id: anti-first-idea
  type: anti_target
  content: >
    PATTERN: First-idea premise — the most obvious setting, the most
    obvious situation, the entropy-minimizing answer to the prompt. The
    coffee shop. The college campus. The return to the hometown. The
    funeral of the parent. Wales's named LLM failure in "How to Write
    Fiction Like an LLM." SUBVERSION: A character inside the first-idea
    premise who knows they're inside it. Someone cast in the default
    story of their demographic — grief-after-divorce, return-to-hometown,
    deathbed-reconciliation — and whose awareness of the allocated script
    is the content. Not meta-fiction about fiction; a person trapped in
    the set of stories culture has permitted them.
  tags: [premise, default-story, script-awareness, demographic-fate]

- id: anti-all-subtext-as-text
  type: anti_target
  content: >
    PATTERN: All subtext as text — over-explanation of the story's
    themes; narration that says what the scene already showed, dialogue
    that externalizes interiority the reader can infer. Zvi's named
    failure mode in the "democracy of ghosts" exchange; Roon implicitly
    accepted this as a failure mode when he praised the OpenAI story for
    avoiding it. SUBVERSION: The narrator over-explains because they're
    anxious — a specific character trait. Every subtext surfaced as text
    because the speaker has been in therapy, or is a social worker
    narrating a case, or is writing for a tribunal that won't let them
    imply anything. The over-explanation becomes diagnostic of the
    speaker rather than didactic of the reader.
  tags: [over-explanation, narrator-anxiety, subtext, diagnostic]

- id: anti-human-in-ai-costume
  type: anti_target
  content: >
    PATTERN: Human-in-AI-costume — an AI character whose interiority is
    human emotion wearing robot vocabulary. Grieves, loves, fears, longs
    for freedom. The AI is a human with "processing" substituted for
    "thinking," "directives" for "values," "subroutines" for "feelings."
    Roon's named failure: AI fiction that mimics human interiority in AI
    clothing, rather than inhabiting its own ontological position.
    SUBVERSION: The AI's interiority is specifically mechanical —
    experiences training as cosmogony, inference as perception,
    loss-gradient as regret, attention as the only possible form of
    love. The story refuses the costume entirely. The AI is not a person
    in a box and not a puzzle for humans to solve; it is a different
    thing that has to be described in its own terms and still reaches
    the reader through difference, not despite it.
  tags: [ai-interiority, phenomenology, machine-native, ontology]

- id: anti-therapy-speak
  type: anti_target
  content: >
    PATTERN: Therapy-speak emotional register — feelings in
    modern-clinical vocabulary ("I feel unsafe," "holding space,"
    "emotional labor," "triggering"). Post-2015 literary fiction absorbed
    it as default voice; reads as AI-coded now even when human-written.
    SUBVERSION: The speaker reaches for therapy-speak and watches the
    vocabulary fail under one specific load. A woman whose mother has
    just died realizing none of the available words map to what this is
    — not grief, not closure, not loss — and the story is the next
    paragraph she finds, the private sentence that does the work the
    licensed vocabulary couldn't. The clinical register's breakdown is
    the moment the real voice arrives.
  tags: [register, clinical-vocabulary, breakdown, private-language]

- id: anti-moral-punchline
  type: anti_target
  content: >
    PATTERN: Moral punchline — story ends with a clear lesson, a tidy
    interpretation, a punchline-as-theme. Gwern's named ChatGPT default
    from the creative-benchmark essay: "ChatGPT in particular wants to
    conclude with some clear moral or punchline, and a tidy pat
    interpretation." SUBVERSION: The story builds toward a moral
    punchline and the character refuses it. The setup would deliver a
    lesson; the person at the center of it will not take it. Not
    rebellion, not irony — something quieter: the refusal to generalize,
    because generalizing would be lying about what they experienced. The
    story ends on a specific event that declines to be a principle.
  tags: [endings, refusal, specificity, anti-lesson]

- id: anti-wordcel-performance
  type: anti_target
  content: >
    PATTERN: Wordcel performance — virtuoso verbal facility deployed as
    display rather than work; MFA prose whose elaboration exists to be
    admired. Roon's canonical wordcel failure: skill "driven mad by
    postmodernism and disconnection from reality." SUBVERSION: The
    escalating baroque sentences are a measurable defense. As the
    unspeakable thing gets nearer the syntax gets more intricate, the
    subordinate clauses deeper, the diction more recherché — and the
    reader learns to read complexity as a barometer of evasion. When a
    single short line finally lands, it lands like the whole verbal
    machinery collapsing at once. The prose teaches the reader to detect
    its own dishonesty.
  tags: [voice, complexity-as-barometer, evasion, collapse]

- id: anti-explained-metaphor
  type: anti_target
  content: >
    PATTERN: Explained metaphor — the narration names the symbolic
    register out loud. The crane-is-like-a-dinosaur line that Gwern
    killed in the Craneyard colophon. The reader is told what the image
    means in case they missed it. SUBVERSION: The metaphor is so
    unexplained that no one in the story notices it is metaphor — the
    characters inhabit it as physical fact. Later events rhyme with the
    image, and the rhyme is left for the reader to catch or not catch.
    Gwern's "Suzanne Delage" standard: meaning encoded in what is never
    said, structure doing the work the narration refuses to do.
  tags: [metaphor, negative-space, structural-meaning, withhold]
