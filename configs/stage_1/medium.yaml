# Stage 1: Medium Run — Production-grade models, full evolution.
#
# 20 generations, 10 islands, 3 judges. Strong generation and judge
# models with dynamic island spawning and operator bandit. Full
# evolution dynamics. Self-critic on the generator (critique-revise
# cycle on every generation/genesis/mutation).
#
# Run with: uv run python -m owtn --config configs/stage_1/medium.yaml \
#           --max-eval-jobs 5 --max-proposal-jobs 4
#
# Expected: ~50-80 concepts, ~$30-80 total (self-critic adds ~2x
# generation-side cost on top of the ~$15-40 baseline).

stage: 1

# Optional creative direction. Injected into every operator's system message
# (genesis and mutation alike) as the *Magnes* run-prompt block. Leave empty
# for unsteered exploration.
prompt: ""

# --- Evolution Parameters (ShinkaEvolve EvolutionConfig) ---

evolution:
  num_generations: 20
  language: "json"
  patch_types:
    - collision
    - noun_list
    - thought_experiment
    - compost
    - crossover
    - inversion
    - discovery
    - compression
    - constraint_first
    - anti_premise
    - real_world_seed
  patch_type_probs: [0.10, 0.07, 0.13, 0.07, 0.08, 0.08, 0.08, 0.07, 0.08, 0.15, 0.09]
  max_patch_resamples: 3
  llm_dynamic_selection: "ucb"
  use_text_feedback: true             # critical: feeds judge reasoning back into mutation prompts
  evolve_prompts: true
  meta_rec_interval: 4
  code_embed_sim_threshold: 0.90
  max_novelty_attempts: 3
  genesis_ratio: 0.15                  # 15% fresh concepts, 85% evolve parent
  tonal_inherit_rate: 0.5            # per-dimension chance of inheriting parent's register/mode on mutation
  tonal_crossover_new_rate: 0.33     # per-dimension chance of fresh roll on crossover (vs parent A or B)

# --- Database / Island Config (ShinkaEvolve DatabaseConfig) ---

database:
  num_islands: 4
  archive_size: 100
  archive_selection_strategy: "fitness"
  migration_interval: 3
  migration_rate: 0.15
  island_elitism: true
  island_selection_strategy: "equal"
  enable_dynamic_islands: true
  stagnation_threshold: 25
  parent_selection_strategy: "power_law"
  exploitation_alpha: 1.0
  exploitation_ratio: 0.35

# --- Operator Bandit ---

operator_bandit:
  enabled: true
  warmup_generations: 3          # use static weights for first N generations
  exploration_constant: 1.0      # UCB1 c parameter
  min_probability_floor: 0.02    # every operator gets at least 2%

# --- LLM Models ---

llm:
  # Per-model generation params. Each entry has its own sampling params; the
  # pipeline picks one by `weight` (uniform when all equal) then uses THAT
  # model's params. reasoning_effort = "disabled"|"min"|"low"|"medium"|"high"|"max"
  # — non-"disabled" enables extended thinking on Anthropic / reasoning on
  # OpenAI/DeepSeek. top_p/top_k/min_p dropped where API forbids.
  generation_models:
    - name: "claude-sonnet-4-6"
      temperature: 1.0           # claude forces 1.0 when thinking is on anyway
      reasoning_effort: "high"
      self_critic: true

  # Judge models are set per-judge in configs/judges/<id>.yaml

  # Model for MAP-Elites classification (cheap, classification task)
  classifier_model: "claude-haiku-4-5-20251001"

  # Model for embeddings (novelty rejection + Gate 2 anti-cliche)
  embedding_model: "text-embedding-3-small"

# --- Judge Panel ---
# Judge personas live in configs/judges/<id>.yaml — one file per judge.
# List which judges to use for this run by ID.

judges:
  panel:
    - "mira-okonkwo"
    - "tomas-varga"
    - "sable-ahn"
  judges_dir: "configs/judges"
  min_demanding_ratio: 0.3

# --- Evaluation ---

evaluation:
  # Hölder mean parameter (soft minimum — weaknesses drag score down)
  holder_p: 0.4

  # Disagreement signal
  diversity_weight: 0.15
  std_threshold: 0.8

  # Gate 2: Anti-cliche
  anti_cliche:
    similarity_threshold: 0.85
    elevated_novelty_threshold: 3.5
    patterns_file: "data/convergence-patterns.yaml"

  # Pairwise aggregation — weighted dim-votes + asymmetric tiebreaker.
  # Rationale: lab/issues/2026-04-21-rubric-reweighting.md
  # High-weight: distinguishers that separate compelling from "mid".
  # Low-weight: table-stakes (present-or-broken floors).
  pairwise:
    dim_weights:
      indelibility: 2.00          # mid-detection
      grip: 1.75                  # reader retention
      novelty: 1.75               # conceptual surplus
      generative_fertility: 1.25  # engine, not situation
      tension_architecture: 1.00
      emotional_depth: 1.00
      thematic_resonance: 1.00
      concept_coherence: 0.50     # table stakes
      scope_calibration: 0.50     # table stakes
    tiebreaker_threshold: 1.0     # weighted-gap at/below which tiebreaker fires
    tiebreaker_dims:              # priority order for close contests
      - indelibility
      - grip

# --- Stage 2 Handoff ---

handoff:
  # Select top 1 concept per occupied MAP-Elites concept-type cell
  strategy: "top_per_cell"
  max_concepts: 6

# --- Paths ---

paths:
  seed_bank: "data/seed-bank.yaml"
  convergence_patterns: "data/convergence-patterns.yaml"
  # db_path is auto-set by ShinkaEvolve
