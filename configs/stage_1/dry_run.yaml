# Stage 1: Dry Run — Minimal config to prove the evolution loop works.
#
# 2 generations, 2 islands, 1 judge. Cheap models throughout.
# Expected: ~4 concepts generated, evaluated, archived. ~$0.50-2.00 total.

stage: 1
steering: ""

evolution:
  num_generations: 2
  language: "json"
  patch_types:
    - collision
    - noun_list
    - thought_experiment
    - compost
    - crossover
    - inversion
    - discovery
    - compression
    - constraint_first
    - anti_premise
    - real_world_seed
  patch_type_probs: [0.12, 0.08, 0.10, 0.08, 0.10, 0.05, 0.10, 0.07, 0.10, 0.10, 0.10]
  max_patch_resamples: 3
  llm_dynamic_selection: "ucb"
  use_text_feedback: true
  evolve_prompts: false
  meta_rec_interval: 99          # effectively disabled for 2 generations
  code_embed_sim_threshold: 0.90
  max_novelty_attempts: 3
  genesis_ratio: 0.5                   # 50/50 for testing both modes

database:
  num_islands: 2
  archive_size: 50
  archive_selection_strategy: "map_elites"
  migration_interval: 2
  migration_rate: 0.20
  island_elitism: true
  enable_dynamic_islands: false   # no dynamic islands for 2 generations
  stagnation_threshold: 25
  parent_selection_strategy: "power_law"
  exploitation_alpha: 1.0
  exploitation_ratio: 0.35

operator_bandit:
  enabled: false                  # static weights for dry run
  warmup_generations: 3
  exploration_constant: 1.0
  min_probability_floor: 0.02

llm:
  generation_models: ["claude-haiku-4-5-20251001"]
  generation_model_family: "anthropic"
  classifier_model: "gpt-4.1-mini"
  embedding_model: "text-embedding-3-small"

judges:
  panel:
    - "mira-okonkwo"
  judges_dir: "configs/judges"
  min_demanding_ratio: 0.0        # 1 judge, can't enforce ratio

evaluation:
  holder_p: 0.4
  diversity_weight: 0.15
  std_threshold: 0.8
  anti_cliche:
    similarity_threshold: 0.85
    elevated_originality_threshold: 3.5
    patterns_file: "data/convergence-patterns.yaml"
  tier_a_enabled: false
  pairwise_enabled: false
  dynamic_rubrics_enabled: false

handoff:
  strategy: "top_per_cell"
  max_concepts: 6

paths:
  seed_bank: "data/seed-bank.yaml"
  convergence_patterns: "data/convergence-patterns.yaml"
