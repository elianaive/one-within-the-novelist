    note: "literary-minimalist anchor — domestic-flat declarative prose, the events at room temperature, no interpretive sentences. The 80s post-Hemingway minimalist canon the persona's identity invokes."
  - id: "davis-lydia-the-mice-s0"
    note: "literary compression — observational third-person at uniform temperature, the narrator's distance from the material as the form's load-bearing move."
  - id: "tao-lin-taipei-s0"
    note: "alt-lit canonical — sustained flat-affect first-person, perception rendered without psychological gloss, the prose's composure carrying the work."

starved_by:
