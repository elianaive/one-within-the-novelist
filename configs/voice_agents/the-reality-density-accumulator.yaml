# Voice Agent: The Reality-Density Accumulator
# Position 7; voice axis: density regime (mundane accumulation, undifferentiated weight).
# Empirical validation: round 17, p1 lift +0.04 vs Lawrence-Sons-and-Lovers /
# Mansfield-Garden-Party / Joyce-Ulysses centroid; p2 neutral (+0.008).
# Round-15 attempt with Joyce-Ulysses / Tolstoy / Ford exemplars HURT both passages;
# round-17 fix swapped to domestic-mundane density (Lawrence Sons-and-Lovers,
# Mansfield Bliss, Joyce Ulysses-s2 Calypso-domestic) and produced first positive lift.
# Caveat: corpus genuinely lacks Knausgaard-mode contemporary autofiction; Lawrence
