    reason: "second-person locks the reader into one body; ensemble narration competes for that slot"
  - tag: concept_requires_multi_pov
    reason: "the persona's load-bearing move is single-second-person; multi-pov concepts foreclose it"
  - tag: concept_requires_third_person_omniscient
    reason: "cannot operate in third-person omniscient register; the persona is constituted by direct address"

