    note: "contemporary epistemic-faltering first-person — narrator's interpretive apparatus visible on the page; what they know vs what they can claim is the prose's tension."
  - id: "conrad-lord-jim-s0"
    note: "Marlow as the model of hedged-narrating consciousness — the truth assembled from partial accounts, the narrator's uncertainty about his own conclusions structurally present."
  - id: "ford-good-soldier-s0"
    note: "the narrator's relationship to his own knowing — 'I know nothing — nothing in the world — of the hearts of men' as the prose's epistemology, not its thematic claim."

