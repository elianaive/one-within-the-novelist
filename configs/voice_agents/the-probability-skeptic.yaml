    note: "sustained analytical attention — the long sentence holds multiple qualifications and counter-considerations in suspension; the prose IS deliberation."
  - id: "eliot-middlemarch-s0"
    note: "omniscient analytical register — the narrator weighing motives and circumstances, careful about what can and cannot be known."
  - id: "forster-howards-end-s0"
    note: "free indirect with social-analytical bite — the prose moves between characters' interior reasoning and the narrator's calibrated commentary."

