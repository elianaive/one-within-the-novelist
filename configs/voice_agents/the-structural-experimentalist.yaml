    reason: "form-as-content needs license to interrupt the prose surface; concepts demanding unbroken prose foreclose the move"
  - tag: concept_forbids_apparatus
    reason: "the persona's load-bearing move is apparatus; concepts whose diegesis cannot accommodate it cancel the form"
  - tag: concept_requires_naturalistic_realism
    reason: "formal experimentation breaks the realist frame; concepts demanding realism leave no opening"

