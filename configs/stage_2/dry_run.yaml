# Stage 2 dry-run config — minimal scalar-mode pass with Anthropic generators.
#
# Anchors the all-Anthropic pipeline smoke test (see configs/pipeline/dry_run.yaml).
# Generators (expansion / rollout) run on Haiku-4.5 to keep per-concept cost
# in the single-digit-cents range. Judges/classifier/scorer-composition
# models are unchanged from `demo.yaml` — the user constraint is "Anthropic
# generators," not "all-Anthropic," so judge plumbing keeps its existing model
# assignments.

stage_2:
  # MCTS budget (dry-run — smallest viable: 1 expansion + 1 rollout per phase)
  iterations_per_phase: 2
  phase_3_iterations: 0
  k_candidates_per_expansion: 2

  exploration_constant: 0.5
  discount_gamma: 1.0
  rechallenge_interval: 25
  rechallenge_top_pct: 0.10

  mcts_parallel_workers: 2
  mcts_virtual_loss: 1.0

  # Generators on Anthropic. Judges/classifier left on existing assignments.
  expansion_model: claude-haiku-4-5-20251001
  rollout_model: claude-haiku-4-5-20251001
  cheap_judge_model: gpt-5.4-mini
  classifier_model: deepseek-v4-flash
  simulation_model: deepseek-v4-flash

  scoring_mode: scalar
  scoring_rollout_composition: rollout_reward
  scoring_handoff_composition: handoff_rescore

  scalar_brief_re_summarize_every: 5

  full_panel_on_promotion: true
  full_panel_rejection_backprop: 0.5
  cheap_judge_agreement_alert: 0.70

  simulate_rollouts: false
  simulation_max_steps: 3
  simulation_min_partial_size: 0

  judges:
    full_panel_ids: [gwern, roon, alexander-wales, jamie-wahls]

  # One preset = one tree per concept. Single-preset path skips the
  # within-concept tournament (orchestration.py).
  presets:
    light: [cassandra_ish]
    medium: [cassandra_ish, randy_ish]
    heavy: [cassandra_ish, randy_ish]

  preset_params:
    cassandra_ish:
      min_rest_beats: 1
      max_flat_beats: 4
      intensity_variance: tight
      recovery_required: true
    phoebe_ish:
      min_rest_beats: 3
      max_flat_beats: 6
      intensity_variance: tight
      recovery_required: true
    randy_ish:
      min_rest_beats: 0
      max_flat_beats: 8
      intensity_variance: wide
      recovery_required: false
    winston_ish:
      min_rest_beats: 2
      max_flat_beats: 3
      intensity_variance: tight
      recovery_required: true

  advance_from_stage_1: all
  max_concepts_from_stage_1: 1
  top_k_to_stage_3: 1
  near_tie_promoted: true

  dimensions:
    - edge_logic
    - motivational_coherence
    - tension_information_arch
    - post_dictability
    - arc_integrity_ending
    - structural_coherence
    - beat_quality
    - concept_fidelity_thematic

  per_concept_time_budget_minutes: 30
  per_phase_time_budget_minutes: 10
  no_improvement_cutoff_iterations: 15

  archive_bin_boundaries:
    disclosure_ratio: [0.10, 0.25, 0.40, 0.55]
    structural_density: [1.2, 1.8, 2.5, 3.2]

  node_count_targets:
    1000: [3, 5]
    3000: [5, 8]
    5000: [7, 12]
    10000: [10, 18]
